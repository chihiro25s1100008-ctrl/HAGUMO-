<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABOUT | モエルタウン</title>
    <link rel="stylesheet" href="style.css"> 
    
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: linear-gradient(#fff0f6, #f0f9ff);
            text-align: center;
        }
        /* header, nav a は common.js で生成されるものに適用されるよう調整 */
        .section { padding: 120px 20px; animation: fade 1s ease; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        
        .card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, .08);
        }
        footer { padding: 40px; font-size: 12px; opacity: .6; }
    </style>
</head>
<body>

    <div class="section">
        <div class="card">
            <h1>モエルタウンとは？</h1>
            <p>
                あなたの心の中に住んでいるキャラクターたちの世界。<br>
                甘えも、情熱も、静けさも、全部大切。
            </p>
        </div>
    </div>

    <footer>© 2026 MoeruTown</footer>

    <script src="common.js"></script>
</body>
</html>
