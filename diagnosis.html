<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIAGNOSIS | HAGUMO</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-pink: #ff7eb9; --soft-pink: #fff5f7; --pink1: #ffb3d9; --pink2: #d1478e; }
        
        body { font-family: 'Zen Maru Gothic', sans-serif; background: var(--soft-pink); margin: 0; padding-top: 100px; color: #555; overflow-x: hidden; }

        /* ナビゲーション */
        .nav { 
            position: fixed; top: 0; left: 0; width: 100%; 
            background: white; z-index: 10000; border-bottom: 2px solid #fff0f6; 
            padding: 8px 0;
        }
        .nav-content { 
            max-width: 1100px; margin: 0 auto; padding: 0 15px;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .nav-logo-img { height: 28px; cursor: pointer; }
        .nav-links { 
            display: flex; flex-wrap: wrap; justify-content: center; 
            gap: 4px 8px;
        }
        .nav-link { 
            color: #888; text-decoration: none; font-size: 11px; font-weight: bold; 
            padding: 4px 8px; border-radius: 20px; transition: 0.3s;
            background: #fdfdfd; border: 1px solid #f0f0f0;
        }
        .nav-link:hover, .nav-link.active { 
            color: var(--main-pink); background: var(--soft-pink); border-color: var(--main-pink);
        }

        @media screen and (min-width: 769px) {
            body { padding-top: 90px; }
            .nav-content { flex-direction: row; justify-content: space-between; height: 60px; }
            .nav-logo-img { height: 35px; }
            .nav-link { font-size: 13px; background: none; border: none; }
        }

        .diag-hero { padding: 30px 20px 20px; text-align: center; }
        .diag-hero h1 { color: var(--pink2); font-size: clamp(20px, 6vw, 24px); margin-bottom: 8px; font-weight: 700; }
        .diag-hero p { color: #888; font-size: 12px; font-weight: bold; }

        .diag-container { max-width: 600px; margin: 0 auto 60px; padding: 0 15px; }

        .q-card {
            background: white; border-radius: 35px; padding: 35px 20px;
            box-shadow: 0 15px 35px rgba(255,105,180,0.12); text-align: center;
            border: 3px solid #fff0f5; min-height: 420px;
            display: flex; flex-direction: column; justify-content: center; position: relative;
        }

        .progress-bar { position: absolute; top: 20px; left: 10%; width: 80%; height: 6px; background: #eee; border-radius: 4px; }
        .progress-inner { height: 100%; background: var(--main-pink); border-radius: 4px; transition: 0.4s; width: 0%; }

        .q-text { font-size: clamp(16px, 5vw, 19px); color: var(--pink2); font-weight: bold; margin: 20px 0 25px; line-height: 1.6; }
        .ans-list { display: flex; flex-direction: column; gap: 10px; }

        .puffy-ans-btn {
            background: white; color: var(--pink2); border: 2px solid var(--pink1);
            padding: 14px 10px; border-radius: 20px; font-weight: bold; font-size: 13px;
            box-shadow: 0 4px 0 var(--pink1); transition: 0.1s; cursor: pointer; position: relative; top: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .puffy-ans-btn:active { top: 3px; box-shadow: 0 1px 0 var(--pink1); }

        #result-area { display: none; animation: fadeIn 0.8s ease forwards; flex-direction: column; align-items: center; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .result-img-box {
            width: 150px; height: 150px; margin: 0 auto 15px;
            background: var(--soft-pink); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 2px dashed var(--pink1);
        }
        .result-img { width: 110px; height: 110px; object-fit: contain; }
        .result-name { font-size: 24px; color: var(--pink2); font-weight: bold; margin-bottom: 8px; }
        .result-desc { font-size: 13px; color: #666; text-align: left; line-height: 1.7; background: #fffafb; padding: 15px; border-radius: 20px; white-space: pre-wrap; margin-bottom: 20px; }

        .share-area { display: flex; gap: 8px; margin-bottom: 15px; width: 100%; }
        .share-btn { flex: 1; padding: 12px; border-radius: 12px; text-decoration: none; font-size: 11px; font-weight: bold; color: white; text-align: center; }
        .btn-x { background: #333; }
        .btn-line { background: #06C755; }

        .cta-btn {
            background: var(--main-pink); color: white; border: none; 
            padding: 18px; border-radius: 30px; font-weight: bold; font-size: 15px;
            box-shadow: 0 5px 0 #e667a3; cursor: pointer; margin-bottom: 10px; width: 100%;
        }
        .cta-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #e667a3; }

        footer { text-align: center; padding: 40px 20px; font-size: 10px; color: #aaa; }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="nav-content">
            <img src="./images/rogo.PNG" class="nav-logo-img" onclick="location.href='index.html'">
            <div class="nav-links">
                <a href="index.html" class="nav-link">HOME</a>
                <a href="world.html" class="nav-link">WORLD</a>
                <a href="product.html" class="nav-link">PRODUCT</a>
                <a href="hagumo.html" class="nav-link">HAGUMO</a>
                <a href="diagnosis.html" class="nav-link active">DIAGNOSIS</a>
                <a href="my.html" class="nav-link">MY HAGUMO</a>
            </div>
        </div>
    </nav>

    <div class="diag-container">
        <section class="diag-hero">
            <h1>PARTNER DIAGNOSIS</h1>
            <p>あなたにぴったりのHAGUMOを見つけよう</p>
        </section>

        <div id="question-area" class="q-card">
            <div class="progress-bar"><div id="p-inner" class="progress-inner"></div></div>
            <div class="q-text" id="q-text">準備中...</div>
            <div class="ans-list" id="ans-list"></div>
        </div>

        <div id="result-area" class="q-card">
            <p style="color:#aaa; font-size:11px; font-weight:bold; margin-top: 10px;">あなたの運命のパートナーは...</p>
            <div class="result-img-box"><img src="" class="result-img" id="res-img"></div>
            <div class="result-name" id="res-name"></div>
            <div class="result-desc" id="res-desc"></div>
            
            <div class="share-area">
                <a href="#" id="share-x" target="_blank" class="share-btn btn-x">Xでシェア</a>
                <a href="#" id="share-line" target="_blank" class="share-btn btn-line">LINEで送る</a>
            </div>
            
            <button onclick="goToMyHagumo()" class="cta-btn">この子とお部屋へ行く 🌱</button>
            <a href="diagnosis.html" style="color:#ccc; font-size:11px; text-decoration:none; margin-top:10px; display: inline-block;">もう一度診断する</a>
        </div>
    </div>

    <footer>
        <div class="bottom-cta">
        <h2>あなたにぴったりのパートナーは？</h2>
        <a href="diagnosis.html" class="puffy-btn">パートナー診断をはじめる 🌱</a>
    </div>

    <footer>
        <p style="color: var(--pink2); font-weight: bold; font-size: 16px; margin-bottom: 12px; letter-spacing: 1px;">🎀 HAGUMO project 🎀</p>
        <p style="font-size: 11px; color: #aaa; line-height: 1.8; max-width: 400px; margin: 0 auto;">
            ※これは授業課題のプロトタイプです。<br>
            実際のサービス提供やグッズ販売は行っておりません。
        </p>
    </footer>

</body>
</html>
    <script>
        const questions = [
            { q: "休日の過ごし方は？", a: [
                { t: "家でのんびり癒やされたい", p: ["buta", "nga", "kuma"] }, 
                { t: "外に出てアクティブに遊ぶ！", p: ["tora", "chabo", "risu"] }, 
                { t: "趣味や勉強に没頭する", p: ["kame", "imo", "jaku"] }, 
                { t: "気まぐれにふらっと出かける", p: ["saru"] }
            ]},
            { q: "周りからどんな性格って言われる？", a: [
                { t: "優しくて聞き上手", p: ["buta", "imo"] }, 
                { t: "明るいムードメーカー", p: ["chabo", "tora", "nga"] }, 
                { t: "落ち着いていてミステリアス", p: ["kuma", "kame"] }, 
                { t: "個性的で自由人", p: ["saru", "risu", "jaku"] } // jakuをここへ移動
            ]},
            { q: "解決したい肌や体の悩みは？", a: [
                { t: "乾燥してカサカサする", p: ["nga", "chabo"] }, 
                { t: "透明感がなく、くすみがち", p: ["buta", "tora"] }, 
                { t: "むくみや疲れを取りたい", p: ["risu", "saru"] }, 
                { t: "スマホやPCで目が疲れている", p: ["kame", "jaku"] }
            ]},
            { q: "直感で選ぶなら、どの色が好き？", a: [
                { t: "情熱的なレッド系", p: ["tora", "chabo"] }, 
                { t: "可愛いピンク・ホワイト系", p: ["nga", "buta"] }, 
                { t: "クールなブルー・パープル系", p: ["kame", "jaku", "kuma"] }, 
                { t: "フレッシュなイエロー・グリーン系", p: ["saru", "risu", "imo"] }
            ]},
            { q: "パートナーに求めるものは？", a: [
                { t: "癒やしと安心感", p: ["buta", "nga", "chabo"] }, 
                { t: "刺激と元気", p: ["saru", "tora", "risu"] }, 
                { t: "信頼感とサポート", p: ["kame"] }, // jakuをここから外しました
                { t: "ブレない軸と努力", p: ["imo", "kuma", "jaku"] } // jakuをここへ移動
            ]}
        ];

        const characters = [
            { id:"buta", name:"かぶた", img:"./images/buta.PNG", desc:"【優しさ×包容】控えめで優しい『かぶた』。アミラーゼたっぷりのカブで、お肌のくすみを飛ばしてピュアな透明感を引き出します。" },
            { id:"nga", name:"もももんが", img:"./images/nga.PNG", desc:"【愛嬌×甘え上手】甘えん坊な『もももんが』。桃のようなジューシーな潤い成分で、触れたくなるようなモチモチ肌を一緒に作りましょう。" },
            { id:"risu", name:"きゅうりす", img:"./images/risu.PNG", desc:"【バランス×調和】働き者の『きゅうりす』。カリウムたっぷりのキュウリでむくみをリフレッシュ！" },
            { id:"kame", name:"ぶるーべりくがめ", img:"./images/kame.PNG", desc:"【知性×分析】落ち着いた『ぶるーべりくがめ』。アントシアニンの魔法で、スマホ疲れの瞳をパッチリ輝かせてくれます。" },
            { id:"tora", name:"とまとら", img:"./images/tora.PNG", desc:"【情熱×リーダー】パワフルな『とまとら』。リコピンの力で太陽に負けない美しさを。" },
            { id:"kuma", name:"くろいちじくま", img:"./images/kuma.PNG", desc:"【静か×ミステリアス】匠の精神を持つ『くろいちじくま』。磨き上げられたようなツヤ肌をプロデュースしてくれます。" },
            { id:"saru", name:"れもんきー", img:"./images/saru.PNG", desc:"【ひらめき×自由】好奇心旺盛な『れもんきー』。ビタミンCたっぷりのレモンで、心もお肌もパッと明るくリフレッシュ！" },
            { id:"imo", name:"さつまいもぐら", img:"./images/imo.PNG", desc:"【努力×継続】コツコツ頑張る『さつまいもぐら』。内側からブレない健康的な美しさを支えます。" },
            { id:"chabo", name:"かぼちゃぼ", img:"./images/chabo.PNG", desc:"【明るい×ポジティブ】元気いっぱいな『かぼちゃぼ』。乾燥に負けないふっくらと温かみのあるお肌に。" },
            { id:"jaku", name:"ばたふらいぴーこっく", img:"./images/jaku.PNG", desc:"【機転×賢さ】優雅で賢い『ばたふらいぴーこっく』。凛とした大人の美しさを引き出します。" }
        ];

        let currentIdx = 0;
        let points = {};
        let resultCharId = "";

        // スコアの初期化
        characters.forEach(c => { points[c.id] = 0; });

        function showNext() {
            const q = questions[currentIdx];
            document.getElementById('p-inner').style.width = ((currentIdx + 1) / questions.length) * 100 + "%";
            document.getElementById('q-text').innerText = q.q;
            const list = document.getElementById('ans-list');
            list.innerHTML = "";
            q.a.forEach(ans => {
                const b = document.createElement('button');
                b.className = "puffy-ans-btn";
                b.innerText = ans.t;
                b.onclick = () => {
                    ans.p.forEach(id => { points[id] = (points[id] || 0) + 1; });
                    currentIdx++;
                    if(currentIdx < questions.length) showNext();
                    else showResult();
                };
                list.appendChild(b);
            });
        }

        function showResult() {
            document.getElementById('question-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'flex';

            let maxScore = -1;
            let winners = [];

            for(let id in points) {
                if(points[id] > maxScore) {
                    maxScore = points[id];
                    winners = [id];
                } else if(points[id] === maxScore) {
                    winners.push(id);
                }
            }

            // 同点時のランダム選出（これで100%くがめになるのを防ぎます）
            resultCharId = winners[Math.floor(Math.random() * winners.length)];

            const char = characters.find(c => c.id === resultCharId);

            document.getElementById('res-img').src = char.img;
            document.getElementById('res-name').innerText = char.name;
            document.getElementById('res-desc').innerText = char.desc;

            const txt = `私の運命のHAGUMOは「${char.name}」でした！ 🌱\n#HAGUMO `;
            document.getElementById('share-x').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(txt)}&url=${encodeURIComponent(window.location.href)}`;
            document.getElementById('share-line').href = `https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(window.location.href)}`;
        }

        function goToMyHagumo() {
            localStorage.setItem('hagu_current_char', resultCharId);
            location.href = 'my.html?chara=' + resultCharId;
        }

        showNext();
    </script>
</body>
</html>
