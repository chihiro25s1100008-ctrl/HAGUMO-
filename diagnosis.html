<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIAGNOSIS | HAGUMO</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .diag-hero {
            padding: 80px 20px 40px;
            background: linear-gradient(135deg, #fff 0%, var(--soft-pink) 100%);
            text-align: center;
            border-radius: 0 0 50px 50px;
        }

        .diag-container {
            max-width: 600px;
            margin: 20px auto 100px;
            padding: 0 20px;
        }

        .q-card {
            background: white;
            border-radius: 40px;
            padding: 40px 20px;
            box-shadow: 0 15px 35px rgba(255,105,180,0.15);
            text-align: center;
            border: 3px solid #fff0f5;
            min-height: 520px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .progress-bar {
            position: absolute;
            top: 25px;
            left: 10%;
            width: 80%;
            height: 8px;
            background: var(--soft-pink);
            border-radius: 4px;
        }

        .progress-inner {
            height: 100%;
            background: var(--pink2);
            border-radius: 4px;
            transition: 0.4s ease-out;
            width: 0%;
        }

        .q-text {
            font-size: 19px;
            color: var(--pink2);
            font-weight: bold;
            margin: 20px 0 30px;
            line-height: 1.5;
        }

        .ans-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .puffy-ans-btn {
            display: block;
            width: 100%;
            background: white;
            color: var(--pink2);
            border: 2px solid var(--pink1);
            padding: 16px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 6px 0 var(--pink1), 0 10px 15px rgba(255,105,180,0.1);
            transition: 0.2s;
            position: relative;
            top: 0;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }
        .puffy-ans-btn:active {
            top: 6px;
            box-shadow: 0 0 0 var(--pink1);
            background: var(--soft-pink);
        }

        #result-area { display: none; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .result-img-box {
            width: 180px;
            height: 180px;
            margin: 0 auto 20px;
            background: var(--soft-pink);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(255,192,203,0.3);
            border: 3px dashed var(--pink2);
        }
        .result-img { width: 140px; height: 140px; object-fit: contain; }
        
        .result-name { font-size: 26px; color: var(--pink2); font-weight: bold; margin-bottom: 10px; }
        .result-desc { 
            font-size: 14px; color: #666; text-align: left; line-height: 1.8; 
            margin-bottom: 30px; background: #fff5f7; padding: 20px; 
            border-radius: 20px; white-space: pre-wrap;
        }

        /* 🌟 SNSシェアボタンのスタイル追加 */
        .share-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .share-btn {
            flex: 1;
            padding: 12px;
            border-radius: 15px;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: 0.2s;
        }
        .btn-x { background-color: #000; }
        .btn-line { background-color: #06C755; }
        .share-btn:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="nav-logo">
            <a href="./index.html">
                <img src="./images/rogo.PNG" alt="HAGUMO" style="height: 35px;">
            </a>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">HOME</a>
            <a href="world.html" class="nav-link">WORLD</a>
            <a href="hagumo.html" class="nav-link">HAGUMO</a>
            <a href="diagnosis.html" class="nav-link active">DIAGNOSIS</a>
            <a href="product.html" class="nav-link">PRODUCT</a>
            <a href="my.html" class="nav-link">MY HAGUMO</a>
        </div>
    </nav>

    <div class="container">
        <section class="diag-hero">
            <h1 style="color: var(--pink2); font-size: 26px; letter-spacing: 2px;">PARTNER DIAGNOSIS</h1>
            <p style="color: #888; font-size: 13px;">10問の質問で、あなたにぴったりの子を導き出します</p>
        </section>

        <div class="diag-container">
            <div id="question-area" class="q-card">
                <div class="progress-bar"><div id="p-inner" class="progress-inner"></div></div>
                <div class="q-text" id="q-text">読み込み中...</div>
                <div class="ans-list" id="ans-list"></div>
            </div>

            <div id="result-area" class="q-card">
                <p style="color:#aaa; font-size:12px; font-weight:bold; margin-bottom:15px;">あなたのパートナーは...</p>
                <div class="result-img-box"><img src="" class="result-img" id="res-img"></div>
                <div class="result-name" id="res-name"></div>
                <div class="result-desc" id="res-desc"></div>
                
                <div class="share-area">
                    <a href="#" id="share-x" target="_blank" class="share-btn btn-x">Xでシェア</a>
                    <a href="#" id="share-line" target="_blank" class="share-btn btn-line">LINEで送る</a>
                </div>
                
                <a href="my.html" class="puffy-ans-btn" style="background:var(--pink2); color:white; border-color:var(--pink2); box-shadow: 0 6px 0 #d1478e, 0 10px 15px rgba(255,105,180,0.3); margin-bottom:15px;">この子をお迎えする 🌱</a>
                <a href="diagnosis.html" style="color:#ccc; font-size:12px; text-decoration:none; display:inline-block; margin-top:10px;">もう一度診断する</a>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "休日の過ごし方は？", a: [{ t: "家でのんびり癒やされたい", p: ["kabuta", "momo", "kuma"] }, { t: "外に出てアクティブに遊ぶ！", p: ["tomatora", "kabocha", "kyurisu"] }, { t: "趣味や勉強に没頭する", p: ["kugame", "mogura", "peacock"] }, { t: "気まぐれにふらっと出かける", p: ["remonkey"] }] },
            { q: "周りからどんな性格って言われる？", a: [{ t: "優しくて聞き上手", p: ["kabuta", "mogura"] }, { t: "明るいムードメーカー", p: ["kabocha", "tomatora", "momo"] }, { t: "落ち着いていてミステリアス", p: ["kuma", "kugame", "peacock"] }, { t: "個性的で自由人", p: ["remonkey", "kyurisu"] }] },
            { q: "今、一番解決したい肌や体の悩みは？", a: [{ t: "乾燥してカサカサする", p: ["momo", "kabocha"] }, { t: "透明感がなく、くすみがち", p: ["kabuta", "tomatora"] }, { t: "むくみや疲れを取りたい", p: ["kyurisu", "remonkey"] }, { t: "スマホやPCで目が疲れている", p: ["kugame", "peacock"] }] },
            { q: "新しいことに挑戦する時、どう動く？", a: [{ t: "みんなを引っ張って進む", p: ["tomatora", "kabocha"] }, { t: "しっかり分析・計画してから", p: ["kugame", "peacock"] }, { t: "直感とひらめきで即行動！", p: ["remonkey", "kyurisu"] }, { t: "毎日コツコツ地道に努力する", p: ["mogura", "kuma"] }] },
            { q: "疲れたときのご褒美、何が欲しい？", a: [{ t: "あま〜いスイーツで満たされたい", p: ["momo", "kabuta"] }, { t: "さっぱりした飲み物でリフレッシュ", p: ["remonkey", "kyurisu"] }, { t: "栄養満点の美味しいご飯", p: ["tomatora", "kabocha", "mogura"] }, { t: "少し高級なスキンケアや入浴剤", p: ["peacock", "kuma", "kugame"] }] },
            { q: "友達といるときのポジションは？", a: [{ t: "リーダーシップをとる", p: ["tomatora"] }, { t: "盛り上げる", p: ["kabocha", "remonkey"] }, { t: "優しく見守る", p: ["kabuta", "momo"] }, { t: "的なアドバイスをする", p: ["kugame", "peacock", "kuma"] }] },
            { q: "直感で選ぶなら、どの色が好き？", a: [{ t: "赤やオレンジなど情熱的な色", p: ["tomatora", "kabocha"] }, { t: "ピンクや白など可愛い色", p: ["momo", "kabuta"] }, { t: "青や紫などクールな色", p: ["kugame", "peacock", "kuma"] }, { t: "黄色や緑などフレッシュな色", p: ["remonkey", "kyurisu", "mogura"] }] },
            { q: "理想の自分像に近いのは？", a: [{ t: "誰からも愛される愛嬌", p: ["momo", "kabocha"] }, { t: "クールで知的な自立", p: ["kugame", "peacock"] }, { t: "自由でユニークなわが道", p: ["remonkey", "kuma"] }, { t: "誰かを支える包容力", p: ["kabuta", "mogura"] }] },
            { q: "「農業」と聞いて一番ワクワクするのは？", a: [{ t: "土いじりをして地道に育てる時間", p: ["mogura", "kuma", "kabuta"] }, { t: "太陽の下で元気に育つ姿", p: ["tomatora", "kabocha"] }, { t: "収穫した時の達成感", p: ["remonkey", "kyurisu", "peacock"] }, { t: "育つ過程をじっくり観察する", p: ["kugame", "momo"] }] },
            { q: "最後に、パートナーに一番求めるものは？", a: [{ t: "絶対的な癒やしと安心感", p: ["kabuta", "momo", "kabocha"] }, { t: "一緒に高め合える刺激と元気", p: ["remonkey", "tomatora", "kyurisu"] }, { t: "賢くサポートしてくれる信頼感", p: ["kugame", "peacock"] }, { t: "ブレない軸と努力を支える力", p: ["mogura", "kuma"] }] }
        ];

        const characters = [
            { id:"kabuta", name:"かぶた", img:"./images/buta.PNG", desc:"【優しさ×包容】\n控えめで優しい『かぶた』。アミラーゼたっぷりのカブで、お肌のくすみを飛ばしてピュアな透明感を引き出します。" },
            { id:"momo", name:"もももんが", img:"./images/nga.PNG", desc:"【愛嬌×甘え上手】\n甘えん坊な『もももんが』。桃のようなジューシーな潤い成分で、触れたくなるようなモチモチ肌を一緒に作りましょう。" },
            { id:"kyurisu", name:"きゅうりす", img:"./images/risu.PNG", desc:"【バランス×調和】\n働き者の『きゅうりす』。カリウムたっぷりのキュウリでむくみをリフレッシュ！" },
            { id:"kugame", name:"ぶるーべりくがめ", img:"./images/kame.PNG", desc:"【知性×分析】\n落ち着いた『ぶるーべりくがめ』。アントシアニンの魔法で、スマホ疲れの瞳をパッチリ輝かせてくれます。" },
            { id:"tomatora", name:"とまとら", img:"./images/tora.PNG", desc:"【情熱×リーダー】\nパワフルな『とまとら』。リコピンの力で太陽に負けない美しさを。" },
            { id:"kuma", name:"くろいちじくま", img:"./images/kuma.PNG", desc:"【静か×ミステリアス】\n匠の精神を持つ『くろいちじくま』。磨き上げられたようなツヤ肌をプロデュースしてくれます。" },
            { id:"remonkey", name:"れもんきー", img:"./images/saru.PNG", desc:"【ひらめき×自由】\n好奇心旺盛な『れもんきー』。ビタミンCたっぷりのレモンで、心もお肌もパッと明るくリフレッシュ！" },
            { id:"mogura", name:"さつまいもぐら", img:"./images/imo.PNG", desc:"【努力×継続】\nコツコツ頑張る『さつまいもぐら』。内側からブレない健康的な美しさを支えます。" },
            { id:"kabocha", name:"かぼちゃぼ", img:"./images/chabo.PNG", desc:"【明るい×ポジティブ】\n元気いっぱいな『かぼちゃぼ』。乾燥に負けないふっくらと温かみのあるお肌に。" },
            { id:"peacock", name:"ばたふらいぴーこっく", img:"./images/jaku.PNG", desc:"【機転×賢さ】\n優雅で賢い『ばたふらいぴーこっく』。凛とした大人の美しさを引き出します。" }
        ];

        let currentIdx = 0;
        let points = {};

        function init() {
            currentIdx = 0;
            points = {};
            showNext();
        }

        function showNext() {
            const q = questions[currentIdx];
            document.getElementById('p-inner').style.width = ((currentIdx + 1) / questions.length) * 100 + "%";
            document.getElementById('q-text').innerText = q.q;
            const list = document.getElementById('ans-list');
            list.innerHTML = "";
            q.a.forEach(ans => {
                const b = document.createElement('button');
                b.className = "puffy-ans-btn";
                b.innerText = ans.t;
                b.onclick = () => {
                    ans.p.forEach(id => { points[id] = (points[id] || 0) + 1; });
                    currentIdx++;
                    if(currentIdx < questions.length) {
                        showNext();
                    } else {
                        showResult();
                    }
                };
                list.appendChild(b);
            });
        }

        function showResult() {
            document.getElementById('question-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';

            let bestId = "kabuta";
            let maxScore = -1;
            for(let id in points) {
                if(points[id] > maxScore) {
                    maxScore = points[id];
                    bestId = id;
                }
            }
            const bestChar = characters.find(c => c.id === bestId) || characters[0];

            // 🌟 データの保存
            const fileName = bestChar.img.split('/').pop();
            localStorage.setItem('myHagumo', JSON.stringify({ img: fileName, love: 50 }));

            // 画面反映
            document.getElementById('res-img').src = bestChar.img;
            document.getElementById('res-name').innerText = bestChar.name;
            document.getElementById('res-desc').innerText = bestChar.desc;

            // 🌟 SNSシェアリンクの作成
            const shareText = `私のパートナーは「${bestChar.name}」でした！\n農業×美容の不思議な生き物と出会える「HAGUMO」であなたも診断してみてね 🌱\n#HAGUMO #文化祭`;
            const shareUrl = window.location.href;

            document.getElementById('share-x').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(shareUrl)}`;
            document.getElementById('share-line').href = `https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(shareUrl)}`;
        }

        init();
    </script>
</body>
</html>
