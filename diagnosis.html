<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ハグモ覚醒診断</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700&family=Noto+Sans+JP&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
 font-family:'Noto Sans JP',sans-serif;
 background:#fff7fb;
 text-align:center;
 margin:0;
}

h1{
 font-family:'Zen Maru Gothic',sans-serif;
 margin-top:40px;
}

.quiz-box,.result-card{
 background:white;
 border-radius:30px;
 padding:40px;
 max-width:720px;
 margin:40px auto;
 box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.choice{
 display:block;
 margin:12px auto;
 padding:14px 25px;
 border-radius:999px;
 border:none;
 cursor:pointer;
 background:linear-gradient(90deg,#ff9ecb,#ff7eb9);
 color:white;
 font-size:15px;
 transition:.3s;
 width:80%;
}

.choice:hover{ transform:scale(1.05); }

.result-card img{
 width:220px;
 margin:20px 0;
}

.share a{
 display:inline-block;
 margin:8px;
 padding:10px 25px;
 border-radius:999px;
 text-decoration:none;
 background:#222;
 color:white;
 font-size:14px;
}

.save-btn{
 background:#ff7eb9;
}

.loading{
 font-size:18px;
}
</style>
</head>
<body>

<h1>🌱 ハグモ覚醒診断</h1>
<div id="app"></div>

<script>

const hagumos = [
{key:"risu",name:"きゅうりす",img:"images/risu.PNG",type:"バランス・調和",pair:"tora"},
{key:"tora",name:"とまとら",img:"images/tora.PNG",type:"情熱・リーダー",pair:"risu"},
{key:"saru",name:"れもんきー",img:"images/saru.PNG",type:"ひらめき・自由",pair:"kame"},
{key:"kame",name:"ぶるーべりくがめ",img:"images/kame.PNG",type:"知性・分析",pair:"saru"},
{key:"buta",name:"かぶた",img:"images/buta.PNG",type:"優しさ・包容",pair:"kuma"},
{key:"imo",name:"さつまいもぐら",img:"images/imo.PNG",type:"努力・継続",pair:"nga"},
{key:"nga",name:"もももんが",img:"images/nga.PNG",type:"愛嬌・甘え上手",pair:"imo"},
{key:"kuma",name:"くろいちじくま",img:"images/kuma.PNG",type:"静か・ミステリアス",pair:"buta"},
{key:"chabo",name:"かぼちゃぼ",img:"images/chabo.PNG",type:"明るい・ポジティブ",pair:"jaku"},
{key:"jaku",name:"ばたふらいぴーこっく",img:"images/jaku.PNG",type:"機転・賢さ",pair:"chabo"}
];

let scores={};
hagumos.forEach(h=>scores[h.key]=0);

const questions=[
{
q:"休日の理想は？",
a:[
{text:"のんびりリラックス",add:["risu","buta"]},
{text:"友達と外へ",add:["chabo","nga"]},
{text:"新しい挑戦",add:["tora","saru"]},
{text:"知識を深める",add:["kame","jaku"]}
]
},
{
q:"あなたの強みは？",
a:[
{text:"空気を読む力",add:["risu"]},
{text:"行動力",add:["tora"]},
{text:"アイデア力",add:["saru"]},
{text:"分析力",add:["kame"]}
]
},
{
q:"落ち込んだ時は？",
a:[
{text:"誰かに相談",add:["nga","buta"]},
{text:"一人で考える",add:["kuma"]},
{text:"気合いで乗り切る",add:["imo","tora"]},
{text:"ポジティブ変換",add:["chabo"]}
]
},
{
q:"好きなポジションは？",
a:[
{text:"まとめ役",add:["tora"]},
{text:"支える役",add:["buta","risu"]},
{text:"自由人",add:["saru"]},
{text:"参謀",add:["kame","jaku"]}
]
},
{
q:"理想の自分は？",
a:[
{text:"優しい人",add:["buta"]},
{text:"カリスマ",add:["tora"]},
{text:"唯一無二",add:["kuma"]},
{text:"愛され存在",add:["nga"]}
]
}
];

let current=0;

function showQuestion(){
 const q=questions[current];
 document.getElementById("app").innerHTML=`
 <div class="quiz-box">
 <h3>${q.q}</h3>
 ${q.a.map((choice,i)=>`<button class="choice" onclick="choose(${i})">${choice.text}</button>`).join("")}
 </div>`;
}

function choose(i){
 questions[current].a[i].add.forEach(k=>scores[k]++);
 current++;
 if(current<questions.length){ showQuestion(); }
 else{ loading(); }
}

function loading(){
 document.getElementById("app").innerHTML=
 `<div class="quiz-box"><div class="loading">🌱 ハグモ覚醒中...</div></div>`;
 setTimeout(showResult,2000);
}

function showResult(){
 let top=Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);
 let h=hagumos.find(x=>x.key===top);
 let pair=hagumos.find(x=>x.key===h.pair);

 document.getElementById("app").innerHTML=`
 <div class="result-card" id="resultCard">
 <img src="images/rogo.PNG" style="width:120px">
 <h2>${h.name}</h2>
 <img src="${h.img}">
 <h3>${h.type}</h3>
 <p>
 あなたの中には<strong>${h.name}</strong>の因子が宿っています。<br>
 その魅力を大切に育ててください。
 </p>
 <hr>
 <h3>🌸 相性ハグモ</h3>
 <p>${pair.name}</p>
 <img src="${pair.img}" style="width:140px">
 <div class="share">
 <a href="https://twitter.com/intent/tweet?text=私は${h.name}でした🌱%20#ハグモ覚醒診断" target="_blank">Xでシェア</a>
 </div>
 <button class="choice save-btn" onclick="saveImage()">診断カードを保存</button>
 </div>`;
}

function saveImage(){
 html2canvas(document.getElementById("resultCard")).then(canvas=>{
  let link=document.createElement("a");
  link.download="hagumo_result.png";
  link.href=canvas.toDataURL();
  link.click();
 });
}

showQuestion();

</script>
</body>
</html>
