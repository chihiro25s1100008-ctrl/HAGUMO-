<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハグモ本格性格診断 | HAGUMO</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700&family=Noto+Sans+JP&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <style>
        .progress-bar { width: 100%; height: 8px; background: #eee; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #ff9ecb; transition: 0.3s; }
        .q-box { display: none; }
        .q-box.active { display: block; animation: fadeIn 0.5s; }
        .ans-btn {
            display: block; width: 100%; max-width: 450px; margin: 10px auto;
            padding: 15px; border: 2px solid #ff9ecb; border-radius: 15px;
            background: white; cursor: pointer; transition: 0.2s; font-size: 15px;
        }
        .ans-btn:hover { background: #fff4f9; transform: translateY(-2px); border-color: #ff7eb9; }
        #result-area { display: none; }
        .res-main-card { background: #fff; border-radius: 30px; padding: 25px; margin-bottom: 20px; border: 2px solid #fff4f9; }
        .res-img { width: 180px; margin: 15px 0; }
        .compatibility-box {
            background: #fff; border-radius: 20px; padding: 20px;
            margin-top: 20px; border: 1px dashed #ff9ecb;
        }
        .sub-item img { width: 80px; border-radius: 50%; background: #fff4f9; padding: 5px; margin-bottom: 10px; }
        .reason-text { font-size: 13px; color: #666; line-height: 1.6; text-align: left; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌱 ハグモ本格性格診断</h1>
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        
        <div class="card">
            <div id="q-container"></div>

            <div id="result-area">
                <div class="res-main-card">
                    <div id="main-catch" style="color:#ff7eb9; font-weight:bold; font-size: 14px;"></div>
                    <div id="main-res-name" style="font-size:26px; margin:10px 0; font-family: 'Zen Maru Gothic';"></div>
                    <img id="main-res-img" class="res-img" src="">
                    <p id="main-desc" style="font-size:14px; line-height:1.6; color: #444;"></p>
                </div>

                <div class="compatibility-box">
                    <div style="font-weight: bold; color: #ff7eb9; margin-bottom: 15px;">❤ ベストパートナー</div>
                    <div id="sub-res-area"></div>
                    <div id="comp-reason" class="reason-text"></div>
                </div>
                
                <a href="diagnosis.html" class="button" style="margin-top:30px;">もう一度診断する</a>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "新しいことを始める時、まずは…", a: "ワクワクしてすぐ動く", b: "じっくり計画を立てる" },
            { q: "友達と遊ぶなら？", a: "みんなでワイワイ！", b: "少人数で深く話したい" },
            { q: "困っている人がいたら…", a: "すぐに声をかけて助ける", b: "陰ながら見守り、機を待つ" },
            { q: "自分の性格を一言でいうと？", a: "直感で動く自由人", b: "理論で考える慎重派" },
            { q: "休日の理想は？", a: "アクティブに外へ！", b: "家で趣味に没頭" },
            { q: "トラブルが起きたら…", a: "周りに相談して解決", b: "自分一人でじっくり考える" },
            { q: "褒められて嬉しいのは？", a: "『個性的で面白いね！』", b: "『しっかりしていて安心だね』" },
            { q: "大切にしているのは？", a: "今の楽しさ", b: "未来への積み重ね" },
            { q: "初対面の人とは…", a: "積極的に自分を出せる", b: "まずは相手を観察する" },
            { q: "ハグモと一緒に何したい？", a: "賑やかにパーティー！", b: "静かに家庭菜園を楽しみたい" }
        ];

        // 10キャラのデータと相性理由
        const characters = [
            { name: "とまとら", catch: "情熱・リーダー", img: "tora.PNG", partner: "かぼちゃぼ", reason: "情熱的なリーダーのあなたを、明るいかぼちゃぼが笑顔で支えてくれます。お互いのポジティブさが合わさると最強の二人になれます。" },
            { name: "きゅうりす", catch: "バランス・調和", img: "risu.PNG", partner: "かぶた", reason: "周りとの調和を大事にするきゅうりすと、包容力抜群のかぶた。お互いに気遣いができるので、一緒にいると心が一番落ち着く関係です。" },
            { name: "れもんきー", catch: "ひらめき・自由", img: "saru.PNG", partner: "もももんが", reason: "自由奔放なれもんきーの発想を、愛嬌たっぷりなもももんがが「すごい！」と全力で楽しんでくれます。ワクワクが止まらないペアです。" },
            { name: "ぶるーべりくがめ", catch: "知性・分析", img: "kame.PNG", partner: "くろいちじくま", reason: "知的な分析が得意なくがめと、静かな時間が好きないちじくま。言葉がなくても通じ合える、深く静かな信頼関係を築けます。" },
            { name: "かぶた", catch: "優しさ・包容", img: "buta.PNG", partner: "きゅうりす", reason: "あなたの優しさを、きゅうりすがしっかり受け止めてくれます。お互いの「ありがとう」が絶えない、温かい空気感を作れる相性です。" },
            { name: "さつまいもぐら", catch: "努力・継続", img: "imo.PNG", partner: "ばたふらいぴーこっく", reason: "コツコツ努力するあなたを、賢いぴーこっくが効率的なアドバイスで助けてくれます。二人三脚で大きな成果を出せる組み合わせです。" },
            { name: "もももんが", catch: "愛嬌・甘え上手", img: "nga.PNG", partner: "れもんきー", reason: "甘え上手なあなたにとって、常に新しい刺激をくれるれもんきーは最高の遊び相手。二人でいれば、どんな場所でもテーマパークに早変わり！" },
            { name: "くろいちじくま", catch: "静か・ミステリアス", img: "kuma.PNG", partner: "ぶるーべりくがめ", reason: "一人の時間を大切にするあなたを、くがめは無理に踏み込まずに理解してくれます。付かず離れずの心地よい距離感を保てるパートナーです。" },
            { name: "かぼちゃぼ", catch: "明るい・ポジティブ", img: "chabo.PNG", partner: "とまとら", reason: "あなたの太陽のような明るさは、情熱的なとまとらの原動力になります。お互いを高め合いながら、目標に向かって突き進める熱い相性です。" },
            { name: "ばたふらいぴーこっく", catch: "機転・賢さ", img: "jaku.PNG", partner: "さつまいもぐら", reason: "頭の回転が速いあなたにとって、実直に動いてくれるさつまいもぐらは最も信頼できる存在。あなたのアイデアを形にしてくれる最高の相棒です。" }
        ];

        let currentQ = 0;
        let scoreA = 0;

        function init() {
            const container = document.getElementById('q-container');
            questions.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = `q-box ${i === 0 ? 'active' : ''}`;
                div.id = `q${i}`;
                div.innerHTML = `
                    <p style="font-size:16px; margin-bottom:25px; line-height:1.4;">Q${i+1}. ${item.q}</p>
                    <button class="ans-btn" onclick="answer(true)">${item.a}</button>
                    <button class="ans-btn" onclick="answer(false)">${item.b}</button>
                `;
                container.appendChild(div);
            });
        }

        function answer(isA) {
            if(isA) scoreA++;
            document.getElementById(`q${currentQ}`).classList.remove('active');
            currentQ++;
            document.getElementById('progress').style.width = `${(currentQ/questions.length)*100}%`;
            if (currentQ < questions.length) document.getElementById(`q${currentQ}`).classList.add('active');
            else showResult();
        }

        function showResult() {
            document.getElementById('q-container').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';
            const index = Math.min(scoreA, characters.length - 1);
            const main = characters[index];
            const partner = characters.find(c => c.name === main.partner);

            document.getElementById('main-catch').innerText = `― ${main.catch} ―`;
            document.getElementById('main-res-name').innerText = main.name;
            document.getElementById('main-res-img').src = `./images/${main.img}`;
            document.getElementById('main-res-img').onerror = function(){ this.src = `./${main.img}`; };
            document.getElementById('main-desc').innerText = `あなたの本質は「${main.catch}」。そんなあなたに寄り添うのは、${main.name}です。`;

            document.getElementById('sub-res-area').innerHTML = `
                <div class="sub-item">
                    <img src="./images/${partner.img}" onerror="this.src='./${partner.img}'">
                    <div style="font-weight:bold; font-size:14px;">${partner.name}</div>
                </div>
            `;
            document.getElementById('comp-reason').innerText = main.reason;
        }
        init();
    </script>
    <script src="./common.js"></script>
</body>
</html>
