<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAGUMO | 運命のパートナー診断</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-pink: #ff7eb9; --sub-pink: #ffdaeb; --bg: #fff9fb; --line-green: #06C755; }
        body { margin: 0; background: var(--bg); font-family: 'Zen Maru Gothic', sans-serif; color: #444; padding-top: 80px; } /* ナビの高さ分余白を追加 */
        
        /* 【復活】ナビゲーションバー */
        .navbar { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: white; z-index: 2000; border-bottom: 2px solid var(--sub-pink); display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 10px rgba(255,126,185,0.1); }
        .nav-logo-img { height: 40px; cursor: pointer; }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        
        .card { background: white; border-radius: 35px; padding: 30px; box-shadow: 0 10px 30px rgba(255,126,185,0.15); border: 2px solid var(--sub-pink); text-align: center; margin-bottom: 25px; position: relative; }
        
        .progress-bar { font-size: 13px; color: var(--main-pink); font-weight: bold; margin-bottom: 10px; }
        .question-text { font-size: 18px; font-weight: bold; margin: 25px 0; line-height: 1.5; min-height: 60px; display: flex; align-items: center; justify-content: center; }
        .choice-btn { background: white; border: 2px solid var(--sub-pink); padding: 14px; border-radius: 30px; cursor: pointer; font-weight: bold; color: #666; font-size: 15px; transition: 0.2s; width: 100%; margin: 8px 0; outline: none; }
        .choice-btn:hover { background: var(--main-pink); color: white; transform: translateY(-2px); }

        #result-area { display: none; }
        .res-img { width: 220px; filter: drop-shadow(0 8px 20px rgba(0,0,0,0.1)); margin: 15px 0; animation: bounce 2s infinite alternate ease-in-out; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
        
        .res-name { color: var(--main-pink); font-size: 24px; margin: 10px 0; }
        .res-desc { font-size: 14px; line-height: 1.7; color: #666; background: #fffafa; padding: 15px; border-radius: 20px; margin-bottom: 20px; }

        .share-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .sns-btn { color: white; padding: 12px; border-radius: 25px; border: none; font-weight: bold; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .sns-btn:hover { opacity: 0.8; transform: scale(1.02); }
        .btn-x { background: #000; }
        .btn-line { background: var(--line-green); }

        .aisyo-section { margin-top: 30px; padding-top: 30px; border-top: 2px dashed var(--sub-pink); }
        .f-select { width: 100%; padding: 12px; border-radius: 20px; border: 2px solid var(--sub-pink); margin-bottom: 10px; font-family: inherit; font-size: 14px; background: #fffaff; color: #666; }
        .comp-box { display: none; background: #fff0f5; border: 2px solid var(--sub-pink); border-radius: 20px; padding: 15px; margin-top: 15px; }
    </style>
</head>
<body>

<nav class="navbar">
    <img src="./images/rogo.PNG" class="nav-logo-img" onclick="location.reload()">
</nav>

<div class="container">
    <div class="card" id="q-area">
        <div class="progress-bar" id="q-progress">しつもん 1 / 20</div>
        <div class="question-text" id="q-text"></div>
        <div id="q-choices"></div>
    </div>

    <div id="result-area">
        <div class="card">
            <div style="font-size:13px; color:var(--main-pink); font-weight:bold;">あなたにぴったりのパートナーは…</div>
            <img id="res-img" class="res-img" src="">
            <h2 id="res-name" class="res-name"></h2>
            <div id="res-desc" class="res-desc"></div>
            
            <button class="choice-btn" style="background:var(--main-pink); color:white; border:none; padding:18px;" onclick="location.href='my.html'">この子に会いに行く！</button>
            
            <div class="share-grid">
                <button class="sns-btn btn-x" onclick="shareX()">𝕏でシェア</button>
                <button class="sns-btn btn-line" onclick="shareLine()">LINEで送る</button>
            </div>
        </div>

        <div class="card aisyo-section">
            <h3 style="color:var(--main-pink); font-size:1.1rem; margin-bottom:5px;">🤝 ハグモ相性占い</h3>
            <p style="font-size:12px; color:#999; margin-bottom:15px;">気になる子との相性を占ってみよう！</p>
            <select id="char1" class="f-select"></select>
            <select id="char2" class="f-select"></select>
            <button class="choice-btn" onclick="checkComp()">キズナをチェック！</button>
            <div id="comp-result" class="comp-box">
                <div id="comp-score" style="font-size:26px; font-weight:bold; color:var(--main-pink);"></div>
                <div id="comp-reason" style="font-size:13px; margin-top:8px; line-height:1.5;"></div>
            </div>
        </div>
    </div>
</div>

<script>
// (中身のロジックは先ほどと同じなので省略せずにそのまま組み込んでいます)
const chars = [
    {id:"buta.PNG", name:"かぶた", type:"ISFJ", desc:"癒やし度No.1！いつもそばにいてくれる優しい子。"},
    {id:"tora.PNG", name:"とまとら", type:"ESTP", desc:"情熱たっぷり！冒険へ連れ出してくれるリーダー。"},
    {id:"risu.PNG", name:"きゅうりす", type:"INFJ", desc:"あなたの心に静かに寄り添う、理解者さん。"},
    {id:"saru.PNG", name:"れもんきー", type:"ENFP", desc:"毎日をワクワクに変える、自由なアイディアマン。"},
    {id:"kame.PNG", name:"ぶるーべりくがめ", type:"INTJ", desc:"冷静でスマート。あなたのピンチを救う戦略家。"},
    {id:"imo.PNG", name:"さつまいもぐら", type:"ISTJ", desc:"誠実で真面目。一歩ずつ一緒に歩める努力家。"},
    {id:"nga.PNG", name:"もももんが", type:"ESFP", desc:"笑顔の天才！甘えん坊な愛されアイドル。"},
    {id:"kuma.PNG", name:"くろいちじくま", type:"INFP", desc:"独自の世界観を持つ、心優しい芸術家。"},
    {id:"chabo.PNG", name:"かぼちゃぼ", type:"ENTP", desc:"ポジティブ全開！驚きをくれる魔法使い。"},
    {id:"jaku.PNG", name:"ばたふらいぴーこっく", type:"ENTJ", desc:"自信満々！あなたをリードする頼れる存在。"}
];

const questions = [
    {t:"休日は外で遊ぶより、お家でのんびりしたい", v:"I"},
    {t:"映画を観るとき、ストーリーより映像の美しさが気になる", v:"S"},
    {t:"理由よりも「その時の気持ち」を大切にしたい", v:"F"},
    {t:"予定はきっちり決めてから動きたい", v:"J"},
    {t:"知らない人がいる場所でもすぐに馴染める", v:"E"},
    {t:"「もしも魔法が使えたら」と空想するのが好き", v:"N"},
    {t:"悩み相談には、共感より解決策がほしい", v:"T"},
    {t:"机の上は散らかっているほうが落ち着く", v:"P"},
    {t:"大人数より、1人や少人数のほうが楽だ", v:"I"},
    {t:"マニュアルを読むより、まずやってみる派だ", v:"S"},
    {t:"物語の裏側や伏線を考えるのが好き", v:"N"},
    {t:"物事は感情を挟まず冷静に考えたい", v:"T"},
    {t:"自分から声をかけるより、待つほうだ", v:"I"},
    {t:"困っている人を放っておけない", v:"F"},
    {t:"提出物は期限のずっと前に終わらせる", v:"J"},
    {t:"その場の思いつきで動くのが楽しい", v:"P"},
    {t:"人前で注目されるのは嫌いじゃない", v:"E"},
    {t:"新しいものより、いつものやり方が安心する", v:"S"},
    {t:"誰かの笑顔を見ると自分も嬉しくなる", v:"F"},
    {t:"部屋の片付けは完璧にしたい", v:"J"}
];

let step = 0, score = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0}, finalChar = null;

function showQ() {
    const q = questions[step];
    document.getElementById('q-progress').innerText = `しつもん ${step+1} / 20`;
    document.getElementById('q-text').innerText = q.t;
    const box = document.getElementById('q-choices');
    box.innerHTML = '';
    [{t:"すごくそう思う", a:2}, {t:"そう思う", a:1}, {t:"あまり思わない", a:-1}, {t:"全然思わない", a:-2}].forEach(o => {
        const b = document.createElement('button');
        b.className='choice-btn';
        b.innerText=o.t;
        b.onclick=()=>{
            let k = o.a>0 ? q.v : {E:"I",I:"E",S:"N",N:"S",T:"F",F:"T",J:"P",P:"J"}[q.v];
            score[k] += Math.abs(o.a);
            step++;
            if(step < questions.length) showQ(); else showRes();
        };
        box.appendChild(b);
    });
}

function showRes() {
    let type = (score.E>=score.I?"E":"I")+(score.N>=score.S?"N":"S")+(score.T>=score.F?"T":"F")+(score.J>=score.P?"J":"P");
    finalChar = chars.find(c => c.type === type) || chars[0];
    localStorage.setItem('myHagumo', JSON.stringify({img: finalChar.id, love: 50}));
    
    document.getElementById('q-area').style.display='none';
    document.getElementById('result-area').style.display='block';
    document.getElementById('res-img').src = `./images/${finalChar.id}`;
    document.getElementById('res-name').innerText = finalChar.name;
    document.getElementById('res-desc').innerText = finalChar.desc;

    const s1 = document.getElementById('char1'), s2 = document.getElementById('char2');
    chars.forEach(c => {
        s1.add(new Option(c.name, c.id));
        s2.add(new Option(c.name, c.id));
    });
    s1.value = finalChar.id;
}

function shareX() {
    const text = `私にぴったりのハグモは「${finalChar.name}」でした！🎀\nみんなも運命のパートナーを見つけてね！\n#MYHAGUMO #ハグモ診断`;
    window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(window.location.href)}`, '_blank');
}

function shareLine() {
    const text = `私にぴったりのハグモは「${finalChar.name}」だったよ！🎀 みんなは何タイプかな？診断してみてね！\n${window.location.href}`;
    window.open(`https://social-plugins.line.me/lineit/share?text=${encodeURIComponent(text)}`, '_blank');
}

function checkComp() {
    const c1 = chars.find(c => c.id === document.getElementById('char1').value);
    const c2 = chars.find(c => c.id === document.getElementById('char2').value);
    let m = 0;
    for(let i=0; i<4; i++) if(c1.type[i] === c2.type[i]) m++;
    let s = 60 + (m * 10);
    if(c1.id === c2.id) s = 99;
    
    document.getElementById('comp-result').style.display = 'block';
    document.getElementById('comp-score').innerText = `相性 ${s}%`;
    document.getElementById('comp-reason').innerText = m >= 3 ? "お互いのことが手に取るようにわかる、運命のパズルが重なる相性です！" : "お互いの個性を高め合える、ポジティブで楽しい関係になれそう！";
}

window.onload = showQ;
</script>
</body>
</html>
