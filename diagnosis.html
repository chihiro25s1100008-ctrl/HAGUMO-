<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HAGUMO | Partner Diagnosis</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --main-pink: #ff7eb9; 
            --soft-pink: #fff5f7; 
            --pink1: #ffb3d9; 
            --pink2: #d1478e;
            --white-glass: rgba(255, 255, 255, 0.85);
            scroll-behavior: smooth;
        }
        
        body { 
            font-family: 'Zen Maru Gothic', sans-serif; 
            background: #fffafc; 
            margin: 0; 
            padding-top: 80px; 
            color: #555; 
            overflow-x: hidden; 
            background-image: radial-gradient(#ffdfec 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* --- ナビゲーション（HOMEと完全統一） --- */
        .nav { 
            position: fixed; top: 0; left: 0; width: 100%; 
            background: var(--white-glass); backdrop-filter: blur(10px);
            z-index: 10000; border-bottom: 2px solid rgba(255, 179, 217, 0.3); padding: 12px 0;
        }
        .nav-content { 
            max-width: 1100px; margin: 0 auto; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .nav-logo-img { height: 35px; cursor: pointer; transition: 0.3s; }
        .nav-logo-img:hover { transform: scale(1.1) rotate(-3deg); }
        
        .nav-links { display: flex; gap: 12px; }
        .nav-link { 
            color: #888; text-decoration: none; font-size: 12px; font-weight: bold; 
            padding: 6px 12px; border-radius: 50px; transition: 0.3s;
            border: 1px solid transparent;
            font-family: 'Quicksand', sans-serif;
            white-space: nowrap;
        }
        .nav-link:hover, .nav-link.active { 
            color: var(--pink2); background: white; border-color: var(--pink1);
            box-shadow: 0 4px 10px rgba(255, 126, 185, 0.2);
        }

        /* --- 診断セクションのデザイン調整 --- */
        .diag-hero { padding: 60px 20px 20px; text-align: center; }
        .diag-hero h1 { color: var(--pink2); font-size: clamp(24px, 8vw, 32px); margin-bottom: 15px; font-weight: 800; letter-spacing: 2px; font-family: 'Quicksand', sans-serif; }
        .diag-hero p { color: #8a7a7e; font-size: 16px; font-weight: bold; }

        .diag-container { max-width: 650px; margin: 0 auto 80px; padding: 0 15px; position: relative; }

        .q-card {
            background: white; border-radius: 45px; padding: 60px 30px 40px;
            box-shadow: 0 20px 50px rgba(255, 126, 185, 0.15); text-align: center;
            border: 1px solid #eee; min-height: 480px;
            display: flex; flex-direction: column; justify-content: center; position: relative;
            z-index: 5;
        }

        .progress-container { position: absolute; top: 35px; left: 10%; width: 80%; display: flex; align-items: center; gap: 10px; }
        .progress-bar { flex-grow: 1; height: 10px; background: #f0f0f0; border-radius: 10px; overflow: hidden; }
        .progress-inner { height: 100%; background: linear-gradient(90deg, var(--pink1), var(--main-pink)); transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); width: 0%; }
        .progress-icon { font-size: 18px; transition: 0.6s; }

        .q-text { font-size: clamp(18px, 6vw, 22px); color: var(--pink2); font-weight: 800; margin: 30px 0 35px; line-height: 1.6; }
        .ans-list { display: flex; flex-direction: column; gap: 15px; }

        .puffy-ans-btn {
            background: white; color: var(--pink2); border: 2px solid #fff0f6;
            padding: 18px 20px; border-radius: 25px; font-weight: 800; font-size: 15px;
            box-shadow: 0 6px 0 #fff0f6; transition: 0.2s; cursor: pointer; position: relative; top: 0;
            outline: none; -webkit-tap-highlight-color: transparent;
        }
        .puffy-ans-btn:hover { background: var(--soft-pink); border-color: var(--pink1); transform: translateY(-2px); }
        .puffy-ans-btn:active { top: 4px; box-shadow: 0 2px 0 #fff0f6; }

        /* 結果エリア */
        #result-area { display: none; flex-direction: column; align-items: center; }
        .result-img-box {
            width: 180px; height: 180px; margin: 0 auto 20px;
            background: radial-gradient(circle, #fff 0%, var(--soft-pink) 100%);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: 4px solid white; box-shadow: 0 10px 25px rgba(255, 126, 185, 0.15);
            position: relative;
        }
        .result-img-box::before { content: "✨"; position: absolute; top: -10px; right: -10px; font-size: 30px; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }
        .result-img { width: 140px; height: 140px; object-fit: contain; z-index: 2; }
        
        .result-name { font-size: 28px; color: var(--pink2); font-weight: 800; margin-bottom: 12px; }
        .result-desc { 
            font-size: 14px; color: #666; text-align: left; line-height: 1.8; 
            background: #fafafa; padding: 20px; border-radius: 30px; 
            border: 1px solid #f0f0f0; margin-bottom: 25px;
        }

        .share-area { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; }
        .share-btn { flex: 1; padding: 15px; border-radius: 20px; text-decoration: none; font-size: 12px; font-weight: 800; color: white; text-align: center; transition: 0.3s; }
        .btn-x { background: #000; }
        .btn-line { background: #06C755; }

        .cta-btn {
            background: linear-gradient(135deg, var(--main-pink), var(--pink2)); color: white; border: 4px solid white; 
            padding: 20px; border-radius: 40px; font-weight: 800; font-size: 18px;
            box-shadow: 0 10px 25px rgba(255, 126, 185, 0.3); cursor: pointer; width: 100%; transition: 0.3s;
        }
        .cta-btn:hover { transform: scale(1.03) translateY(-3px); }

        footer { background: #fff0f6; padding: 60px 20px; text-align: center; border-top: 2px dashed var(--pink1); }

        @media screen and (max-width: 480px) {
            .nav-links { gap: 5px; overflow-x: auto; padding-bottom: 5px; }
            .nav-link { padding: 5px 10px; font-size: 11px; }
        }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="nav-content">
            <img src="./images/rogo.PNG" class="nav-logo-img" alt="HAGUMO Logo" onclick="location.href='index.html'">
            <div class="nav-links">
                <a href="index.html" class="nav-link">HOME</a>
                <a href="world.html" class="nav-link">WORLD</a>
                <a href="product.html" class="nav-link">PRODUCT</a>
                <a href="hagumo.html" class="nav-link">HAGUMO</a>
                <a href="diagnosis.html" class="nav-link">DIAGNOSIS</a>
                <a href="my.html" class="nav-link">MY HAGUMO</a>
            </div>
        </div>
    </nav>

    <div class="diag-container">
        <section class="diag-hero">
            <h1>PARTNER DIAGNOSIS</h1>
            <p>あなたにぴったりのHAGUMOを見つけよう 🌱</p>
        </section>

        <div id="question-area" class="q-card">
            <div class="progress-container">
                <div class="progress-bar"><div id="p-inner" class="progress-inner"></div></div>
                <div id="p-icon" class="progress-icon">🌱</div>
            </div>
            <div class="q-text" id="q-text">準備中...</div>
            <div class="ans-list" id="ans-list"></div>
        </div>

        <div id="result-area" class="q-card">
            <p style="color:var(--pink1); font-size:13px; font-weight:800; margin-top: 0;">＼ あなたにぴったりなのは… ／</p>
            <div class="result-img-box">
                <img src="" class="result-img" id="res-img">
            </div>
            <div class="result-name" id="res-name"></div>
            <div class="result-desc" id="res-desc"></div>
            
            <div class="share-area">
                <a href="#" id="share-x" target="_blank" class="share-btn btn-x">Xでシェア</a>
                <a href="#" id="share-line" target="_blank" class="share-btn btn-line">LINEで送る</a>
            </div>
            
            <button onclick="goToMyHagumo()" class="cta-btn">この子とお部屋へ行く ✨</button>
            <a href="diagnosis.html" style="color:#aaa; font-size:12px; text-decoration:underline; margin-top:20px; font-weight: bold;">もう一度やり直す</a>
        </div>
    </div>

    <footer>
        <p style="color: var(--pink2); font-weight: 800; font-size: 18px; margin-bottom: 15px; letter-spacing: 2px;">🎀 HAGUMO project 🎀</p>
        <p style="font-size: 11px; color: #8a7a7e; line-height: 2; max-width: 500px; margin: 0 auto; font-weight: bold;">
            ※これは授業課題のプロトタイプです。<br>
            実際の商品の販売・発送は行っておりません。
        </p>
    </footer>

    <script>
        // ナビゲーションのActive管理（HOMEと統一）
        function handleNavigation() {
            let currentPath = window.location.pathname.split("/").pop() || 'index.html';
            const navLinks = document.querySelectorAll('.nav-link');
            navLinks.forEach(link => {
                if (link.getAttribute('href') === currentPath) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        }
        window.addEventListener("load", handleNavigation);

        // 診断ロジック
        const questions = [
            { q: "今日の気分は？", a: [
                { t: "のんびり、リラックスしたいな ☁️", p: ["buta", "nga", "kuma"] }, 
                { t: "ワクワク、刺激がほしい！ ✨", p: ["tora", "chabo", "risu"] }, 
                { t: "集中して何かを成し遂げたい 🖋️", p: ["kame", "imo", "jaku"] }, 
                { t: "どこか遠くへ行きたい気分 ✈️", p: ["saru"] }
            ]},
            { q: "あなた自身の性格を動物に例えると？", a: [
                { t: "みんなを癒やす、おっとりさん", p: ["buta", "imo"] }, 
                { t: "元気いっぱいのムードメーカー", p: ["chabo", "tora", "nga"] }, 
                { t: "一人の時間も大切にするタイプ", p: ["kuma", "kame"] }, 
                { t: "自由奔放で、好奇心旺盛！", p: ["saru", "risu", "jaku"] }
            ]},
            { q: "どんな「キレイ」を目指したい？", a: [
                { t: "思わず触れたくなる、もちもち肌", p: ["nga", "chabo"] }, 
                { t: "透き通るような、明るい透明感", p: ["buta", "tora"] }, 
                { t: "スッキリ軽やか、健康的な美しさ", p: ["risu", "saru"] }, 
                { t: "凛とした、知的な大人の雰囲気", p: ["kame", "jaku"] }
            ]},
            { q: "直感で惹かれる色はどっち？", a: [
                { t: "エネルギッシュな暖色系（赤・黄）", p: ["tora", "chabo", "saru"] }, 
                { t: "穏やかで優しいパステル系", p: ["buta", "nga", "risu"] }, 
                { t: "クールで落ち着いた寒色系", p: ["kame", "jaku", "kuma", "imo"] }
            ]},
            { q: "HAGUMOと一緒に何がしたい？", a: [
                { t: "お家でまったり、お喋りしたい", p: ["buta", "nga", "chabo"] }, 
                { t: "新しいことに一緒に挑戦したい！", p: ["saru", "tora", "risu"] }, 
                { t: "毎日の習慣をサポートしてほしい", p: ["kame", "imo", "jaku", "kuma"] }
            ]}
        ];

        const characters = [
            { id:"buta", name:"かぶた", img:"./images/buta.PNG", desc:"【優しさ×包容】控えめで優しい『かぶた』。アミラーゼたっぷりのカブで、お肌のくすみを飛ばしてピュアな透明感を引き出します。" },
            { id:"nga", name:"もももんが", img:"./images/nga.PNG", desc:"【愛嬌×甘え上手】甘えん坊な『もももんが』。桃のようなジューシーな潤い成分で、触れたくなるようなモチモチ肌を一緒に作りましょう。" },
            { id:"risu", name:"きゅうりす", img:"./images/risu.PNG", desc:"【バランス×調和】働き者の『きゅうりす』。カリウムたっぷりのキュウリでむくみをリフレッシュして、心も体も整えます。" },
            { id:"kame", name:"ぶるーべりくがめ", img:"./images/kame.PNG", desc:"【知性×分析】落ち着いた『ぶるーべりくがめ』。アントシアニンの魔法で、スマホ疲れの瞳をパッチリ輝かせてくれます。" },
            { id:"tora", name:"とまとら", img:"./images/tora.PNG", desc:"【情熱×リーダー】パワフルな『とまとら』。リコピンの力で、太陽に負けない内側からの強さと美しさを引き出します。" },
            { id:"kuma", name:"くろいちじくま", img:"./images/kuma.PNG", desc:"【静か×ミステリアス】匠の精神を持つ『くろいちじくま』。磨き上げられたようなツヤ肌を、そっとプロデュースしてくれます。" },
            { id:"saru", name:"れもんきー", img:"./images/saru.PNG", desc:"【ひらめき×自由】好奇心旺盛な『れもんきー』。ビタミンCたっぷりのレモンで、心もお肌もパッと明るくリフレッシュ！" },
            { id:"imo", name:"さつまいもぐら", img:"./images/imo.PNG", desc:"【努力×継続】コツコツ頑張る『さつまいもぐら』。土の中でじっくり育つように、あなたの本質的な美しさを支えます。" },
            { id:"chabo", name:"かぼちゃぼ", img:"./images/chabo.PNG", desc:"【明るい×ポジティブ】元気いっぱいな『かぼちゃぼ』。βカロテンのバリアで、乾燥に負けないふっくら温かいお肌へ。" },
            { id:"jaku", name:"ばたふらいぴーこっく", img:"./images/jaku.PNG", desc:"【機転×賢さ】優雅で賢い『ばたふらいぴーこっく』。凛とした大人の美しさと、揺るがない自信を与えてくれます。" }
        ];

        let currentIdx = 0;
        let points = {};
        characters.forEach(c => { points[c.id] = 0; });

        function showNext() {
            const q = questions[currentIdx];
            const progress = ((currentIdx + 1) / questions.length) * 100;
            document.getElementById('p-inner').style.width = progress + "%";
            
            document.getElementById('q-text').innerText = q.q;
            const list = document.getElementById('ans-list');
            list.innerHTML = "";
            
            q.a.forEach((ans, i) => {
                const b = document.createElement('button');
                b.className = "puffy-ans-btn";
                b.innerText = ans.t;
                b.onclick = () => {
                    ans.p.forEach(id => { points[id] = (points[id] || 0) + 1; });
                    currentIdx++;
                    if(currentIdx < questions.length) showNext();
                    else showResult();
                };
                list.appendChild(b);
            });
        }

        function showResult() {
            document.getElementById('question-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'flex';

            let maxScore = -1;
            let winners = [];
            for(let id in points) {
                if(points[id] > maxScore) {
                    maxScore = points[id];
                    winners = [id];
                } else if(points[id] === maxScore) {
                    winners.push(id);
                }
            }

            const resultCharId = winners[Math.floor(Math.random() * winners.length)];
            const char = characters.find(c => c.id === resultCharId);

            document.getElementById('res-img').src = char.img;
            document.getElementById('res-name').innerText = char.name;
            document.getElementById('res-desc').innerText = char.desc;

            const shareUrl = window.location.href;
            const shareText = `私のHAGUMOパートナーは「${char.name}」でした！ 🌱 #HAGUMO`;
            document.getElementById('share-x').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(shareUrl)}`;
            document.getElementById('share-line').href = `https://line.me/R/msg/text/?${encodeURIComponent(shareText + "\n" + shareUrl)}`;
        }

        function goToMyHagumo() {
            // ここで選択されたキャラIDを渡すなどの処理
            location.href = 'my.html';
        }

        showNext();
    </script>
</body>
</html>
