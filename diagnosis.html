<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAGUMO 覚醒診断</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700&family=Noto+Sans+JP&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Noto Sans JP',sans-serif;
background:linear-gradient(180deg,#fffdf8,#ffeef6);
text-align:center;
color:#444;
}

.nav{
display:flex;
justify-content:center;
gap:15px;
padding:15px;
background:white;
position:sticky;
top:0;
flex-wrap:wrap;
box-shadow:0 5px 20px rgba(0,0,0,.05);
}

.nav a{
text-decoration:none;
color:#ff7eb9;
font-weight:bold;
font-size:14px;
}

.container{
max-width:900px;
margin:40px auto;
padding:20px;
}

button{
display:block;
width:100%;
max-width:420px;
margin:12px auto;
padding:14px;
border:none;
border-radius:999px;
background:linear-gradient(90deg,#ff9ecb,#ff7eb9);
color:white;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{transform:scale(1.05);}

.loading{
display:none;
margin-top:50px;
font-size:20px;
font-weight:bold;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{opacity:.3;}
50%{opacity:1;}
100%{opacity:.3;}
}

.result-card{
display:none;
margin-top:40px;
background:white;
padding:30px;
border-radius:30px;
box-shadow:0 25px 60px rgba(0,0,0,.1);
animation:fadeUp .8s ease;
}

.result-card img{
width:160px;
opacity:0;
transform:translateY(40px) scale(.8);
animation:appear .8s ease forwards;
animation-delay:.5s;
}

@keyframes appear{
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

.compat{
margin-top:20px;
padding:20px;
background:#fff5fa;
border-radius:20px;
}

.share{
margin-top:20px;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

.saved{
margin-top:20px;
padding:15px;
background:#f0fff6;
border-radius:15px;
font-size:14px;
}

</style>
</head>
<body>

<div class="nav">
<a href="index.html">HOME</a>
<a href="world.html">WORLD</a>
<a href="hagumo.html">HAGUMO</a>
<a href="diagnosis.html">DIAGNOSIS</a>
<a href="product.html">PRODUCT</a>
</div>

<div class="container">

<h1>🌱 ハグモ覚醒診断</h1>

<div id="savedResult" class="saved"></div>
<div id="quiz"></div>

<div class="loading" id="loading">
🌿 ハグモ覚醒中・・・
</div>

<div class="result-card" id="resultCard">
<h2 id="resultTitle"></h2>
<img id="resultImg">
<p id="resultDesc"></p>

<div class="compat">
<h3>🤝 相性ハグモ</h3>
<img id="compatImg" style="width:100px;">
<p id="compatText"></p>
</div>

<div class="share">
<button onclick="shareResult()">Xでシェアする</button>
</div>

</div>
</div>

<script>

const hagumoData={
きゅうりす:{img:"images/risu.PNG",desc:"調和とバランスの守護者。",compat:"とまとら"},
とまとら:{img:"images/tora.PNG",desc:"情熱と突破力の象徴。",compat:"きゅうりす"},
れもんきー:{img:"images/saru.PNG",desc:"自由な発想の革命家。",compat:"ぶるーべりくがめ"},
ぶるーべりくがめ:{img:"images/kame.PNG",desc:"冷静沈着な知略家。",compat:"れもんきー"},
かぶた:{img:"images/buta.PNG",desc:"包容力あふれる癒し系。",compat:"もももんが"},
さつまいもぐら:{img:"images/imo.PNG",desc:"努力と継続の職人。",compat:"かぶた"},
もももんが:{img:"images/nga.PNG",desc:"愛嬌たっぷりの人気者。",compat:"かぶた"},
くろいちじくま:{img:"images/kuma.PNG",desc:"静かなカリスマ。",compat:"ぶるーべりくがめ"},
かぼちゃぼ:{img:"images/chabo.PNG",desc:"陽気なムードメーカー。",compat:"とまとら"},
ばたふらいぴーこっく:{img:"images/jaku.PNG",desc:"華麗なる知性の舞姫。",compat:"れもんきー"}
};

const questions=[
"朝の理想の過ごし方は？",
"チームではどんな役？",
"理想の育て方は？",  // ←変更した質問
"困った時どうする？",
"理想の休日は？",
"人に言われる性格は？",
"挑戦と安定どっち？",
"好きな場所は？",
"直感派？論理派？",
"あなたの強みは？"
];

const options=[
["ゆったり","計画的","即行動"],
["支える","まとめる","盛り上げる"],
["コツコツ育成","バランス重視","大胆チャレンジ"],
["相談する","分析する","突き進む"],
["家","カフェ","旅"],
["優しい","冷静","明るい"],
["安定","バランス","挑戦"],
["自然","図書館","街"],
["直感","論理","ひらめき"],
["包容力","知性","情熱"]
];

let scores={};
Object.keys(hagumoData).forEach(k=>scores[k]=0);
let current=0;

function showQuestion(){
if(current>=questions.length){
document.getElementById("quiz").style.display="none";
document.getElementById("loading").style.display="block";
setTimeout(showResult,2000);
return;
}

document.getElementById("quiz").innerHTML=`
<h3>Q${current+1}. ${questions[current]}</h3>
${options[current].map((opt,i)=>`<button onclick="answer(${i})">${opt}</button>`).join("")}
`;
}

function answer(i){
const mapping=[
["かぶた","きゅうりす","とまとら"],
["さつまいもぐら","きゅうりす","かぼちゃぼ"],
["さつまいもぐら","きゅうりす","れもんきー"],
["かぶた","ぶるーべりくがめ","とまとら"],
["さつまいもぐら","きゅうりす","れもんきー"],
["かぶた","ぶるーべりくがめ","かぼちゃぼ"],
["さつまいもぐら","きゅうりす","れもんきー"],
["さつまいもぐら","ぶるーべりくがめ","れもんきー"],
["もももんが","ぶるーべりくがめ","ばたふらいぴーこっく"],
["かぶた","ぶるーべりくがめ","とまとら"]
];

scores[mapping[current][i]]+=2;
current++;
showQuestion();
}

function showResult(){
document.getElementById("loading").style.display="none";

let top=Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);
localStorage.setItem("hagumoResult",top);

let data=hagumoData[top];
let compat=data.compat;

document.getElementById("resultTitle").innerText="あなたの覚醒ハグモは「"+top+"」";
document.getElementById("resultImg").src=data.img;
document.getElementById("resultDesc").innerText=data.desc;

document.getElementById("compatImg").src=hagumoData[compat].img;
document.getElementById("compatText").innerText=compat+" と最高相性！";

document.getElementById("resultCard").style.display="block";
}

function shareResult(){
let text=document.getElementById("resultTitle").innerText+"｜HAGUMO覚醒診断";
let url=encodeURIComponent(location.href);
window.open("https://twitter.com/intent/tweet?text="+encodeURIComponent(text)+"&url="+url);
}

function showSaved(){
let saved=localStorage.getItem("hagumoResult");
if(saved){
document.getElementById("savedResult").innerText="🌟 前回の診断結果： "+saved;
}
}

showSaved();
showQuestion();

</script>
</body>
</html>
