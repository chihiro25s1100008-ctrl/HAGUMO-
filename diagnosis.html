<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAGUMO DIAGNOSIS</title>

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: linear-gradient(180deg, #fffdf8, #ffeef5);
            text-align: center;
        }

        /* 質問ボックス */
        .question-box {
            max-width: 500px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .08);
        }

        button {
            padding: 12px 25px;
            margin: 10px;
            border: none;
            border-radius: 30px;
            background: #ff9fcf;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #ff4fa3;
        }

        /* ローディング */
        .loading {
            display: none;
            font-size: 20px;
            margin-top: 40px;
        }

        /* 結果表示 */
        .result {
            display: none;
            margin-top: 40px;
            animation: fade 1s;
        }

        @keyframes fade {
            from { opacity: 0 }
            to { opacity: 1 }
        }

        .result img {
            width: 200px;
            border-radius: 20px;
        }
    </style>
</head>

<body>

    <h1>🌿 ハグモ覚醒診断</h1>

    <div class="question-box" id="questionBox">
        <h2 id="questionText"></h2>
        <div id="answers"></div>
    </div>

    <div class="loading" id="loading">
        🌈 ハグモが覚醒中...
    </div>

    <div class="result" id="result">
        <h2 id="resultName"></h2>
        <img id="resultImg">
        <p id="resultDesc"></p>
        <h3>💞 相性ハグモ</h3>
        <img id="compatImg" width="120">
    </div>
