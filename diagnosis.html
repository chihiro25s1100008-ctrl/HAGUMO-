<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIAGNOSIS | HAGUMO</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --main-pink: #ff7eb9; 
            --soft-pink: #fff5f7; 
            --pink1: #ffb3d9; 
            --pink2: #d1478e; 
            --white: #ffffff;
        }
        
        body { 
            font-family: 'Zen Maru Gothic', sans-serif; 
            background: var(--soft-pink); 
            margin: 0; 
            padding-top: 100px; 
            color: #555; 
            overflow-x: hidden;
            background-image: radial-gradient(#ffdfec 1px, transparent 1px);
            background-size: 30px 30px; /* ドット背景で可愛く */
        }

        /* ナビゲーション */
        .nav { position: fixed; top: 0; left: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); z-index: 10000; border-bottom: 2px solid #fff0f6; padding: 10px 0; }
        .nav-content { max-width: 1100px; margin: 0 auto; padding: 0 20px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .nav-logo-img { height: 32px; cursor: pointer; transition: 0.3s; }
        .nav-logo-img:active { transform: scale(0.9); }
        .nav-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px 12px; }
        .nav-link { color: #888; text-decoration: none; font-size: 12px; font-weight: bold; padding: 5px 12px; border-radius: 20px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: var(--main-pink); background: var(--soft-pink); }

        @media screen and (min-width: 769px) {
            body { padding-top: 90px; }
            .nav-content { flex-direction: row; justify-content: space-between; height: 60px; }
            .nav-link { font-size: 14px; }
        }

        /* ヒーローセクション */
        .diag-hero { padding: 40px 20px 20px; text-align: center; }
        .diag-hero h1 { color: var(--pink2); font-size: clamp(24px, 8vw, 32px); margin-bottom: 10px; font-weight: 800; letter-spacing: 2px; font-family: 'Quicksand', sans-serif; }
        .diag-hero p { color: #a38b92; font-size: 14px; font-weight: bold; }

        .diag-container { max-width: 650px; margin: 0 auto 80px; padding: 0 15px; position: relative; }

        /* 質問カード：高級感と奥行き */
        .q-card {
            background: rgba(255, 255, 255, 0.95); border-radius: 45px; padding: 50px 30px;
            box-shadow: 0 20px 50px rgba(255, 126, 185, 0.15); text-align: center;
            border: 4px solid var(--white); min-height: 480px;
            display: flex; flex-direction: column; justify-content: center; position: relative;
            z-index: 5;
        }

        /* プログレスバーの豪華版 */
        .progress-container { position: absolute; top: 30px; left: 10%; width: 80%; display: flex; align-items: center; gap: 10px; }
        .progress-bar { flex-grow: 1; height: 10px; background: #eee; border-radius: 10px; overflow: hidden; }
        .progress-inner { height: 100%; background: linear-gradient(90deg, var(--pink1), var(--main-pink)); transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); width: 0%; }
        .progress-icon { font-size: 18px; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1)); transition: 0.6s; }

        .q-text { font-size: clamp(18px, 6vw, 22px); color: var(--pink2); font-weight: 800; margin: 30px 0 35px; line-height: 1.6; }
        .ans-list { display: flex; flex-direction: column; gap: 15px; }

        /* ぷにぷにボタン */
        .puffy-ans-btn {
            background: var(--white); color: var(--pink2); border: 2px solid #ffebf2;
            padding: 18px 20px; border-radius: 25px; font-weight: 800; font-size: 15px;
            box-shadow: 0 6px 0 #ffebf2; transition: 0.2s; cursor: pointer; position: relative; top: 0;
            outline: none; -webkit-tap-highlight-color: transparent;
        }
        .puffy-ans-btn:hover { background: var(--soft-pink); border-color: var(--pink1); transform: translateY(-2px); }
        .puffy-ans-btn:active { top: 4px; box-shadow: 0 2px 0 #ffebf2; background: #fff; }

        /* 結果エリアの豪華演出 */
        #result-area { display: none; animation: resultShow 1s cubic-bezier(0.22, 1, 0.36, 1) forwards; flex-direction: column; align-items: center; }
        @keyframes resultShow { 
            0% { opacity: 0; transform: scale(0.8) translateY(30px); } 
            100% { opacity: 1; transform: scale(1) translateY(0); } 
        }

        .result-img-box {
            width: 180px; height: 180px; margin: 0 auto 20px;
            background: radial-gradient(circle, #fff 0%, var(--soft-pink) 100%);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: 4px solid var(--white); box-shadow: 0 10px 25px rgba(255, 126, 185, 0.2);
            position: relative; overflow: visible;
        }
        /* 後ろのキラキラ */
        .result-img-box::before {
            content: "✨"; position: absolute; top: -10px; right: -10px; font-size: 30px; animation: blink 2s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }

        .result-img { width: 140px; height: 140px; object-fit: contain; z-index: 2; }
        
        .result-name { font-size: 28px; color: var(--pink2); font-weight: 800; margin-bottom: 12px; letter-spacing: 1px; }
        .result-desc { 
            font-size: 14px; color: #666; text-align: left; line-height: 1.8; 
            background: #fff; padding: 20px; border-radius: 30px; 
            border: 2px solid var(--soft-pink); margin-bottom: 25px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
        }

        /* アクションエリア */
        .share-area { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; }
        .share-btn { 
            flex: 1; padding: 15px; border-radius: 20px; text-decoration: none; font-size: 13px; 
            font-weight: 800; color: white; text-align: center; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn-x { background: #000; }
        .btn-line { background: #06C755; }
        .share-btn:hover { transform: translateY(-3px); opacity: 0.9; }

        .cta-btn {
            background: linear-gradient(135deg, var(--main-pink), var(--pink2)); color: white; border: none; 
            padding: 22px; border-radius: 40px; font-weight: 800; font-size: 18px;
            box-shadow: 0 8px 0 #a3386f; cursor: pointer; margin-bottom: 15px; width: 100%;
            transition: 0.2s; border: 3px solid white;
        }
        .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 0 #a3386f; }
        .cta-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #a3386f; }

        footer { text-align: center; padding: 60px 20px; background: white; border-top: 2px dashed var(--pink1); }

        /* アニメーション */
        @keyframes himeguma-rise {
            0% { transform: translateY(80px) scale(0.3) rotate(15deg); opacity: 0; }
            60% { transform: translateY(-15px) scale(1.1) rotate(-5deg); }
            100% { transform: translateY(0) scale(1) rotate(0); opacity: 1; }
        }
        .result-img.animate { animation: himeguma-rise 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* 背景に浮かぶ泡 */
        .bubble { position: fixed; background: rgba(255, 255, 255, 0.6); border-radius: 50%; pointer-events: none; z-index: 1; animation: float 10s infinite linear; }
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="bubble" style="width:20px; height:20px; left:10%; animation-duration: 8s;"></div>
    <div class="bubble" style="width:40px; height:40px; left:80%; animation-duration: 12s; animation-delay: 2s;"></div>
    <div class="bubble" style="width:15px; height:15px; left:50%; animation-duration: 15s; animation-delay: 5s;"></div>

    <nav class="nav">
        <div class="nav-content">
            <img src="./images/rogo.PNG" class="nav-logo-img" onclick="location.href='index.html'" alt="HAGUMO">
            <div class="nav-links">
                <a href="index.html" class="nav-link">HOME</a>
                <a href="world.html" class="nav-link">WORLD</a>
                <a href="product.html" class="nav-link">PRODUCT</a>
                <a href="hagumo.html" class="nav-link">HAGUMO</a>
                <a href="diagnosis.html" class="nav-link active">DIAGNOSIS</a>
                <a href="my.html" class="nav-link">MY HAGUMO</a>
            </div>
        </div>
    </nav>

    <div class="diag-container">
        <section class="diag-hero">
            <h1>PARTNER DIAGNOSIS</h1>
            <p>あなたにぴったりのHAGUMOを見つけよう 🌱</p>
        </section>

        <div id="question-area" class="q-card">
            <div class="progress-container">
                <div class="progress-bar"><div id="p-inner" class="progress-inner"></div></div>
                <div id="p-icon" class="progress-icon">🌱</div>
            </div>
            <div class="q-text" id="q-text">準備中...</div>
            <div class="ans-list" id="ans-list"></div>
        </div>

        <div id="result-area" class="q-card">
            <p style="color:var(--pink1); font-size:13px; font-weight:800; margin-top: 0;">＼ あなたにぴったりなのは… ／</p>
            <div class="result-img-box">
                <img src="" class="result-img" id="res-img">
            </div>
            <div class="result-name" id="res-name"></div>
            <div class="result-desc" id="res-desc"></div>
            
            <div class="share-area">
                <a href="#" id="share-x" target="_blank" class="share-btn btn-x">Xで結果を自慢する</a>
                <a href="#" id="share-line" target="_blank" class="share-btn btn-line">LINEで送る</a>
            </div>
            
            <button onclick="goToMyHagumo()" class="cta-btn">この子とお部屋へ行く ✨</button>
            <a href="diagnosis.html" style="color:#aaa; font-size:12px; text-decoration:underline; margin-top:10px; font-weight: bold;">もう一度やり直す</a>
        </div>
    </div>

    <footer>
        <p style="color: var(--pink2); font-weight: 800; font-size: 18px; margin-bottom: 12px; letter-spacing: 2px;">🎀 HAGUMO project 🎀</p>
        <p style="font-size: 11px; color: #a38b92; line-height: 1.8; max-width: 400px; margin: 0 auto; font-weight: bold;">
            これは学校の授業課題として作成されたプロトタイプです。<br>
            実際のサービス提供やグッズ販売は行っておりません。
        </p>
    </footer>

    <div id="hidden-chara" style="position:fixed; bottom:-60px; right:20px; font-size:40px; transition:0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor:pointer; z-index:10001;" onclick="this.style.transform='rotate(360deg) scale(1.5)';">🥕</div>

    <script>
        const questions = [
            { q: "今日の気分は？", a: [
                { t: "のんびり、リラックスしたいな ☁️", p: ["buta", "nga", "kuma"] }, 
                { t: "ワクワク、刺激がほしい！ ✨", p: ["tora", "chabo", "risu"] }, 
                { t: "集中して何かを成し遂げたい 🖋️", p: ["kame", "imo", "jaku"] }, 
                { t: "どこか遠くへ行きたい気分 ✈️", p: ["saru"] }
            ]},
            { q: "あなた自身の性格を動物に例えると？", a: [
                { t: "みんなを癒やす、おっとりさん", p: ["buta", "imo"] }, 
                { t: "元気いっぱいのムードメーカー", p: ["chabo", "tora", "nga"] }, 
                { t: "一人の時間も大切にするタイプ", p: ["kuma", "kame"] }, 
                { t: "自由奔放で、好奇心旺盛！", p: ["saru", "risu", "jaku"] }
            ]},
            { q: "どんな「キレイ」を目指したい？", a: [
                { t: "思わず触れたくなる、もちもち肌", p: ["nga", "chabo"] }, 
                { t: "透き通るような、明るい透明感", p: ["buta", "tora"] }, 
                { t: "スッキリ軽やか、健康的な美しさ", p: ["risu", "saru"] }, 
                { t: "凛とした、知的な大人の雰囲気", p: ["kame", "jaku"] }
            ]},
            { q: "直感で惹かれる色はどっち？", a: [
                { t: "エネルギッシュな暖色系（赤・黄）", p: ["tora", "chabo", "saru"] }, 
                { t: "穏やかで優しいパステル系", p: ["buta", "nga", "risu"] }, 
                { t: "クールで落ち着いた寒色系", p: ["kame", "jaku", "kuma", "imo"] }
            ]},
            { q: "HAGUMOと一緒に何がしたい？", a: [
                { t: "お家でまったり、お喋りしたい", p: ["buta", "nga", "chabo"] }, 
                { t: "新しいことに一緒に挑戦したい！", p: ["saru", "tora", "risu"] }, 
                { t: "毎日の習慣をサポートしてほしい", p: ["kame", "imo", "jaku", "kuma"] }
            ]}
        ];

        const characters = [
            { id:"buta", name:"かぶた", img:"./images/buta.PNG", desc:"【優しさ×包容】控えめで優しい『かぶた』。アミラーゼたっぷりのカブで、お肌のくすみを飛ばしてピュアな透明感を引き出します。" },
            { id:"nga", name:"もももんが", img:"./images/nga.PNG", desc:"【愛嬌×甘え上手】甘えん坊な『もももんが』。桃のようなジューシーな潤い成分で、触れたくなるようなモチモチ肌を一緒に作りましょう。" },
            { id:"risu", name:"きゅうりす", img:"./images/risu.PNG", desc:"【バランス×調和】働き者の『きゅうりす』。カリウムたっぷりのキュウリでむくみをリフレッシュして、心も体も整えます。" },
            { id:"kame", name:"ぶるーべりくがめ", img:"./images/kame.PNG", desc:"【知性×分析】落ち着いた『ぶるーべりくがめ』。アントシアニンの魔法で、スマホ疲れの瞳をパッチリ輝かせてくれます。" },
            { id:"tora", name:"とまとら", img:"./images/tora.PNG", desc:"【情熱×リーダー】パワフルな『とまとら』。リコピンの力で、太陽に負けない内側からの強さと美しさを引き出します。" },
            { id:"kuma", name:"くろいちじくま", img:"./images/kuma.PNG", desc:"【静か×ミステリアス】匠の精神を持つ『くろいちじくま』。磨き上げられたようなツヤ肌を、そっとプロデュースしてくれます。" },
            { id:"saru", name:"れもんきー", img:"./images/saru.PNG", desc:"【ひらめき×自由】好奇心旺盛な『れもんきー』。ビタミンCたっぷりのレモンで、心もお肌もパッと明るくリフレッシュ！" },
            { id:"imo", name:"さつまいもぐら", img:"./images/imo.PNG", desc:"【努力×継続】コツコツ頑張る『さつまいもぐら』。土の中でじっくり育つように、あなたの本質的な美しさを支えます。" },
            { id:"chabo", name:"かぼちゃぼ", img:"./images/chabo.PNG", desc:"【明るい×ポジティブ】元気いっぱいな『かぼちゃぼ』。βカロテンのバリアで、乾燥に負けないふっくら温かいお肌へ。" },
            { id:"jaku", name:"ばたふらいぴーこっく", img:"./images/jaku.PNG", desc:"【機転×賢さ】優雅で賢い『ばたふらいぴーこっく』。凛とした大人の美しさと、揺るがない自信を与えてくれます。" }
        ];

        let currentIdx = 0;
        let points = {};
        let resultCharId = "";

        characters.forEach(c => { points[c.id] = 0; });

        function showNext() {
            const q = questions[currentIdx];
            const progress = ((currentIdx + 1) / questions.length) * 100;
            document.getElementById('p-inner').style.width = progress + "%";
            document.getElementById('p-icon').style.transform = `translateX(${progress * 0.8}px) rotate(${progress * 2}deg)`;
            
            document.getElementById('q-text').innerText = q.q;
            const list = document.getElementById('ans-list');
            list.innerHTML = "";
            
            q.a.forEach((ans, i) => {
                const b = document.createElement('button');
                b.className = "puffy-ans-btn";
                b.innerText = ans.t;
                b.style.animation = `fadeIn 0.4s ease forwards ${i * 0.1}s`;
                b.onclick = () => {
                    ans.p.forEach(id => { points[id] = (points[id] || 0) + 1; });
                    currentIdx++;
                    if(currentIdx < questions.length) showNext();
                    else showResult();
                };
                list.appendChild(b);
            });
        }

        function showResult() {
            document.getElementById('question-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'flex';

            let maxScore = -1;
            let winners = [];
            for(let id in points) {
                if(points[id] > maxScore) {
                    maxScore = points[id];
                    winners = [id];
                } else if(points[id] === maxScore) {
                    winners.push(id);
                }
            }

            resultCharId = winners[Math.floor(Math.random() * winners.length)];
            const char = characters.find(c => c.id === resultCharId);

            const resImg = document.getElementById('res-img');
            resImg.src = char.img;
            resImg.classList.add('animate');

            document.getElementById('res-name').innerText = char.name;
            const extraDesc = "\n\n（この子は今、あなたと一緒に過ごせるのをとっても楽しみにしているみたい…！）";
            document.getElementById('res-desc').innerText = char.desc + extraDesc;

            const shareUrl = window.location.href;
            const shareText = `私のHAGUMOパートナーは「${char.name}」でした！ 🌱\nあなたもぴったりの子を見つけてみない？✨\n#HAGUMO`;

            document.getElementById('share-x').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(shareUrl)}`;
            document.getElementById('share-line').href = `https://line.me/R/msg/text/?${encodeURIComponent(shareText + "\n" + shareUrl)}`;
            
            // 隠しキャラ登場
            document.getElementById('hidden-chara').style.bottom = '20px';
        }

        function goToMyHagumo() {
            localStorage.setItem('hagu_current_char', resultCharId);
            location.href = 'my.html?chara=' + resultCharId;
        }

        showNext();
    </script>
</body>
</html>
