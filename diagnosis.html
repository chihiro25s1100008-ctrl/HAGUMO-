<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>診断 | MoeruTown</title>

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&family=Noto+Sans+JP&display=swap" rel="stylesheet">

<style>
body{
 margin:0;
 font-family:'Noto Sans JP',sans-serif;
 text-align:center;
 background:linear-gradient(#fff0f6,#f0f9ff);
 padding:80px 20px;
}

h1{
 font-family:'Zen Maru Gothic',sans-serif;
}

button{
 padding:14px 30px;
 margin:15px;
 border:none;
 border-radius:999px;
 background:#ff9ecb;
 color:white;
 cursor:pointer;
 transition:.3s;
}

button:hover{
 transform:scale(1.07);
}

#result{
 margin-top:40px;
 animation:fadeUp .6s ease;
}

@keyframes fadeUp{
 from{opacity:0; transform:translateY(20px)}
 to{opacity:1; transform:translateY(0)}
}

img{
 width:170px;
 border-radius:25px;
 margin-bottom:15px;
}

.home-link{
 display:inline-block;
 margin-top:30px;
 text-decoration:none;
 color:#ff7eb9;
}
</style>
</head>

<body>

<h1>あなたのタイプは？</h1>

<button onclick="showResult()">診断する</button>

<div id="result"></div>

<script>
function showResult(){
 document.getElementById("result").innerHTML = `
 <img src="images/risu.PNG"><br>
 💚きゅうりすタイプ！<br>
 <a href="index.html" class="home-link">← HOMEへ戻る</a>
 `;
}
</script>

</body>
</html>
