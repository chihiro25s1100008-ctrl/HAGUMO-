<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIAGNOSIS | HAGUMO</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-pink: #ff7eb9; --soft-pink: #fff5f7; --pink1: #ffb3d9; --pink2: #d1478e; }
        body { font-family: 'Zen Maru Gothic', sans-serif; background: var(--soft-pink); margin: 0; padding-top: 80px; }

        /* --- 共通ナビゲーション --- */
        .nav { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: white; z-index: 5000; border-bottom: 2px solid #fff0f6; display: flex; align-items: center; }
        .nav-content { width: 100%; max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box; }
        .nav-logo-img { height: 35px; cursor: pointer; flex-shrink: 0; }
        .nav-links { display: flex; gap: 15px; }
        .nav-link { color: #888; text-decoration: none; font-size: 13px; font-weight: bold; padding: 5px 2px; position: relative; transition: 0.3s; white-space: nowrap; }
        .nav-link:hover, .nav-link.active { color: var(--main-pink); }
        .nav-link.active::after { content: ""; position: absolute; bottom: -2px; left: 0; width: 100%; height: 2px; background: var(--main-pink); }

        .diag-hero { padding: 40px 20px; text-align: center; }
        .diag-container { max-width: 600px; margin: 0 auto 100px; padding: 0 20px; }

        .q-card {
            background: white; border-radius: 40px; padding: 40px 20px;
            box-shadow: 0 15px 35px rgba(255,105,180,0.15); text-align: center;
            border: 3px solid #fff0f5; min-height: 480px;
            display: flex; flex-direction: column; justify-content: center; position: relative;
        }

        .progress-bar { position: absolute; top: 25px; left: 10%; width: 80%; height: 8px; background: #eee; border-radius: 4px; }
        .progress-inner { height: 100%; background: var(--main-pink); border-radius: 4px; transition: 0.4s; width: 0%; }

        .q-text { font-size: 19px; color: var(--pink2); font-weight: bold; margin: 20px 0 30px; line-height: 1.5; }
        .ans-list { display: flex; flex-direction: column; gap: 12px; }

        .puffy-ans-btn {
            background: white; color: var(--pink2); border: 2px solid var(--pink1);
            padding: 16px; border-radius: 25px; font-weight: bold; font-size: 14px;
            box-shadow: 0 6px 0 var(--pink1); transition: 0.1s; cursor: pointer; position: relative; top: 0;
        }
        .puffy-ans-btn:active { top: 4px; box-shadow: 0 2px 0 var(--pink1); }

        /* 結果表示 */
        #result-area { display: none; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }

        .result-img-box {
            width: 180px; height: 180px; margin: 0 auto 20px;
            background: var(--soft-pink); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 3px dashed var(--pink1);
        }
        .result-img { width: 140px; height: 140px; object-fit: contain; }
        .result-name { font-size: 26px; color: var(--pink2); font-weight: bold; margin-bottom: 10px; }
        .result-desc { font-size: 14px; color: #666; text-align: left; line-height: 1.8; background: #fffafb; padding: 20px; border-radius: 20px; white-space: pre-wrap; }

        .share-area { display: flex; gap: 10px; margin-bottom: 20px; }
        .share-btn { flex: 1; padding: 12px; border-radius: 15px; text-decoration: none; font-size: 12px; font-weight: bold; color: white; text-align: center; }
        .btn-x { background: #000; }
        .btn-line { background: #06C755; }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="nav-content">
            <img src="./images/rogo.PNG" class="nav-logo-img" onclick="location.href='index.html'">
            <div class="nav-links">
                <a href="index.html" class="nav-link">HOME</a>
                <a href="world.html" class="nav-link">WORLD</a>
                <a href="hagumo.html" class="nav-link">HAGUMO</a>
                <a href="diagnosis.html" class="nav-link active">DIAGNOSIS</a>
                <a href="product.html" class="nav-link">PRODUCT</a>
                <a href="my.html" class="nav-link">MY HAGUMO</a>
            </div>
        </div>
    </nav>

    <div class="diag-container">
        <section class="diag-hero">
            <h1 style="color: var(--pink2); font-size: 24px;">PARTNER DIAGNOSIS</h1>
            <p style="color: #888; font-size: 12px;">あなたにぴったりのHAGUMOを見つけよう</p>
        </section>

        <div id="question-area" class="q-card">
            <div class="progress-bar"><div id="p-inner" class="progress-inner"></div></div>
            <div class="q-text" id="q-text">準備中...</div>
            <div class="ans-list" id="ans-list"></div>
        </div>

        <div id="result-area" class="q-card">
            <p style="color:#aaa; font-size:12px; font-weight:bold;">あなたの運命のパートナーは...</p>
            <div class="result-img-box"><img src="" class="result-img" id="res-img"></div>
            <div class="result-name" id="res-name"></div>
            <div class="result-desc" id="res-desc"></div>
            
            <div class="share-area">
                <a href="#" id="share-x" target="_blank" class="share-btn btn-x">Xでシェア</a>
                <a href="#" id="share-line" target="_blank" class="share-btn btn-line">LINEで送る</a>
            </div>
            
            <button onclick="goToMyHagumo()" class="puffy-ans-btn" style="background:var(--main-pink); color:white; border:none; box-shadow: 0 6px 0 #e667a3;">この子とお部屋へ行く 🌱</button>
            <a href="diagnosis.html" style="color:#ccc; font-size:12px; text-decoration:none; margin-top:15px;">もう一度診断する</a>
        </div>
    </div>

    <script>
        const questions = [
            { q: "休日の過ごし方は？", a: [{ t: "家でのんびり癒やされたい", p: ["buta", "nga", "kuma"] }, { t: "外に出てアクティブに遊ぶ！", p: ["tora", "chabo", "risu"] }, { t: "趣味や勉強に没頭する", p: ["kame", "imo", "jaku"] }, { t: "気まぐれにふらっと出かける", p: ["saru"] }] },
            { q: "周りからどんな性格って言われる？", a: [{ t: "優しくて聞き上手", p: ["buta", "imo"] }, { t: "明るいムードメーカー", p: ["chabo", "tora", "nga"] }, { t: "落ち着いていてミステリアス", p: ["kuma", "kame", "jaku"] }, { t: "個性的で自由人", p: ["saru", "risu"] }] },
            { q: "今、一番解決したい肌や体の悩みは？", a: [{ t: "乾燥してカサカサする", p: ["nga", "chabo"] }, { t: "透明感がなく、くすみがち", p: ["buta", "tora"] }, { t: "むくみや疲れを取りたい", p: ["risu", "saru"] }, { t: "スマホやPCで目が疲れている", p: ["kame", "jaku"] }] },
            { q: "直感で選ぶなら、どの色が好き？", a: [{ t: "情熱的なレッド系", p: ["tora", "chabo"] }, { t: "可愛いピンク・ホワイト系", p: ["nga", "buta"] }, { t: "クールなブルー・パープル系", p: ["kame", "jaku", "kuma"] }, { t: "フレッシュなイエロー・グリーン系", p: ["saru", "risu", "imo"] }] },
            { q: "パートナーに一番求めるものは？", a: [{ t: "絶対的な癒やしと安心感", p: ["buta", "nga", "chabo"] }, { t: "一緒に高め合える刺激と元気", p: ["saru", "tora", "risu"] }, { t: "賢くサポートしてくれる信頼感", p: ["kame", "jaku"] }, { t: "ブレない軸と努力を支える力", p: ["imo", "kuma"] }] }
        ];

        const characters = [
            { id:"buta", name:"かぶた", img:"./images/buta.PNG", desc:"【優しさ×包容】控えめで優しい『かぶた』。アミラーゼたっぷりのカブで、お肌のくすみを飛ばしてピュアな透明感を引き出します。" },
            { id:"nga", name:"もももんが", img:"./images/nga.PNG", desc:"【愛嬌×甘え上手】甘えん坊な『もももんが』。桃のようなジューシーな潤い成分で、触れたくなるようなモチモチ肌を一緒に作りましょう。" },
            { id:"risu", name:"きゅうりす", img:"./images/risu.PNG", desc:"【バランス×調和】働き者の『きゅうりす』。カリウムたっぷりのキュウリでむくみをリフレッシュ！" },
            { id:"kame", name:"ぶるーべりくがめ", img:"./images/kame.PNG", desc:"【知性×分析】落ち着いた『ぶるーべりくがめ』。アントシアニンの魔法で、スマホ疲れの瞳をパッチリ輝かせてくれます。" },
            { id:"tora", name:"とまとら", img:"./images/tora.PNG", desc:"【情熱×リーダー】パワフルな『とまとら』。リコピンの力で太陽に負けない美しさを。" },
            { id:"kuma", name:"くろいちじくま", img:"./images/kuma.PNG", desc:"【静か×ミステリアス】匠の精神を持つ『くろいちじくま』。磨き上げられたようなツヤ肌をプロデュースしてくれます。" },
            { id:"saru", name:"れもんきー", img:"./images/saru.PNG", desc:"【ひらめき×自由】好奇心旺盛な『れもんきー』。ビタミンCたっぷりのレモンで、心もお肌もパッと明るくリフレッシュ！" },
            { id:"imo", name:"さつまいもぐら", img:"./images/imo.PNG", desc:"【努力×継続】コツコツ頑張る『さつまいもぐら』。内側からブレない健康的な美しさを支えます。" },
            { id:"chabo", name:"かぼちゃぼ", img:"./images/chabo.PNG", desc:"【明るい×ポジティブ】元気いっぱいな『かぼちゃぼ』。乾燥に負けないふっくらと温かみのあるお肌に。" },
            { id:"jaku", name:"ばたふらいぴーこっく", img:"./images/jaku.PNG", desc:"【機転×賢さ】優雅で賢い『ばたふらいぴーこっく』。凛とした大人の美しさを引き出します。" }
        ];

        let currentIdx = 0;
        let points = {};
        let resultCharId = "";

        function showNext() {
            const q = questions[currentIdx];
            document.getElementById('p-inner').style.width = ((currentIdx + 1) / questions.length) * 100 + "%";
            document.getElementById('q-text').innerText = q.q;
            const list = document.getElementById('ans-list');
            list.innerHTML = "";
            q.a.forEach(ans => {
                const b = document.createElement('button');
                b.className = "puffy-ans-btn";
                b.innerText = ans.t;
                b.onclick = () => {
                    ans.p.forEach(id => { points[id] = (points[id] || 0) + 1; });
                    currentIdx++;
                    if(currentIdx < questions.length) showNext();
                    else showResult();
                };
                list.appendChild(b);
            });
        }

        function showResult() {
            document.getElementById('question-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';

            let bestId = "buta";
            let maxScore = -1;
            for(let id in points) {
                if(points[id] > maxScore) { maxScore = points[id]; bestId = id; }
            }
            const char = characters.find(c => c.id === bestId);
            resultCharId = bestId;

            document.getElementById('res-img').src = char.img;
            document.getElementById('res-name').innerText = char.name;
            document.getElementById('res-desc').innerText = char.desc;

            // SNSシェア設定
            const txt = `私の運命のHAGUMOは「${char.name}」でした！ 🌱\n#HAGUMO `;
            document.getElementById('share-x').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(txt)}&url=${encodeURIComponent(window.location.href)}`;
            document.getElementById('share-line').href = `https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(window.location.href)}`;
        }

        function goToMyHagumo() {
            // お部屋ページに「現在選んでいるキャラ」として保存
            localStorage.setItem('hChar', resultCharId);
            location.href = 'my.html';
        }

        showNext();
    </script>
    
     <footer>
        <p style="color: var(--pink2); font-weight: bold; font-size: 16px; margin-bottom: 12px; letter-spacing: 1px;">🎀 HAGUMO project 🎀</p>
        <p style="font-size: 11px; color: #aaa; line-height: 1.8; max-width: 400px; margin: 0 auto;">
            ※これは授業課題のプロトタイプです。<br>
            実際の商品の販売・発送は行っておりません。
        </p>
    </footer>
</body>
</html>
