<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAGUMO図鑑 | キャラクター紹介</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <style>
        /* --- 図鑑ページ専用スタイル --- */
        .zukan-header {
            text-align: center;
            padding: 60px 20px;
            background: #fff4f9;
            border-radius: 0 0 50px 50px;
            margin-bottom: 40px;
        }

        .zukan-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .zukan-card {
            background: white;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s, box-shadow 0.3s;
            border: 2px solid transparent;
            position: relative;
        }

        .zukan-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(255,126,185,0.15);
            border-color: #ff9ecb;
        }

        .zukan-img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 15px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        .zukan-tag {
            display: inline-block;
            background: #ff7eb9;
            color: white;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .zukan-name {
            font-family: 'Zen Maru Gothic';
            font-size: 20px;
            color: #444;
            margin-bottom: 10px;
        }

        .zukan-desc {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
            text-align: left;
            background: #fafafa;
            padding: 15px;
            border-radius: 15px;
        }

        /* ふわっと表示されるアニメーション用 */
        .reveal { opacity: 0; transform: translateY(20px); transition: 0.6s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        @media screen and (max-width: 768px) {
            .zukan-grid { padding: 10px; gap: 15px; }
            .zukan-header { padding: 40px 15px; }
        }
    </style>
</head>
<body>

    <div class="container" style="margin-top: 80px;">
        
        <header class="zukan-header">
            <h1 style="font-family: 'Zen Maru Gothic'; color: #444;">📖 HAGUMO図鑑</h1>
            <p style="color: #888; font-size: 14px; margin-top: 10px;">
                野菜とココロが結びついて生まれた、個性豊かな仲間たち。
            </p>
        </header>

        <div class="zukan-grid" id="zukan-list">
            </div>

    </div>

    <script>
        const hagumos = [
            { name: "とまとら", tag: "情熱のリーダー", img: "tora.PNG", desc: "真っ赤なトマトのように情熱的。みんなを引っ張る力が強いけれど、実はちょっと寂しがり屋。" },
            { name: "きゅうりす", tag: "癒やしの調和", img: "risu.PNG", desc: "シャキシャキと軽やかな性格。周りの空気を読むのが得意で、誰とでも仲良くなれる平和主義者。" },
            { name: "れもんきー", tag: "自由なひらめき", img: "saru.PNG", desc: "酸味のきいた刺激的なアイデアマン。じっとしているのが苦手で、常に新しい遊びを探している。" },
            { name: "ぶるーべりくがめ", tag: "静かな知性", img: "kame.PNG", desc: "一歩ずつ着実に進む知性派。読書や星空を眺めるのが好き。目がとても良いと言われている。" },
            { name: "かぶた", tag: "真っ白な優しさ", img: "buta.PNG", desc: "真っ白で柔らかな心の持ち主。包容力があり、困っているハグモを放っておけないお人好し。" },
            { name: "さつまいもぐら", tag: "土の中の努力家", img: "imo.PNG", desc: "外からは見えないところでコツコツ頑張る努力家。甘いものが大好きで、実はとても力持ち。" },
            { name: "もももんが", tag: "甘え上手な愛嬌", img: "nga.PNG", desc: "ふんわり柔らかい毛並みを持つ愛されキャラ。甘えるのが得意で、周りを笑顔にする魔法の持ち主。" },
            { name: "くろいちじくま", tag: "神秘的な静寂", img: "kuma.PNG", desc: "少しミステリアスな雰囲気を持つ。静かな場所を好み、哲学的なことを考えるのが趣味。" },
            { name: "かぼちゃぼ", tag: "太陽のポジティブ", img: "chabo.PNG", desc: "そこにいるだけで周りが明るくなる太陽のような存在。どんな困難も笑顔で乗り越える。" },
            { name: "ばたふらいぴーこっく", tag: "冷静な機転", img: "jaku.PNG", desc: "鮮やかな青色が美しい賢者。頭の回転が速く、トラブルが起きても冷静に解決策を見つける。" }
        ];

        const grid = document.getElementById('zukan-list');

        hagumos.forEach(h => {
            const card = document.createElement('div');
            card.className = 'zukan-card reveal';
            card.innerHTML = `
                <span class="zukan-tag">${h.tag}</span>
                <img src="./images/${h.img}" class="zukan-img" onerror="this.src='./${h.img}'">
                <h2 class="zukan-name">${h.name}</h2>
                <p class="zukan-desc">${h.desc}</p>
            `;
            grid.appendChild(card);
        });

        // スクロールアニメーション
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                if (elementTop < windowHeight - 100) {
                    reveals[i].classList.add("active");
                }
            }
        }
        window.addEventListener("scroll", reveal);
        reveal();
    </script>
    <script src="./common.js"></script>
</body>
</html>
