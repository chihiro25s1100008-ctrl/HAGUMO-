<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハグモ図鑑 | HAGUMO</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700&family=Noto+Sans+JP&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .hagumo-card {
            background: white;
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .08);
            transition: .3s;
        }

        .hagumo-card:hover {
            transform: translateY(-8px);
        }

        .hagumo-card img {
            width: 140px;
            height: auto;
            margin-bottom: 15px;
        }

        .name {
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 18px;
            margin-bottom: 8px;
        }

        .type {
            font-size: 13px;
            opacity: .7;
            margin-bottom: 10px;
        }

        .desc {
            font-size: 13px;
            line-height: 1.6;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🌱 ハグモ図鑑</h1>

        <div class="grid">
            <div class="hagumo-card">
                <img src="images/risu.PNG">
                <div class="name">きゅうりす</div>
                <div class="type">バランス・調和</div>
                <div class="desc">きゅうり×りすの妖精ハグモ。<br>場の空気を整え、育てる人の心をやさしく安定させる存在。</div>
            </div>

            <div class="hagumo-card">
                <img src="images/tora.PNG">
                <div class="name">とまとら</div>
