<html lang="ja">
<head>
    <meta charset="UTF-8"><title>ハグモ図鑑</title>

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }

        .hagumo-card img { width: 100px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌱 ハグモ図鑑</h1>
        <div class="grid">
            <div class="hagumo-card"><img src="./risu.PNG"><h3>きゅうりす</h3></div>
            <div class="hagumo-card"><img src="./tora.PNG"><h3>とまとら</h3></div>
            </div>
    </div>
    <script src="./common.js"></script>
</body>
</html>
