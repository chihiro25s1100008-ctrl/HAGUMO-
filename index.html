<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MY HAGUMO | 絆極致</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --main-pink: #ff7eb9; --soft-pink: #fff5f7; --pink1: #ffb3d9; --pink2: #d1478e; 
            --white-glass: rgba(255, 255, 255, 0.8);
            --rainbow: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff); 
        }

        body { font-family: 'Zen Maru Gothic', sans-serif; background: var(--soft-pink); margin: 0; padding-top: 80px; transition: background 0.3s; overflow-x: hidden; }

        /* --- ホーム共通ナビゲーション --- */
        .nav { 
            position: fixed; top: 0; left: 0; width: 100%; 
            background: var(--white-glass); backdrop-filter: blur(10px);
            z-index: 10000; border-bottom: 2px solid rgba(255, 179, 217, 0.3); padding: 12px 0;
        }
        .nav-content { max-width: 1100px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo-img { height: 35px; cursor: pointer; transition: 0.3s; }
        .nav-links { display: flex; gap: 12px; }
        .nav-link { 
            color: #888; text-decoration: none; font-size: 11px; font-weight: bold; 
            padding: 6px 12px; border-radius: 50px; transition: 0.3s; border: 1px solid transparent; font-family: 'Quicksand', sans-serif;
        }
        .nav-link:hover, .nav-link.active { color: var(--pink2); background: white; border-color: var(--pink1); box-shadow: 0 4px 10px rgba(255, 126, 185, 0.2); }

        /* --- メインコンテンツ --- */
        .main-wrapper { display: flex; flex-direction: column; align-items: center; max-width: 1000px; margin: 0 auto; padding: 20px; }
        @media screen and (min-width: 769px) {
            .main-wrapper { flex-direction: row; align-items: flex-start; justify-content: center; gap: 40px; padding-top: 40px; }
            .left-panel { width: 320px; } .right-panel { width: 420px; }
        }

        .status-container, .bubble { background: white; border-radius: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 25px; text-align: center; margin-bottom: 20px; border: 2px solid #eee; position: relative; }

        /* 絆ゲージ */
        .love-bar-bg { width: 100%; height: 24px; background: #eee; border-radius: 20px; margin: 15px 0; overflow: hidden; position: relative; border: 2px solid #fff; }
        .love-bar-fill { height: 100%; background: linear-gradient(90deg, var(--pink1), var(--main-pink)); width: 50%; transition: 0.4s; }
        .love-bar-fill.max { background: var(--rainbow); background-size: 200% 100%; animation: moveBg 0.2s linear infinite; }
        @keyframes moveBg { 0% { background-position: 0% 0%; } 100% { background-position: 200% 0%; } }

        /* キャラ演出 */
        .hagumo-img { width: 240px; height: 240px; object-fit: contain; cursor: pointer; transition: 0.3s; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1)); }
        .max-chaos { animation: pachi-vibe 0.05s infinite !important; transform: scale(1.15); }
        .rainbow-filter { animation: pachi-color 0.4s infinite !important; }
        @keyframes pachi-vibe { 0% { transform: translate(3px, 3px) rotate(2deg); } 50% { transform: translate(-3px, -3px) rotate(-2deg); } 100% { transform: translate(3px, -3px) rotate(2deg); } }
        @keyframes pachi-color { 0% { filter: hue-rotate(0deg) drop-shadow(0 0 20px red); } 50% { filter: hue-rotate(180deg) drop-shadow(0 0 30px blue); } 100% { filter: hue-rotate(360deg) drop-shadow(0 0 20px red); } }
        .pachi-text { background: var(--rainbow); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 32px !important; font-weight: 900; animation: moveBg 0.5s linear infinite; display: block; letter-spacing: -2px; }

        .st-badge { font-size: 11px; padding: 5px 10px; border-radius: 15px; background: #fdfdfd; color: var(--pink2); border: 1px solid var(--pink1); margin: 0 2px; }
        .action-btn { background: white; border: 2px solid var(--pink1); padding: 15px; border-radius: 50px; font-weight: bold; cursor: pointer; color: var(--pink2); transition: 0.2s; width: 100%; margin-bottom: 10px; font-family: inherit; box-shadow: 0 4px 0 var(--soft-pink); }
        .action-btn:disabled { background: #eee; border-color: #ccc; color: #aaa; cursor: not-allowed; box-shadow: none; }
        
        #choices { display: none; flex-direction: column; gap: 10px; margin-top: 15px; }
        .choice-btn { background: white; border: 2px solid var(--pink1); padding: 12px; border-radius: 20px; cursor: pointer; font-weight: bold; color: var(--pink2); transition: 0.2s; }

        .heart { position: fixed; pointer-events: none; animation: heartUp 1s forwards; font-size: 35px; z-index: 9999; }
        @keyframes heartUp { 0% { transform: scale(0.5) translateY(0); opacity: 1; } 100% { transform: scale(2.5) translateY(-180px); opacity: 0; } }
    </style>
</head>
<body id="bg">

    <nav class="nav">
        <div class="nav-content">
            <img src="./images/rogo.PNG" class="nav-logo-img" alt="HAGUMO Logo" onclick="location.href='index.html'">
            <div class="nav-links">
                <a href="index.html" class="nav-link">HOME</a>
                <a href="world.html" class="nav-link">WORLD</a>
                <a href="product.html" class="nav-link">PRODUCT</a>
                <a href="hagumo.html" class="nav-link">HAGUMO</a>
                <a href="diagnosis.html" class="nav-link">DIAGNOSIS</a>
                <a href="my.html" class="nav-link active">MY HAGUMO</a>
            </div>
        </div>
    </nav>

    <div class="main-wrapper">
        <div class="left-panel">
            <div class="status-container">
                <div id="user-display" style="font-weight: bold; margin-bottom: 10px;">ハグモルーム</div>
                <div style="margin-bottom:10px;">
                    <span id="st-stroke-badge" class="st-badge">なで: 10/10</span>
                    <span id="st-talk-badge" class="st-badge">話: 5/5</span>
                </div>
                <select id="char-selector" onchange="changeChar()" style="width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--pink1); margin-bottom: 10px; font-family: inherit; outline: none;">
                    <option value="buta">かぶた</option>
                    <option value="imo">さつまいもぐら</option>
                    <option value="jaku">ばたふらいぴーこっく</option>
                    <option value="risu">きゅうりす</option>
                    <option value="tora">とまとら</option>
                    <option value="chabo">かぼちゃぼ</option>
                    <option value="saru">れもんきー</option>
                    <option value="kame">ぶるーべりくがめ</option>
                    <option value="nga">もももんが</option>
                    <option value="kuma">くろいちじくま</option>
                </select>
                <div class="love-bar-bg"><div id="love-fill" class="love-bar-fill"></div></div>
                <div id="love-label" style="font-size: 14px; font-weight: bold;">KIZUNA: <span id="love-val">50</span> / 100</div>
            </div>
            <div style="text-align: center;">
                <img id="hagumo-sprite" src="./images/buta.PNG" class="hagumo-img" onclick="strokeHagumo(event)">
            </div>
        </div>

        <div class="right-panel">
            <div id="chat-bubble" class="bubble">...</div>
            <div id="choices"></div>
            <div class="action-menu">
                <button id="talk-btn" class="action-btn" onclick="startTalk()">💬 おしゃべりする</button>
                <button id="stroke-btn" class="action-btn" onclick="strokeHagumo(event)">👋 なでなでする</button>
                <button class="action-btn" onclick="renameUser()" style="font-size: 12px; border-style: dotted;">✏️ 名前を変える</button>
                <button onclick="manualReset()" style="background:none; border:none; color:#ccc; font-size:10px; width:100%; cursor:pointer; margin-top:10px;">♻️ この子の絆をリセット</button>
            </div>
        </div>
    </div>

    <script>
        const charData = {
            buta: { welcome: "おかえりぶ！泥遊びするぶ？", maxWelcome: "おかえり、主様！世界で一番待ってたぶ！", strokeRes: "もっと撫でてぶ！泥が落ちちゃうぶ〜♪", ansRes: { high: "泥が輝いて見えるぶ！嬉しいぶー！", mid: "ありがとうぶ！もっと頑張るぶ！", low: "そんなの悲しいぶ…泥が乾いちゃうぶ。" }, questions: [{ q: "ボク、まだ上手に歩けないぶ…。不格好ぶ？", a: ["そこが可愛いんだよ", "練習あるのみ！", "確かに変だね"], scores: [10, 5, -5] }], maxStrokes: ["主様の手、あったかいぶ〜…大好きぶ！", "主様はボクだけのものだぶ！離さないぶ！"] },
            imo: { welcome: "あ、おかえりもにょ。", maxWelcome: "主様が来ると、土の中まで明るくなるもにょ…♪", strokeRes: "なでなで、落ち着くもにょ……♪", ansRes: { high: "心の中がポカポカもにょ…♪", mid: "ありがとうもにょ。", low: "…土の奥に潜るもにょ。" }, questions: [{ q: "一生、土の中かもしれないもにょ…。それでもいいもにょ？", a: ["ボクが土に行くよ", "いつか地上へ行こう", "暗いのは嫌だな"], scores: [10, 5, -5] }], maxStrokes: ["主様がいれば怖くないもにょ。愛してるもにょ。", "主様の手、落ち着くもにょ。ずっと一緒もにょ。"] },
            jaku: { welcome: "お帰りなさい、主様。今日も美しいですわ。", maxWelcome: "あなたが戻られるのを、羽を震わせて待っておりましたわ。", strokeRes: "あら…主様の指先、とても優雅ですわね。", ansRes: { high: "まぁ…胸が高鳴りますわ。嬉しいですわね。", mid: "お言葉、痛み入りますわ。", low: "…少し、羽の色が曇ってしまいましたわ。" }, questions: [{ q: "私の羽、少し色が混ざりすぎていて…不気味ではありませんか？", a: ["複雑な輝きが素敵だよ", "個性があっていいね", "少し派手かも"], scores: [10, 5, -5] }], maxStrokes: ["あぁ…時が止まればいいのに。主様、愛しております。", "世界で一番、心地よいですわ。私の全てを捧げます。"] },
            risu: { welcome: "おかえり！水分補給しっかりね！", maxWelcome: "もう、待ちくたびれて干からびちゃうかと思ったよぉ！大好き！", strokeRes: "わぁっ！なでなですると毛並みが整うよぉ！", ansRes: { high: "わぁっ！お肌も心もプルプルだよぉ！", mid: "ありがとう！", low: "…キュウリ、落としちゃった。" }, questions: [{ q: "尻尾がボサボサになっちゃった…。アイドル失格かなぁ？", a: ["自然体で最高だよ", "ブラッシングしよう", "ちょっと冒険だね"], scores: [10, 5, -5] }], maxStrokes: ["主様になでられるの、最高級の美容液だよぉ！", "主様、だーいすき！一生キュウリあげるねっ！"] },
            tora: { welcome: "おかえりガオー！トマトパワー全開だ！", maxWelcome: "お前がいないとトマトが枯れちまうかと思ったぜ！", strokeRes: "ガオーッ！力がみなぎってくるガオ！もっとだ！", ansRes: { high: "ガオーッ！最高のトマトパワーだガオ！", mid: "おう、サンキューな！", low: "…火が消えちまったガオ。" }, questions: [{ q: "ガオーッ！…今の吠え方、迫力足りなかったガオ？", a: ["可愛くて最高だよ", "一生懸命で良いガオ", "全然怖くないよ"], scores: [10, 5, -5] }], maxStrokes: ["おいおい、照れるガオ！お前は俺の宝物だぜ！", "お前となら、どこまでも強くなれる。愛してるガオ！"] },
            chabo: { welcome: "よお、主。待ってたぜ。座って休めよ。", maxWelcome: "おかえり、あんた。とにかく、無事でよかったぜ。", strokeRes: "…ふん、悪くねぇ。もっと端の方もなでろよ。", ansRes: { high: "…あんた、たまに心にくること言うよな。", mid: "ふん、分かってるじゃねぇか。", low: "…カボチャの皮より硬い言葉だな。" }, questions: [{ q: "俺の殻、ヒビが入っちまった。格好つかねぇな…。", a: ["戦った証だね", "味があっていいよ", "直さないの？"], scores: [10, 5, -5] }], maxStrokes: ["あんたの手は…反則だな。ずっとこうしてろ。", "…離さねぇぞ。あんたが俺を選んだんだからな。"] },
            saru: { welcome: "ウキキーッ！主！フレッシュなレモンはいかが！？", maxWelcome: "今日はずっとお祝いウキ！主様が大好きすぎるウキ！", strokeRes: "ウキッ！主のなでなで、ビタミンより効くぅ〜！", ansRes: { high: "ウキキーッ！ビタミンMAXだよぉ！", mid: "ウキッ！レモンみたいに効いたよ！", low: "…酸っぱすぎるよぉ。" }, questions: [{ q: "レモンが酸っぱすぎて、みんな逃げていっちゃうウキ…。", a: ["ボクは逃げないよ", "刺激的でいいよ", "確かに酸っぱい！"], scores: [10, 5, -5] }], maxStrokes: ["主、最高だよぉ！レモンより甘い気分だウキーッ！", "主！主！大好きウキーッ！！結婚しよウキ！！"] },
            kame: { welcome: "おかえりなさい……。のんびり、いきましょうね。", maxWelcome: "あなたと過ごす、この一秒一秒が、私の永遠です……。", strokeRes: "あぁ……甲羅まで、ぬくもりが届きます……。", ansRes: { high: "あぁ…安らかな気持ちです…。", mid: "ありがとうございます……。", low: "……少し、甲羅の中に隠れますね。" }, questions: [{ q: "私……歩くの、遅すぎますか……？", a: ["一緒に歩けるから好き", "マイペースでいいよ", "もう少し急いで"], scores: [10, 5, -5] }], maxStrokes: ["あぁ…時が止まればいいのに……幸せです……。", "とっても優しい魔法ですね…あなたを愛しています。"] },
            nga: { welcome: "ピピィーッ！主様ぁ！会いたかったよぉ！", maxWelcome: "大好きな主様ぁ！もうどこへも行かないでぇ！", strokeRes: "ピピィッ！もっとぉ！主様のなでなで大好きぃー！", ansRes: { high: "ピピィッ！空まで飛べそうだよぉ！", mid: "ピピッ、ありがとうぅ！", low: "…ピーッ！嫌いになっちゃったの？" }, questions: [{ q: "甘えん坊すぎて、迷惑かなぁ…？ピピッ。", a: ["もっと甘えていいよ", "頼われて嬉しいよ", "時々ね"], scores: [10, 5, -5] }], maxStrokes: ["主様ぁ、だぁいすきだよぉ！一生なでてぇ！", "これ、ボクへのプロポーズかなぁ！？ピピィッ❤️"] },
            kuma: { welcome: "……お帰り。君の足音が聞こえたよ。", maxWelcome: "君が戻ってきてくれて、世界が色づいた。ありがとう。", strokeRes: "……君の手、とても温かい。心が解けていくようだね。", ansRes: { high: "……君という光に、救われた気がするよ。", mid: "……温かい言葉だね。", low: "……暗闇が、もっと深くなったみたいだ。" }, questions: [{ q: "イチジクの蜜で手がベタベタだ。触らないほうがいい。", a: ["気にせずなでさせて", "甘い香りがして好き", "汚れるのは嫌だな"], scores: [10, 5, -5] }], maxStrokes: ["君のぬくもり……これが「愛」なんだね。愛してる。", "君がいれば、冬も怖くないよ。ずっと隣にいて。"] }
        };

        let currentChar = localStorage.getItem('hagu_current_char') || "buta";
        let userName = localStorage.getItem('hagu_user') || "主様";
        let strokeCount = parseInt(localStorage.getItem('st_count')) || 0;
        let talkCount = parseInt(localStorage.getItem('tk_count')) || 0;
        let lastStrokeTime = parseInt(localStorage.getItem('st_time')) || Date.now();
        let lastTalkTime = parseInt(localStorage.getItem('tk_time')) || Date.now();

        // --- キャラごとに独立した絆データを扱う ---
        function getLove() { 
            const val = localStorage.getItem(`hagu_love_${currentChar}`);
            return val === null ? 50 : parseInt(val); 
        }
        function setLove(val) { localStorage.setItem(`hagu_love_${currentChar}`, val); }

        function getName(text) {
            if (!text) return "";
            return text.replace(/主様/g, userName).replace(/主(?![ぁ-ん])/g, userName);
        }

        function updateStatus() {
            const now = Date.now();
            if (now - lastStrokeTime > 60000) { strokeCount = 0; lastStrokeTime = now; }
            if (now - lastTalkTime > 900000) { talkCount = 0; lastTalkTime = now; }

            const love = getLove();
            const isMax = love >= 100;
            const sprite = document.getElementById('hagumo-sprite');
            const fill = document.getElementById('love-fill');
            const label = document.getElementById('love-label');
            const talkBtn = document.getElementById('talk-btn');

            document.getElementById('user-display').innerText = userName + "のルーム";
            document.getElementById('love-val').innerText = love;
            fill.style.width = love + "%";
            document.getElementById('st-stroke-badge').innerText = `👋 なで: ${10 - strokeCount}/10`;
            document.getElementById('st-talk-badge').innerText = `💬 話: ${5 - talkCount}/5`;

            if (isMax) {
                sprite.classList.add('max-chaos', 'rainbow-filter');
                fill.classList.add('max');
                label.innerHTML = '<span class="pachi-text">🌈絆・極致🌈</span>';
                document.getElementById('bg').style.background = "radial-gradient(circle, #ff00ff, #00ffff, #ffff00)";
                talkBtn.disabled = true;
                talkBtn.innerText = "❤️ 絆極致 ❤️";
            } else {
                sprite.classList.remove('max-chaos', 'rainbow-filter');
                fill.classList.remove('max');
                label.innerHTML = `KIZUNA: <span id="love-val">${love}</span> / 100`;
                document.getElementById('bg').style.background = "#fff5f7";
                talkBtn.disabled = (talkCount >= 5);
                talkBtn.innerText = "💬 おしゃべりする";
            }
            save();
        }

        function strokeHagumo(e) {
            let love = getLove();
            if (strokeCount >= 10 && love < 100) {
                document.getElementById('chat-bubble').innerText = "（少し疲れちゃったみたい…時間を置いてみてね）";
                return;
            }
            strokeCount++;
            love = Math.min(100, love + 1);
            setLove(love);

            const data = charData[currentChar];
            const msg = (love >= 100) ? data.maxStrokes[Math.floor(Math.random()*data.maxStrokes.length)] : data.strokeRes;
            document.getElementById('chat-bubble').innerText = getName(msg);
            
            createHeart(e.clientX || 200, e.clientY || 400, love >= 100);
            updateStatus();
        }

        function startTalk() {
            if (getLove() >= 100 || talkCount >= 5) return;
            const data = charData[currentChar];
            const quest = data.questions[Math.floor(Math.random() * data.questions.length)];
            document.getElementById('chat-bubble').innerText = getName(quest.q);
            const container = document.getElementById('choices');
            container.innerHTML = ""; container.style.display = "flex";

            quest.a.forEach((text, i) => {
                const btn = document.createElement('button'); btn.className = "choice-btn"; btn.innerText = text;
                btn.onclick = () => {
                    talkCount++;
                    let love = getLove();
                    let score = quest.scores[i];
                    love = Math.min(100, Math.max(0, love + score));
                    setLove(love);
                    container.style.display = "none";
                    const resType = score >= 10 ? "high" : (score < 0 ? "low" : "mid");
                    document.getElementById('chat-bubble').innerText = getName(data.ansRes[resType]);
                    updateStatus();
                };
                container.appendChild(btn);
            });
        }

        function createHeart(x, y, isMax) {
            const h = document.createElement('div'); h.className = 'heart';
            h.innerHTML = isMax ? '🌈' : '❤️';
            h.style.left = (x - 20) + 'px'; h.style.top = (y - 20) + 'px';
            document.body.appendChild(h); setTimeout(() => h.remove(), 1000);
        }

        function changeChar() {
            currentChar = document.getElementById('char-selector').value;
            const love = getLove();
            document.getElementById('hagumo-sprite').src = `./images/${currentChar}.PNG`;
            document.getElementById('chat-bubble').innerText = getName(love >= 100 ? charData[currentChar].maxWelcome : charData[currentChar].welcome);
            updateStatus(); // 変更時に即座にそのキャラの絆状態を反映
        }

        function save() {
            localStorage.setItem('hagu_user', userName);
            localStorage.setItem('hagu_current_char', currentChar);
            localStorage.setItem('st_count', strokeCount); localStorage.setItem('tk_count', talkCount);
            localStorage.setItem('st_time', lastStrokeTime); localStorage.setItem('tk_time', lastTalkTime);
        }

        function renameUser() {
            const n = prompt("新しいおなまえを教えてね", userName);
            if(n && n.trim()) { userName = n.trim(); updateStatus(); }
        }

        function manualReset() {
            if(confirm("この子との絆をリセットしますか？")) {
                setLove(50);
                updateStatus();
            }
        }

        window.onload = () => {
            const savedChar = localStorage.getItem('hagu_current_char');
            if (savedChar) { currentChar = savedChar; document.getElementById('char-selector').value = savedChar; }
            changeChar(); // 初期キャラ設定
            setInterval(updateStatus, 5000);
        };
    </script>
</body>
</html>
