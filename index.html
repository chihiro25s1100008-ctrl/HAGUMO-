
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAGUMO | かわいくはじめる、美容の自給自足</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <style>
        :root {
            --main-pink: #ff7eb9;
            --soft-pink: #fff4f9;
            --text-gray: #444;
        }

        body { margin: 0; padding: 0; overflow-x: hidden; color: var(--text-gray); font-family: 'Zen Maru Gothic', sans-serif; }

        /* --- 共通ナビゲーション復活 --- */
        .navbar { position: fixed; top: 0; width: 100%; background: white; padding: 10px 0; z-index: 1000; border-bottom: 1px solid #f0f0f0; }
        .nav-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: center; align-items: center; gap: 30px; }
        .nav-logo-img { height: 30px; }
        .nav-links { display: flex; gap: 15px; }
        .nav-links a { color: #555; text-decoration: none; font-size: 13px; font-weight: bold; }
        .nav-links a.active { color: var(--main-pink); }

        .container { margin-top: 80px; }

        /* --- ヒーローセクション強化 --- */
        .hero-section {
            padding: 120px 20px 100px;
            background: linear-gradient(135deg, #fff 0%, var(--soft-pink) 100%);
            text-align: center;
            border-radius: 0 0 80px 80px;
            position: relative;
        }

        .hero-logo { width: 120px; margin-bottom: 30px; animation: floatLogo 3s ease-in-out infinite; }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* 【巨大化】新キャッチコピー */
        .big-catch {
            font-size: clamp(32px, 8vw, 60px);
            font-weight: 700;
            color: var(--main-pink);
            line-height: 1.2;
            margin: 20px 0;
            text-shadow: 2px 2px 0px white;
        }

        .sub-copy {
            font-size: clamp(18px, 4vw, 24px);
            color: #666;
            margin-bottom: 40px;
        }

        /* ポスター画像 */
        .hero-poster {
            position: absolute;
            right: 3%; top: 20%;
            width: 200px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255,126,185,0.2);
            animation: floatPoster 4s ease-in-out infinite;
        }
        @keyframes floatPoster { 0%, 100% { transform: rotate(2deg) translateY(0); } 50% { transform: rotate(-2deg) translateY(-20px); } }

        /* アニメーション用 */
        .reveal { opacity: 0; transform: translateY(30px); transition: 1s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* 特徴カード */
        .feature-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 80px 20px; max-width: 1000px; margin: 0 auto; }
        .feature-card { background: white; padding: 40px; border-radius: 35px; box-shadow: 0 15px 35px rgba(255,126,185,0.08); text-align: center; }

        /* 3 STEP (ピンク×白デザイン) */
        .steps-box {
            background: white;
            padding: 60px 30px;
            border-radius: 50px;
            margin: 40px auto;
            max-width: 800px;
            border: 3px solid var(--soft-pink);
        }
        .step-item {
            display: flex; align-items: center; gap: 20px; margin-bottom: 25px;
            background: var(--soft-pink); padding: 25px; border-radius: 25px;
        }
        .step-num {
            background: var(--main-pink); color: white; width: 45px; height: 45px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 20px; flex-shrink: 0;
        }

        /* CTAボタン */
        .big-button {
            display: inline-block; background: var(--main-pink); color: white;
            padding: 22px 60px; border-radius: 100px; text-decoration: none;
            font-weight: bold; font-size: 22px; box-shadow: 0 10px 25px rgba(255,126,185,0.3);
            transition: 0.3s;
        }
        .big-button:hover { transform: scale(1.05); background: #ff60a8; }

        @media screen and (max-width: 1024px) {
            .hero-poster { position: relative; right: auto; top: auto; width: 80%; max-width: 300px; margin: 30px auto; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-content">
            <img src="./images/rogo.PNG" class="nav-logo-img">
            <div class="nav-links">
                <a href="index.html" class="active">HOME</a>
                <a href="world.html">WORLD</a>
                <a href="hagumo.html">HAGUMO</a>
                <a href="diagnosis.html">DIAGNOSIS</a>
                <a href="product.html">PRODUCT</a>
                <a href="my.html">MY HAGUMO</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <section class="hero-section">
            <img src="./images/rogo.PNG" class="hero-logo" alt="HAGUMO">
            
            <img src="./images/pos.PNG" class="hero-poster" alt="ポスター">

            <div class="big-catch">かわいくはじめる、<br>美容の自給自足</div>
            <p class="sub-copy">育てる、私が、きれいになる。</p>

            <a href="diagnosis.html" class="big-button">パートナーを診断する 🌱</a>
        </section>

        <div class="feature-grid reveal">
            <div class="feature-card">
                <div style="font-size:60px; margin-bottom: 20px;">🥗</div>
                <h3>はじめてでも育つ</h3>
                <p>失敗しない専用キットとガイドをお届け。</p>
            </div>
            <div class="feature-card">
                <div style="font-size:60px; margin-bottom: 20px;">✨</div>
                <h3>きれいをつくる</h3>
                <p>収穫した野菜で、内側から輝く毎日を。</p>
            </div>
        </div>

        <div class="steps-box reveal">
            <h2 style="text-align:center; margin-bottom:40px; color: var(--main-pink);">3 STEP TO START</h2>
            <div class="step-item">
                <div class="step-num">1</div>
                <div><b>運命の診断</b><br>あなたにぴったりのハグモを選びます。</div>
            </div>
            <div class="step-item">
                <div class="step-num">2</div>
                <div><b>キットで育てる</b><br>すべてがセットになったキットが届きます。</div>
            </div>
            <div class="step-item">
                <div class="step-num">3</div>
                <div><b>自分をみがく</b><br>収穫した野菜で、最高の自分へ。</div>
            </div>
        </div>

        <div class="cta-area reveal" style="text-align:center; margin-bottom: 100px;">
            <a href="diagnosis.html" class="big-button">今すぐ診断をはじめる 🌱</a>
        </div>
    </div>

    <script>
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                if (elementTop < windowHeight - 100) {
                    reveals[i].classList.add("active");
                }
            }
        }
        window.addEventListener("scroll", reveal);
        reveal();
    </script>
</body>
</html>
