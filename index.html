<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAGUMO | 育てる、私が、きれいになる。</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <style>
        /* --- index.html 専用追加スタイル --- */
        :root {
            --main-pink: #ff7eb9;
            --soft-pink: #fff4f9;
            --text-gray: #444;
        }

        /* 共通CSSがある場合は不要だが、念のため */
        body { margin: 0; padding: 0; overflow-x: hidden; color: var(--text-gray); }

        /* ナビが固定されるので、その分メインを下にずらす（共通CSSと合わせる） */
        .container {
            margin-top: 80px; 
            overflow-x: hidden;
        }

        /* ヒーローセクション（トップ部分） */
        .hero-section {
            padding: 100px 20px 80px;
            background: linear-gradient(135deg, #fff 0%, var(--soft-pink) 100%);
            text-align: center;
            border-radius: 0 0 60px 60px;
            position: relative; /* ポスター配置用 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-logo { width: 140px; margin-bottom: 20px; animation: floatLogo 3s ease-in-out infinite; }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* 【追加】ポスター画像のスタイル */
        .hero-poster {
            position: absolute;
            right: 5%; /* 右側に配置 */
            top: 15%;
            width: 220px; /* サイズは調整してください */
            height: auto;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(255,126,185,0.2);
            animation: floatPoster 4s ease-in-out infinite;
            z-index: 5;
        }
        @keyframes floatPoster { 0%, 100% { transform: translateY(0) rotate(2deg); } 50% { transform: translateY(-15px) rotate(-1deg); } }

        .main-copy {
            font-size: clamp(28px, 6vw, 45px); /* 少し大きく */
            font-family: 'Zen Maru Gothic', sans-serif;
            color: #444;
            line-height: 1.3;
            margin: 0;
            position: relative;
            z-index: 10;
        }
        .main-copy span { color: var(--main-pink); }

        /* 【修正】新キャッチコピーのスタイル */
        .sub-copy {
            font-size: clamp(14px, 3vw, 18px);
            color: var(--main-pink);
            font-weight: bold;
            margin: 25px 0;
            background: white;
            padding: 10px 25px;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(255,126,185,0.1);
            position: relative;
            z-index: 10;
        }

        /* ふわっと出るアニメーション用 */
        .reveal { opacity: 0; transform: translateY(30px); transition: 1s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* 特徴・ステップなどのカード */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 60px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .feature-card {
            background: white;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255,126,185,0.08);
            text-align: center;
            transition: 0.3s;
        }
        .feature-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(255,126,185,0.12); }

        /* 【大幅修正】3 STEPセクション（黒から白×ピンクへ） */
        .steps-box {
            background: white; /* 白背景に */
            color: var(--text-gray); /* 文字色を戻す */
            padding: 60px 20px;
            border-radius: 40px;
            margin: 60px 20px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 15px 40px rgba(0,0,0,0.03); /* 薄い影 */
            border: 2px solid var(--soft-pink); /* 薄いピンクの枠線 */
        }
        .step-item {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            background: var(--soft-pink); /* 薄いピンク背景に */
            padding: 20px;
            border-radius: 20px;
        }
        .step-item:last-child { margin-bottom: 0; }
        .step-num {
            background: var(--main-pink);
            color: white;
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 18px;
            flex-shrink: 0;
        }

        /* 最後のボタン */
        .cta-area { text-align: center; margin: 100px 0; }
        .big-button {
            display: inline-block;
            background: var(--main-pink);
            color: white;
            padding: 20px 50px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 10px 25px rgba(255,126,185,0.3);
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }
        .big-button:hover { transform: scale(1.05); background: #ff60a8; }

        /* レスポンシブ対応 */
        @media screen and (max-width: 992px) {
            .hero-poster {
                position: relative;
                right: auto;
                top: auto;
                margin-top: 40px;
                width: 80%;
                max-width: 300px;
            }
        }
        @media screen and (max-width: 768px) {
            .container { margin-top: 120px; }
            .hero-section { padding-top: 60px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <section class="hero-section">
            <img src="./images/rogo.PNG" class="hero-logo" alt="HAGUMO" onerror="this.src='./rogo.PNG'">
            
            <img src="./images/pos.PNG" class="hero-poster" alt="HAGUMO ポスター" onerror="this.src='./pos.PNG'">

            <h1 class="main-copy"><span>育てる</span>、私が、<br>きれいになる。</h1>
            
            <p class="sub-copy">かわいくはじめる、美容の自給自足</p>

            <a href="diagnosis.html" class="big-button">パートナーを診断する 🌱</a>
        </section>

        <div class="feature-grid reveal">
            <div class="feature-card">
                <div style="font-size:50px; margin-bottom: 15px;">🥗</div>
                <h3>はじめてでも育つ</h3>
                <p style="font-size:15px; color:#666; line-height: 1.6;">失敗しない専用キットと<br>わかりやすいガイドをお届け。</p>
            </div>
            <div class="feature-card">
                <div style="font-size:50px; margin-bottom: 15px;">✨</div>
                <h3>きれいをつくる</h3>
                <p style="font-size:15px; color:#666; line-height: 1.6;">収穫野菜を使った<br>秘伝の美容レシピを伝授。</p>
            </div>
        </div>

        <div class="steps-box reveal">
            <h2 style="text-align:center; margin-bottom:40px; font-family:'Zen Maru Gothic'; color: var(--main-pink);">3 STEP TO START</h2>
            <div class="step-item">
                <div class="step-num">1</div>
                <div style="font-size:15px; line-height: 1.5;"><b>運命の診断</b><br>簡単な質問で、あなたにぴったりのハグモを選びます。</div>
            </div>
            <div class="step-item">
                <div class="step-num">2</div>
                <div style="font-size:15px; line-height: 1.5;"><b>キットで育てる</b><br>種、土、プランター、ガイドがセットで届きます。</div>
            </div>
            <div class="step-item">
                <div class="step-num">3</div>
                <div style="font-size:15px; line-height: 1.5;"><b>収穫して自分をみがく</b><br>新鮮な野菜で、食べて、塗って、内側から美しく。</div>
            </div>
        </div>

        <div class="cta-area reveal">
            <a href="diagnosis.html" class="big-button">今すぐ運命の診断をはじめる 🌱</a>
        </div>
    </div>

    <script>
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                var elementVisible = 100;
                if (elementTop < windowHeight - elementVisible) {
                    reveals[i].classList.add("active");
                }
            }
        }
        window.addEventListener("scroll", reveal);
        reveal(); // 初回実行
    </script>
    
    </body>
</html>
