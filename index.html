<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAGUMO | 育てる、私が、きれいになる。</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <style>
        /* --- index.html 専用追加スタイル --- */
        :root {
            --main-pink: #ff7eb9;
            --soft-pink: #fff4f9;
        }

        /* ナビが固定されるので、その分メインを下にずらす */
        .container {
            margin-top: 80px; 
            overflow-x: hidden;
        }

        /* ヒーローセクション */
        .hero-section {
            padding: 80px 20px;
            background: linear-gradient(135deg, #fff 0%, var(--soft-pink) 100%);
            text-align: center;
            border-radius: 0 0 60px 60px;
        }

        .hero-logo { width: 140px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .main-copy {
            font-size: clamp(26px, 5vw, 40px);
            font-family: 'Zen Maru Gothic', sans-serif;
            color: #444;
            line-height: 1.4;
        }
        .main-copy span { color: var(--main-pink); }

        /* ふわっと出るアニメーション用 */
        .reveal { opacity: 0; transform: translateY(30px); transition: 1s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* 特徴・ステップなどのカード */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 40px 20px;
        }
        .feature-card {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(255,126,185,0.08);
            text-align: center;
        }

        .steps-box {
            background: #4a4a4a;
            color: white;
            padding: 50px 20px;
            border-radius: 40px;
            margin: 60px 20px;
        }
        .step-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 15px;
        }
        .step-num {
            background: var(--main-pink);
            width: 35px; height: 35px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; flex-shrink: 0;
        }

        /* 最後のボタン */
        .cta-area { text-align: center; margin: 80px 0; }
        .big-button {
            display: inline-block;
            background: var(--main-pink);
            color: white;
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 8px 20px rgba(255,126,185,0.3);
            transition: 0.3s;
        }
        .big-button:hover { transform: scale(1.05); }

        @media screen and (max-width: 768px) {
            .container { margin-top: 120px; } /* スマホはナビが縦に伸びるので多めに空ける */
        }
    </style>
</head>
<body>

    <div class="container">
        <section class="hero-section">
            <img src="./images/rogo.PNG" class="hero-logo" alt="HAGUMO" onerror="this.src='./rogo.PNG'">
            <h1 class="main-copy"><span>育てる</span>、私が、<br>きれいになる。</h1>
            <p style="color:#888; margin:20px 0;">自分で育てた野菜で、内側から輝く毎日を。</p>
            <a href="diagnosis.html" class="big-button">パートナーを診断する 🌱</a>
        </section>

        <div class="feature-grid reveal">
            <div class="feature-card">
                <div style="font-size:40px;">🥗</div>
                <h3>はじめてでも育つ</h3>
                <p style="font-size:14px; color:#666;">失敗しない専用キットとガイドをお届け。</p>
            </div>
            <div class="feature-card">
                <div style="font-size:40px;">✨</div>
                <h3>きれいをつくる</h3>
                <p style="font-size:14px; color:#666;">収穫野菜を使った秘伝の美容レシピを伝授。</p>
            </div>
        </div>

        <div class="steps-box reveal">
            <h2 style="text-align:center; margin-bottom:30px; font-family:'Zen Maru Gothic';">3 STEP TO START</h2>
            <div class="step-item">
                <div class="step-num">1</div>
                <div style="font-size:14px;"><b>運命の診断</b><br>あなたにぴったりのハグモを選びます。</div>
            </div>
            <div class="step-item">
                <div class="step-num">2</div>
                <div style="font-size:14px;"><b>キットで育てる</b><br>種、土、ガイドがセットで届きます。</div>
            </div>
            <div class="step-item">
                <div class="step-num">3</div>
                <div style="font-size:14px;"><b>自分をみがく</b><br>収穫野菜で、食べて、塗って、美しく。</div>
            </div>
        </div>

        <div class="cta-area reveal">
            <a href="diagnosis.html" class="big-button">今すぐ診断をはじめる 🌱</a>
        </div>
    </div>

    <script>
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                var elementVisible = 150;
                if (elementTop < windowHeight - elementVisible) {
                    reveals[i].classList.add("active");
                }
            }
        }
        window.addEventListener("scroll", reveal);
        reveal(); // 初回実行
    </script>
    
    <script src="./common.js"></script>
</body>
</html>
