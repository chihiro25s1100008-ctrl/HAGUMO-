<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>モエルタウン相性診断</title>

<style>
body{
  font-family: "Helvetica Neue", sans-serif;
  background:#fffafc;
  margin:0;
  padding:20px;
  text-align:center;
}
h1{
  font-size:22px;
  margin-bottom:20px;
}
.card{
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  margin-bottom:20px;
}
button{
  display:block;
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:30px;
  background:#f3f3f3;
  font-size:14px;
}
button:hover{
  background:#ffd9e8;
}
.result{
  font-size:18px;
}
.hidden{
  display:none;
}
</style>
</head>

<body>

<h1>🌈 モエルタウン<br>愛されタイプ診断</h1>

<div class="card" id="quiz"></div>

<div class="card hidden" id="resultCard">
  <div class="result" id="result"></div>
  <button onclick="location.reload()">もう一度診断する</button>
</div>

<script>
const questions = [
{
q:"朝の気分は？",
a:[
{ text:"静かに整えたい", type:"blue"},
{ text:"元気にスタート！", type:"red"},
{ text:"のんびりゆったり", type:"purple"}
]
},
{
q:"友達が落ち込んでたら？",
a:[
{ text:"そっと寄り添う", type:"pink"},
{ text:"励ます！", type:"orange"},
{ text:"黙って隣にいる", type:"black"}
]
},
{
q:"理想の休日は？",
a:[
{ text:"自然の中でリフレッシュ", type:"green"},
{ text:"カフェ巡り", type:"yellow"},
{ text:"おうち時間", type:"white"}
]
},
{
q:"好きな言葉は？",
a:[
{ text:"成長", type:"red"},
{ text:"安心", type:"orange"},
{ text:"変化", type:"lightblue"}
]
},
{
q:"恋愛スタイルは？",
a:[
{ text:"一途", type:"black"},
{ text:"甘えたい", type:"pink"},
{ text:"見守る", type:"blue"}
]
},
{
q:"自分の強みは？",
a:[
{ text:"バランス感覚", type:"green"},
{ text:"情熱", type:"red"},
{ text:"優しさ", type:"white"}
]
},
{
q:"直したいところは？",
a:[
{ text:"せっかち", type:"yellow"},
{ text:"考えすぎる", type:"purple"},
{ text:"強がり", type:"black"}
]
},
{
q:"あなたの色は？",
a:[
{ text:"明るい色", type:"orange"},
{ text:"やわらかい色", type:"pink"},
{ text:"透明感ある色", type:"lightblue"}
]
},
{
q:"安心する瞬間は？",
a:[
{ text:"自然の音", type:"green"},
{ text:"あたたかいごはん", type:"orange"},
{ text:"静かな夜", type:"blue"}
]
},
{
q:"大切にしたいものは？",
a:[
{ text:"信頼", type:"black"},
{ text:"楽しさ", type:"yellow"},
{ text:"やり直せる勇気", type:"white"}
]
}
];

const results = {
const results = {

green: `<img src="images/risu.PNG" style="width:150px;border-radius:20px;"><br>💚きゅうりす<br>バランス育成タイプ`,

red: `<img src="images/tora.PNG" style="width:150px;border-radius:20px;"><br>❤️とまとら<br>情熱成長タイプ`,

yellow: `<img src="images/saru.PNG" style="width:150px;border-radius:20px;"><br>💛れもんきー<br>刺激覚醒タイプ`,

purple: `<img src="images/imo.PNG" style="width:150px;border-radius:20px;"><br>💜さつまいもぐら<br>熟成安心タイプ`,

orange: `<img src="images/chabo.PNG" style="width:150px;border-radius:20px;"><br>🧡かぼちゃぼ<br>包容保温タイプ`,

white: `<img src="images/buta.PNG" style="width:150px;border-radius:20px;"><br>🤍かぶた<br>再生リセットタイプ`,

blue: `<img src="images/kame.PNG" style="width:150px;border-radius:20px;"><br>💙ぶるーべりくがめ<br>静観守護タイプ`,

pink: `<img src="images/nga.PNG" style="width:150px;border-radius:20px;"><br>🩷もももんが<br>甘やかし共鳴タイプ`,

black: `<img src="images/kuma.PNG" style="width:150px;border-radius:20px;"><br>🖤くろいちじくま<br>深愛夜守タイプ`,

lightblue: `<img src="images/jaku.PNG" style="width:150px;border-radius:20px;"><br>🩵ばたふらいぴーこっく<br>水色進化タイプ`

};

let current = 0;
let scores = {};

function showQuestion(){
if(current >= questions.length){
showResult();
return;
}
const q = questions[current];
let html = "<h2>"+q.q+"</h2>";
q.a.forEach(ans=>{
html += `<button onclick="selectAnswer('${ans.type}')">${ans.text}</button>`;
});
document.getElementById("quiz").innerHTML = html;
}

function selectAnswer(type){
scores[type] = (scores[type] || 0) + 1;
current++;
showQuestion();
}

function showResult(){
document.getElementById("quiz").classList.add("hidden");
document.getElementById("resultCard").classList.remove("hidden");

let max = 0;
let finalType = "";
for(let type in scores){
if(scores[type] > max){
max = scores[type];
finalType = type;
}
}

document.getElementById("result").innerHTML =
"あなたの愛されキャラは…<br><br>" + results[finalType];
}

showQuestion();
</script>

</body>
</html>
