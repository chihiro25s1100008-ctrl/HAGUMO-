<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAGUMO | 育てる、私が、きれいになる。</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <style>
        /* --- index.html 専用の特別スタイル --- */
        :root {
            --main-pink: #ff7eb9;
            --soft-pink: #fff4f9;
            --text-gray: #444;
        }

        body { overflow-x: hidden; }

        /* ヒーローセクションを大きく・華やかに */
        .hero-section {
            padding: 100px 20px;
            background: linear-gradient(135deg, #fff 0%, var(--soft-pink) 100%);
            text-align: center;
            position: relative;
            overflow: hidden;
            border-radius: 0 0 80px 80px;
        }

        .hero-logo { width: 150px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .main-copy {
            font-size: clamp(28px, 5vw, 42px);
            font-family: 'Zen Maru Gothic', sans-serif;
            color: var(--text-gray);
            line-height: 1.4;
            font-weight: 700;
        }

        .main-copy span { color: var(--main-pink); }

        .sub-copy {
            color: #777;
            margin: 25px auto;
            max-width: 600px;
            font-size: 16px;
            line-height: 1.8;
        }

        /* ふわっと浮き出るアニメーション用設定 */
        .reveal { opacity: 0; transform: translateY(30px); transition: 1s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* 特徴セクション */
        .section-title {
            text-align: center;
            font-family: 'Zen Maru Gothic';
            margin: 80px 0 40px;
            font-size: 28px;
            position: relative;
        }
        .section-title::after {
            content: ''; display: block; width: 40px; height: 4px; 
            background: var(--main-pink); margin: 10px auto; border-radius: 2px;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 0 20px;
        }

        .feature-card {
            background: white;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255,126,185,0.08);
            text-align: center;
            transition: 0.3s;
        }
        .feature-card:hover { transform: translateY(-10px); }
        .feature-card i { font-size: 50px; display: block; margin-bottom: 20px; }

        /* ステップセクション */
        .steps-box {
            background: #4a4a4a;
            color: white;
            padding: 60px 20px;
            border-radius: 50px;
            margin: 80px 20px;
        }
        .step-item {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 20px;
        }
        .step-num {
            background: var(--main-pink);
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; flex-shrink: 0;
        }

        /* ユーザーの声 */
        .review-section { background: var(--soft-pink); padding: 80px 20px; }
        .review-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
            border-left: 5px solid var(--main-pink);
        }

        /* ボタン */
        .cta-area { text-align: center; margin: 80px 0; }
        .big-button {
            display: inline-block;
            background: var(--main-pink);
            color: white;
            padding: 20px 50px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 10px 25px rgba(255,126,185,0.4);
            transition: 0.3s;
        }
        .big-button:hover { transform: scale(1.05); background: #ff5da3; }

        @media screen and (max-width: 768px) {
            .hero-section { padding: 60px 20px; }
            .feature-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <section class="hero-section">
            <img src="./images/rogo.PNG" class="hero-logo" alt="HAGUMO" onerror="this.src='./rogo.PNG'">
            <h1 class="main-copy"><span>育てる</span>、私が、<br>きれいになる。</h1>
            <p class="sub-copy">
                忙しい毎日だからこそ、土に触れ、芽吹きを待つ時間を。<br>
                自分で育てた野菜のエネルギーが、あなたの美しさを内側から輝かせます。
            </p>
            <a href="diagnosis.html" class="big-button">まずはパートナーを診断する 🌱</a>
        </section>

        <h2 class="section-title reveal">HAGUMOが選ばれる理由</h2>
        <div class="feature-grid reveal">
