<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MY HAGUMO | 絆の部屋【完全版】</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-pink: #ff7eb9; --soft-pink: #fff5f7; --pink1: #ffb3d9; --pink2: #d1478e; --gold: #ffd700; --rainbow: linear-gradient(90deg, #ff2400, #e81d1d, #e8b71d, #1de840, #1ddde8, #2b1de8, #dd1de8, #ff2400); }
        body { font-family: 'Zen Maru Gothic', sans-serif; background: var(--soft-pink); margin: 0; padding-top: 80px; overflow-x: hidden; color: #555; }

        /* --- ナビゲーション --- */
        .nav { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: white; z-index: 5000; border-bottom: 2px solid #fff0f6; display: flex; align-items: center; }
        .nav-content { width: 100%; max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box; }
        .nav-logo-img { height: 35px; cursor: pointer; }
        .nav-links { display: flex; gap: 15px; }
        .nav-link { color: #888; text-decoration: none; font-size: 13px; font-weight: bold; }
        .nav-link.active { color: var(--main-pink); }

        /* ステータス */
        .status-container { max-width: 400px; margin: 10px auto; padding: 20px; background: white; border-radius: 35px; box-shadow: 0 10px 25px rgba(255,126,185,0.1); text-align: center; }
        .love-bar-bg { width: 90%; height: 16px; background: #eee; border-radius: 10px; margin: 10px auto; overflow: hidden; border: 2px solid white; }
        .love-bar-fill { height: 100%; background: linear-gradient(90deg, var(--pink1), var(--main-pink)); width: 50%; transition: 1s cubic-bezier(0.22, 1, 0.36, 1); }
        .love-bar-fill.max { background: var(--rainbow); background-size: 200% 100%; animation: moveBg 2s linear infinite; }
        @keyframes moveBg { 0% { background-position: 0% 0%; } 100% { background-position: 200% 0%; } }

        /* メイン */
        .room-main { position: relative; height: 440px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hagumo-img { width: 240px; height: 240px; object-fit: contain; cursor: pointer; z-index: 5; transition: 0.3s; }
        .bounce { animation: bounce 3s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* 吹き出し */
        .bubble { position: relative; background: white; padding: 22px; border-radius: 30px; width: 85%; max-width: 340px; box-shadow: 0 8px 25px rgba(0,0,0,0.06); margin-bottom: 30px; text-align: center; font-weight: bold; color: #555; font-size: 15px; min-height: 70px; display: flex; align-items: center; justify-content: center; z-index: 20; }
        .bubble::after { content: ""; position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%); border-width: 14px 14px 0; border-style: solid; border-color: white transparent transparent; }

        /* 確定演出 */
        .max-flash { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9000; animation: flashEffect 0.5s ease-out; pointer-events: none; }
        @keyframes flashEffect { 0% { opacity: 1; } 100% { opacity: 0; } }
        .rainbow-body { animation: rainbowAnim 1.5s linear infinite !important; filter: drop-shadow(0 0 30px gold) !important; }
        @keyframes rainbowAnim { 0% { filter: hue-rotate(0deg) scale(1.1); } 100% { filter: hue-rotate(360deg) scale(1.1); } }

        /* UI */
        .choice-container { display: none; flex-direction: column; gap: 10px; width: 90%; max-width: 340px; margin: 0 auto 20px; }
        .choice-btn { background: white; border: 2px solid var(--main-pink); padding: 16px; border-radius: 50px; cursor: pointer; font-weight: bold; color: var(--main-pink); }
        .action-menu { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 20px; }
        .action-btn { background: white; border: 1px solid #eee; padding: 12px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .action-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div id="max-flash" class="max-flash"></div>

    <nav class="nav">
        <div class="nav-content">
            <img src="./images/rogo.PNG" class="nav-logo-img" onclick="location.href='index.html'">
            <div class="nav-links">
                <a href="index.html" class="nav-link">HOME</a>
                <a href="hagumo.html" class="nav-link">HAGUMO</a>
                <a href="diagnosis.html" class="nav-link">DIAGNOSIS</a>
                <a href="my.html" class="nav-link active">MY HAGUMO</a>
            </div>
        </div>
    </nav>

    <div class="status-container">
        <select id="char-selector" onchange="changeChar()" style="padding: 5px; border-radius: 10px; font-weight: bold;">
            <option value="buta">かぶた</option>
            <option value="imo">さつまいもぐら</option>
            <option value="jaku">ばたふらいぴーこっく</option>
            <option value="risu">きゅうりす</option>
            <option value="tora">とまとら</option>
            <option value="chabo">かぼちゃぼ</option>
            <option value="saru">れもんきー</option>
            <option value="kame">ぶるーべりくがめ</option>
            <option value="nga">もももんが</option>
            <option value="kuma">くろいちじくま</option>
        </select>
        <div class="love-bar-bg"><div id="love-fill" class="love-bar-fill"></div></div>
        <div style="font-size: 12px; font-weight: bold;">KIZUNA: <span id="love-val" style="color:var(--main-pink)">50</span> / 100</div>
    </div>

    <div class="room-main">
        <div id="chat-bubble" class="bubble">……</div>
        <img id="hagumo-sprite" src="./images/buta.PNG" class="hagumo-img bounce" onclick="撫でる()">
    </div>

    <div id="choices" class="choice-container">
        <button class="choice-btn" onclick="handleChoice(0)"></button>
        <button class="choice-btn" onclick="handleChoice(1)"></button>
        <button class="choice-btn" onclick="handleChoice(2)"></button>
    </div>

    <div class="action-menu">
        <button id="talk-btn" class="action-btn" onclick="startTalk()">💬 おしゃべり (<span id="talk-count">5</span>)</button>
        <button id="stroke-btn" class="action-btn" onclick="撫でる()">👋 なでなで (<span id="stroke-count">10</span>)</button>
        <button class="action-btn" onclick="resetGame()" style="color:#ccc;">リセット</button>
    </div>

    <script>
        let talkQuota = 5, strokeQuota = 10, userName = "あなた", currentChar = "buta";
        let loveData = { buta:50, imo:50, jaku:50, risu:50, tora:50, chabo:50, saru:50, kame:50, nga:50, kuma:50 };

        const scenarios = {
            buta: {
                morning: "おはよう${N}！朝採れのカブ、食べる？", noon: "お昼だね。土の中で少しお昼寝しようかな。", night: "今日も一日お疲れ様。${N}のお肌、カブパックで癒してあげるね。",
                stroke: "えへへ、${N}の手、あったかいな…♪",
                maxMsg: "【祝・確定】${N}、君はもう僕の体の一部だよ。一生、君の美容と健康を僕が守り続けるからね。ずっと一緒だよ、約束！",
                patterns: [
                    { q: "ねえ${N}、僕のことどう思ってる？", a: ["世界一可愛い！", "おいしそう", "最高の相棒！"], scores: [10, 5, 10] },
                    { q: "もっともっと、白くて綺麗なカブになりたいな。協力してくれる？", a: ["もちろんだよ！", "今のままでも十分だよ", "スパルタでいくよ？"], scores: [10, 8, 5] },
                    { q: "${N}、今日はなんだか元気ない？僕が踊ってあげようか！", a: ["見たい！", "静かにしてて", "一緒に踊ろう！"], scores: [8, -5, 15] }
                ]
            },
            imo: {
                morning: "……ん。おはよう${N}さん。まだ眠いね……。", noon: "太陽が気持ちいいね。光合成、しちゃう？", night: "夜は冷えるね。僕のホクホクを分けてあげる。",
                stroke: "あぅ……。幸せすぎて、焼き芋になっちゃいそう……。",
                maxMsg: "【祝・確定】${N}さんの温かさ、土の中まで届いてたよ。これからは僕が${N}さんを温める番だね。一生、離さないよ。",
                patterns: [
                    { q: "あのね、僕の夢は世界一甘いサツマイモになることなんだ……。", a: ["応援するよ！", "もう十分甘いよ", "食べちゃいたい"], scores: [10, 10, 5] },
                    { q: "土の中に、宝物を隠したんだ。${N}さんに見せてあげようか？", a: ["見たい！", "あとでいいや", "何隠したの？"], scores: [10, 0, 5] },
                    { q: "${N}さん、僕と一緒にのんびり生きてくれる……？", a: ["もちろん！", "たまには急ごう", "考えておくね"], scores: [15, 5, -5] }
                ]
            },
            jaku: {
                morning: "ご機嫌よう、${N}。今日も貴方は麗しいわね。", noon: "ティータイムにしましょう。青いお茶を淹れるわね。", night: "月明かりが綺麗……。貴方と見ると、より美しく感じるわ。",
                stroke: "あら……。強引なのも、嫌いじゃないわよ？",
                maxMsg: "【祝・確定】私の美しさは、貴方の愛で完成したの。もう貴方なしの人生なんて考えられない。一生、貴方の専属パートナーでいさせて？",
                patterns: [
                    { q: "美しさを保つ秘訣を知りたい？", a: ["教えて！", "貴方のようになりたい", "内緒にしてて"], scores: [8, 15, 5] },
                    { q: "たまにはドレスアップして、お出かけしたいわ。", a: ["エスコートするよ", "似合う服を買うね", "ここでゆっくりしよう"], scores: [15, 10, 5] },
                    { q: "${N}、私に似合う色はなんだと思うかしら？", a: ["深い青", "情熱の赤", "清楚な白"], scores: [15, 5, 8] }
                ]
            },
            risu: {
                morning: "おっはよー！${N}！今日もきゅうりバリバリ食べてこー！", noon: "お腹すいたー！${N}、きゅうり持ってない！？", night: "ふぁぁ……。おやすみ${N}。いい夢見てね！",
                stroke: "ウヒョー！最高だぜ！もっと撫でろなのだー！",
                maxMsg: "【祝・確定】${N}！君はオレにとって、世界で一番大切なきゅうり……じゃなくてパートナーだ！一生、オレの隣で笑っててくれよな！",
                patterns: [
                    { q: "オレのほっぺ、触ってみる？きゅうり３本分入ってるぜ！", a: ["触る！", "引っ張る！", "食べちゃいたい"], scores: [10, 5, 10] },
                    { q: "今日は${N}のために、特選のきゅうりを獲ってきたぞ！", a: ["ありがとう！", "お肌に貼るね", "きゅうりばっかり…"], scores: [10, 15, -5] },
                    { q: "オレのこと、ずっと可愛がってくれるか……？", a: ["一生可愛がる！", "飽きるまでね", "当たり前だろ！"], scores: [15, -10, 15] }
                ]
            },
            tora: {
                morning: "おらおら${N}！朝だぞ！太陽浴びて赤くなるぜ！", noon: "昼飯はナポリタンか！？トマトマパワー注入だ！", night: "夜更かしは肌に悪いぞ。さっさと寝ろよ${N}！",
                stroke: "お、おう。……悪くない。もっと優しくしろよ！",
                maxMsg: "【祝・確定】ヘッ、お前にここまで絆されるとはな。お前は俺のバディだ。地獄の果てまで、このトマトマパワーで守ってやるぜ！一生一緒だ！",
                patterns: [
                    { q: "俺様のこの赤色、イケてるだろ？", a: ["最高にクール！", "ちょっと派手かな", "おいしそう"], scores: [15, -5, 5] },
                    { q: "強くなるにはリコピンだ！お前ももっと食え！", a: ["一緒に食べる！", "苦手なんだ…", "もうお腹いっぱい"], scores: [15, -10, 0] },
                    { q: "お前に何かあったら、俺がこのヘタでぶっ飛ばしてやるからな！", a: ["頼もしい！", "ヘタなんだ…", "守ってね！"], scores: [10, 5, 15] }
                ]
            },
            chabo: {
                morning: "ほっ、おはよう${N}。今日もどっしり構えていこうかのう。", noon: "日向ぼっこが一番の贅沢じゃ。${N}も隣へ来い。", night: "夜は静かでいいのう。昔話を一つしてやろうか。",
                stroke: "フォッフォッフォ。お主の手は魔法の手かのう。落ち着くわい。",
                maxMsg: "【祝・確定】お主のような若者に、ここまで愛されるとは。ワシの長いカボチャ人生、お主に捧げよう。一生、ワシが杖となって支えてやるからのう。",
                patterns: [
                    { q: "悩みがあるなら、ワシが聞いてやろう。何でも話してみよ。", a: ["実はね…", "今は大丈夫", "カボチャさんは？"], scores: [15, 5, 10] },
                    { q: "ワシの体は硬いが、心は柔らかいんじゃ。触ってみるか？", a: ["触る", "叩いてみる", "抱きつく"], scores: [10, -5, 15] },
                    { q: "${N}、お主にとって幸せとは何じゃ？", a: ["貴方といること", "美味しいもの", "お金！"], scores: [20, 10, 5] }
                ]
            },
            saru: {
                morning: "ウッキー！朝だ！ビタミン浴びて目覚めスッキリだね！", noon: "昼休みだウッキー！木登り競争しようぜ！", night: "暗くなってきたね。レモンの香りでリラックスしよ！",
                stroke: "ウキーッ！電気が走るフレッシュ感！たまらなーい！",
                maxMsg: "【祝・確定】ウッキー！${N}、君といると毎日がビタミンC爆発だよ！一生、君の人生を酸っぱくて甘い最高の刺激でいっぱいにしてあげる！大好きだウキー！",
                patterns: [
                    { q: "ねえねえ、レモン絞り体験してみる？ウッキー！", a: ["やる！", "痛そう…", "君を絞るの！？"], scores: [15, 5, 0] },
                    { q: "ウキー！${N}の笑顔、もっと見せてよ！", a: ["（笑顔を見せる）", "今は無理", "変な顔する"], scores: [15, -5, 10] },
                    { q: "オレたち、最高のコンビだよね！？", a: ["その通り！", "どうかな？", "ウッキー！"], scores: [15, 5, 20] }
                ]
            },
            kame: {
                morning: "……おはよう……。……ゆっくり……起きましょう……。", noon: "……お昼寝……。……甲羅の中……涼しいよ……。", night: "……月が……動くのを……見てるの……。……綺麗……。",
                stroke: "……ああ……。……時が……止まれば……いいのに……。",
                maxMsg: "【祝・確定】……${N}……。……私の歩みは……遅いけれど……。……一生かけて……貴方の隣を……歩き続けるよ……。……ずっと……一緒……。",
                patterns: [
                    { q: "……一緒に……歩くの……。……疲れない……？", a: ["全然！", "少し休憩しよ", "楽しいよ"], scores: [10, 15, 15] },
                    { q: "……ブルーベリー……。……一粒……あげる……。", a: ["ありがとう", "酸っぱい？", "食べさせて！"], scores: [10, 5, 15] },
                    { q: "……（じーっと見つめている）", a: ["見つめ返す", "照れる", "どうしたの？"], scores: [15, 10, 10] }
                ]
            },
            nga: {
                morning: "おはよお！${N}！今日も桃色ハッピーな一日にしよおね！", noon: "ランチタイム！桃ゼリー、半分こしよお？あーん！", night: "夜だねえ。${N}の夢の中に遊びにいっちゃおっかなあ！",
                stroke: "えへへえ、もっとー！もっと甘やかしてえー！",
                maxMsg: "【祝・確定】ふわああ！${N}、大好き大好き大好きー！君の心の中に、私だけの桃源郷を作っちゃった！一生、私を独り占めしてね？ねっ！",
                patterns: [
                    { q: "私の毛並み、ふわふわでしょ？どこが一番好き？", a: ["全部！", "お腹", "しっぽ"], scores: [15, 10, 10] },
                    { q: "えへへ、${N}にぎゅーってしてほしいなあ……。", a: ["ぎゅーする！", "あとでね", "恥ずかしい"], scores: [20, 0, 5] },
                    { q: "一生、私のことだけ見ててくれる？", a: ["誓うよ！", "努力するね", "他の子も…"], scores: [20, 10, -20] }
                ]
            },
            kuma: {
                morning: "……おはよう。……イチジクのジャム、作ったから食べろ。", noon: "……昼か。……騒がしいのは嫌いだ。静かにしてろ。", night: "……夜だな。……（隣に座って無言で寄り添ってくる）",
                stroke: "……フン。……嫌いじゃない。",
                maxMsg: "【祝・確定】……${N}。お前は俺の静寂を壊した特別な奴だ。……責任取れよ。一生、俺の隣でその馬鹿な顔を見せていろ。……愛してる。",
                patterns: [
                    { q: "……何を見ている。俺の顔に何かついているか？", a: ["かっこいいなと思って", "イチジクついてるよ", "なんでもない"], scores: [15, 10, 5] },
                    { q: "……俺の過去を知りたいのか。……あまり面白い話じゃないぞ。", a: ["聞きたい", "無理にはいいよ", "今が大切だから"], scores: [5, 10, 20] },
                    { q: "……（そっと手を握ってきた）", a: ["握り返す", "びっくりする", "離す"], scores: [20, 5, -30] }
                ]
            }
        };

        window.onload = () => {
            const savedName = localStorage.getItem('hName');
            const savedLove = localStorage.getItem('hLoveData');
            if (savedName) userName = savedName;
            if (savedLove) loveData = JSON.parse(savedLove);
            
            currentChar = localStorage.getItem('hChar') || "buta";
            document.getElementById('char-selector').value = currentChar;
            
            updateUI();
            setGreeting();
        };

        function setGreeting() {
            const hour = new Date().getHours();
            let g = "";
            if (hour >= 5 && hour < 11) g = scenarios[currentChar].morning;
            else if (hour >= 11 && hour < 18) g = scenarios[currentChar].noon;
            else g = scenarios[currentChar].night;
            
            document.getElementById('chat-bubble').innerText = g.replace("${N}", userName);
        }

        function changeChar() {
            currentChar = document.getElementById('char-selector').value;
            localStorage.setItem('hChar', currentChar);
            updateUI();
            setGreeting();
        }

        function updateUI() {
            const val = loveData[currentChar];
            document.getElementById('love-val').innerText = val;
            const fill = document.getElementById('love-fill');
            fill.style.width = val + '%';
            
            const sprite = document.getElementById('hagumo-sprite');
            sprite.src = `./images/${currentChar}.PNG`;

            if (val >= 100) {
                fill.classList.add('max');
                sprite.classList.add('rainbow-body');
            } else {
                fill.classList.remove('max');
                sprite.classList.remove('rainbow-body');
            }
            document.getElementById('talk-count').innerText = talkQuota;
            document.getElementById('stroke-count').innerText = strokeQuota;
        }

        function 撫でる() {
            if (strokeQuota <= 0) {
                document.getElementById('chat-bubble').innerText = "また明日、なでてね。";
                return;
            }
            strokeQuota--;
            const oldVal = loveData[currentChar];
            loveData[currentChar] = Math.min(100, loveData[currentChar] + 2);
            
            if (oldVal < 100 && loveData[currentChar] >= 100) triggerMaxEffect();
            
            document.getElementById('chat-bubble').innerText = scenarios[currentChar].stroke.replace("${N}", userName);
            localStorage.setItem('hLoveData', JSON.stringify(loveData));
            updateUI();
        }

        function triggerMaxEffect() {
            document.getElementById('max-flash').style.display = 'block';
            setTimeout(() => { document.getElementById('max-flash').style.display = 'none'; }, 500);
            document.getElementById('chat-bubble').innerText = scenarios[currentChar].maxMsg.replace("${N}", userName);
        }

        function startTalk() {
            if (talkQuota <= 0) {
                document.getElementById('chat-bubble').innerText = "今日はもうおねむみたい。";
                return;
            }
            talkQuota--;
            const p = scenarios[currentChar].patterns;
            const r = Math.floor(Math.random() * p.length);
            const s = p[r];
            
            document.getElementById('chat-bubble').innerText = s.q.replace("${N}", userName);
            const btns = document.querySelectorAll('.choice-btn');
            s.a.forEach((txt, i) => {
                btns[i].innerText = txt;
                btns[i].style.display = 'block';
                btns[i].onclick = () => {
                    const score = s.scores[i];
                    const oldVal = loveData[currentChar];
                    loveData[currentChar] = Math.max(0, Math.min(100, loveData[currentChar] + score));
                    
                    if (oldVal < 100 && loveData[currentChar] >= 100) triggerMaxEffect();
                    else {
                        document.getElementById('chat-bubble').innerText = score >= 10 ? "わあ！" : "うん。";
                        // 本来はここに個別返信を入れたいですが、容量の関係で簡略化
                    }
                    
                    document.getElementById('choices').style.display = 'none';
                    document.getElementById('talk-btn').disabled = false;
                    localStorage.setItem('hLoveData', JSON.stringify(loveData));
                    updateUI();
                };
            });
            document.getElementById('choices').style.display = 'flex';
            document.getElementById('talk-btn').disabled = true;
            updateUI();
        }

        function resetGame() {
            if(confirm("最初からやり直す？")) { localStorage.clear(); location.reload(); }
        }
    </script>
     <footer>
