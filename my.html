<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MY HAGUMO | ハグモの部屋</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        /* --- デザイン変数 --- */
        :root { 
            --main-pink: #ff7eb9; 
            --soft-pink: #fff5f7; 
            --pink1: #ffb3d9; 
            --pink2: #d1478e; 
            --white-glass: rgba(255, 255, 255, 0.85);
            --rainbow: linear-gradient(90deg, #ff2400, #e81d1d, #e8b71d, #1de840, #1ddde8, #2b1de8, #dd1de8, #ff2400); 
        }

        body { 
            font-family: 'Zen Maru Gothic', sans-serif; 
            background: var(--soft-pink); 
            margin: 0; 
            padding-top: 80px; 
            color: #555; 
            overflow-x: hidden;
            transition: background 0.5s;
        }

        /* --- ナビゲーション --- */
        .nav { position: fixed; top: 0; left: 0; width: 100%; background: var(--white-glass); backdrop-filter: blur(10px); z-index: 10000; border-bottom: 2px solid rgba(255, 179, 217, 0.3); padding: 12px 0; }
        .nav-content { max-width: 1100px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo-img { height: 35px; cursor: pointer; }
        .nav-links { display: flex; gap: 12px; }
        .nav-link { color: #888; text-decoration: none; font-size: 13px; font-weight: bold; padding: 8px 16px; border-radius: 50px; font-family: 'Quicksand', sans-serif; }
        .nav-link.active { color: var(--pink2); background: white; border: 1px solid var(--pink1); box-shadow: 0 4px 10px rgba(255, 126, 185, 0.2); }

        /* --- レイアウト --- */
        .main-wrapper { display: flex; flex-direction: column; align-items: center; max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        @media screen and (min-width: 769px) {
            .main-wrapper { flex-direction: row; align-items: flex-start; justify-content: center; gap: 40px; padding-top: 40px; }
            .left-panel { width: 320px; position: sticky; top: 120px; }
            .right-panel { width: 420px; }
        }

        /* --- コンポーネント --- */
        .status-container, .bubble {
            background: white; border: 2px solid var(--soft-pink); border-radius: 35px;
            box-shadow: 0 15px 35px rgba(255, 126, 185, 0.12); padding: 25px; text-align: center; margin-bottom: 25px;
        }

        /* スタミナ表示 */
        .stamina-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .st-badge { font-size: 11px; padding: 5px 12px; border-radius: 20px; background: var(--soft-pink); color: var(--pink2); font-weight: bold; border: 1px solid var(--pink1); }

        /* 絆ゲージ */
        .love-bar-bg { width: 100%; height: 20px; background: #f0f0f0; border-radius: 15px; margin: 15px 0; overflow: hidden; }
        .love-bar-fill { height: 100%; background: linear-gradient(90deg, var(--pink1), var(--main-pink)); width: 50%; transition: 0.5s; }
        .love-bar-fill.max { background: var(--rainbow); background-size: 200% 100%; animation: moveBg 2s linear infinite; }
        @keyframes moveBg { 0% { background-position: 0% 0%; } 100% { background-position: 200% 0%; } }

        /* キャラクター画像サイズ固定 */
        .hagumo-img { 
            width: 240px; height: 240px; object-fit: contain; cursor: pointer; transition: 0.3s;
            filter: drop-shadow(0 15px 25px rgba(255,126,185,0.3)); 
        }
        .bounce { animation: bounce 4s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* ボタンデザイン */
        .action-btn { 
            background: white; border: 2px solid var(--pink1); padding: 15px; border-radius: 50px; 
            font-weight: bold; cursor: pointer; color: var(--pink2); transition: 0.2s; flex: 1;
            box-shadow: 0 4px 0 var(--soft-pink); font-family: inherit;
        }
        .action-btn:hover { transform: translateY(-2px); background: var(--soft-pink); }
        .action-btn:active { transform: translateY(2px); box-shadow: none; }
        .action-btn:disabled { background: #f5f5f5; border-color: #ddd; color: #bbb; box-shadow: none; cursor: not-allowed; }

        .main-actions { display: flex; gap: 15px; width: 100%; }

        /* おしゃべり選択肢 */
        #choices { display: none; flex-direction: column; gap: 12px; margin-top: 20px; width: 100%; animation: fadeIn 0.3s; }
        .choice-btn {
            background: white; border: 2px solid var(--pink1); padding: 15px; border-radius: 30px;
            cursor: pointer; font-size: 15px; color: var(--pink2); font-weight: bold; transition: 0.2s; text-align: center;
        }
        .choice-btn:hover { background: var(--soft-pink); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 特殊演出 */
        .max-chaos { animation: abare-move 0.2s infinite, rainbow-flash 0.5s infinite !important; }
        @keyframes abare-move { 0% { transform: translate(0,0); } 50% { transform: translate(2px, 2px) rotate(2deg); } }
        @keyframes rainbow-flash { 0% { filter: hue-rotate(0deg) drop-shadow(0 0 10px red); } 100% { filter: hue-rotate(360deg) drop-shadow(0 0 10px red); } }
        
        .heart { position: fixed; color: #ff4d94; pointer-events: none; animation: heartUp 1.5s forwards; font-size: 24px; z-index: 9999; }
        @keyframes heartUp { 0% { transform: scale(0.5) translateY(0); opacity: 1; } 100% { transform: scale(1.5) translateY(-100px); opacity: 0; } }

        footer { background: white; padding: 60px 20px; text-align: center; border-top: 2px solid var(--soft-pink); margin-top: 100px; }

        @media screen and (max-width: 768px) {
            body { padding-top: 110px; }
            .hagumo-img { width: 220px; height: 220px; }
        }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="nav-content">
            <img src="./images/rogo.PNG" class="nav-logo-img" alt="HAGUMO Logo" onclick="location.href='index.html'">
            <div class="nav-links">
                <a href="index.html" class="nav-link">HOME</a>
                <a href="world.html" class="nav-link">WORLD</a>
                <a href="product.html" class="nav-link">PRODUCT</a>
                <a href="hagumo.html" class="nav-link">HAGUMO</a>
                <a href="diagnosis.html" class="nav-link">DIAGNOSIS</a>
                <a href="my.html" class="nav-link active">MY HAGUMO</a>

    <div class="main-wrapper">
        <div class="left-panel">
            <div class="status-container">

                <div class="stamina-container">
                    <span id="st-stroke-badge" class="st-badge">👋 なで: 10/10</span>

                    <option value="imo">さつまいもぐら</option>
                    <option value="jaku">ばたふらいぴーこっく</option>
                    <option value="risu">きゅうりす</option>

                <div style="font-size: 11px; color: #999; font-weight: bold;">KIZUNA: <span id="love-val">50</span> / 100</div>
            </div>
            <div style="text-align: center;">
                <img id="hagumo-sprite" src="./images/buta.PNG" class="hagumo-img bounce" onclick="strokeHagumo(event)">
            </div>
        </div>

        <div class="right-panel">
            <div id="chat-bubble" class="bubble">なでなでしたり、お話しして絆を深めてね！</div>
            <div id="choices"></div>
            
            <div class="action-menu">
                <div class="main-actions">
                    <button id="talk-btn" class="action-btn" onclick="startTalk()">💬 おしゃべり</button>
                    <button id="stroke-btn" class="action-btn" onclick="strokeHagumo(event)">👋 なでなで</button>
                </div>
                <button class="action-btn" onclick="renameUser()" style="margin-top: 15px; font-size: 13px; width: 100%;">✏️ おなまえ変更</button>
                <div style="text-align: center;">
                    <p id="timer-msg" style="font-size: 10px; color: #aaa; margin-top: 10px;">スタミナは時間で回復するよ</p>
                    <button class="reset-btn" onclick="manualReset()" style="background:none; border:none; color:#ccc; font-size:11px; cursor:pointer;">♻️ 絆をリセットする</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p style="color: var(--pink2); font-weight: bold; font-size: 15px; margin-bottom: 12px; letter-spacing: 1px;">🎀 HAGUMO project 🎀</p>
        <p style="font-size: 9px; color: #ccc; margin-top: 15px;">© 2026 Chihiro / HAGUMO project</p>
    </footer>

    <script>
        // --- データの定義 ---
        const charData = {
            buta: { welcome: "おかえりぶ！泥遊びするぶ？", maxWelcome: "おかえり、主様！世界で一番、主様が帰ってくるのを待ってたぶ！", strokeRes: "もっと撫でてぶ！泥が落ちちゃうぶ〜♪", ansRes: { high: "泥が輝いて見えるぶ！嬉しいぶー！", mid: "ありがとうぶ！もっと頑張るぶ！", low: "そんなの悲しいぶ…泥が乾いちゃうぶ。" }, questions: [{ q: "ボク、まだ上手に歩けないぶ…。不格好ぶ？", a: ["そこが可愛いんだよ", "練習あるのみ！", "確かに変だね"], scores: [10, 5, -5] }, { q: "泥を落としたら、ただのブタになっちゃうぶ…？", a: ["君は君だよ", "泥も君の一部だね", "確かにそうかも"], scores: [10, 5, -5] }], timeQuests: { morning: { q: "おはぶー！朝の泥はひんやりして気持ちいいぶ！", a: ["一緒に遊ぶ！", "顔洗うよ", "泥はちょっと"], scores: [10, 5, 0] } }, maxStrokes: ["主様の手、あったかいぶ〜", "主様はボクだけのものだぶ！"], farewell: "さよならぶ。" },
            imo: { welcome: "あ、おかえりもにょ。", maxWelcome: "主様が来ると、土の中まで明るくなるもにょ…♪", strokeRes: "なでなで、落ち着くもにょ……♪", ansRes: { high: "心の中がポカポカもにょ…♪", mid: "ありがとうもにょ。", low: "…土の奥に潜るもにょ。" }, questions: [{ q: "一生、土の中かもしれないもにょ…。それでもいいもにょ？", a: ["ボクが土に行くよ", "いつか地上へ行こう", "暗いのは嫌だな"], scores: [10, 5, -5] }], timeQuests: { morning: { q: "おはようもにょ。土が朝露で湿ってるもにょ…。", a: ["しっとりして良いね", "冷たくない？", "土は嫌い"], scores: [10, 5, -5] } }, maxStrokes: ["主様の手、落ち着くもにょ", "主様がいれば怖くないもにょ"], farewell: "バイバイもにょ。" },
            jaku: { welcome: "お帰りなさい、主様。今日も美しい一日ですわね。", maxWelcome: "あなたが戻られるのを、羽を震わせて待っておりましたわ。", strokeRes: "あら…主様の指先、とても優雅ですわね。", ansRes: { high: "まぁ…胸が高鳴りますわ。嬉しいですわね。", mid: "お言葉、痛み入りますわ。", low: "…少し、羽の色が曇ってしまいましたわ。" }, questions: [{ q: "私の羽、少し色が混ざりすぎていて…不気味ではありませんか？", a: ["複雑な輝きが素敵だよ", "個性があっていいね", "少し派手かも"], scores: [10, 5, -5] }], timeQuests: { morning: { q: "ごきげんよう。羽をお手入れしましょうか。", a: ["手伝わせて", "今日も綺麗だね", "眠そうだね"], scores: [10, 5, -5] } }, maxStrokes: ["あら、主様。嬉しいですわ", "世界で一番、心地よいですわね"], farewell: "さようなら。" },
            risu: { welcome: "おかえり！水分補給しっかりね！", maxWelcome: "もう、待ちくたびれて干からびちゃうかと思ったよぉ！大好き！", strokeRes: "わぁっ！なでなですると毛並みが整うよぉ！", ansRes: { high: "わぁっ！お肌も心もプルプルだよぉ！", mid: "ありがとう！", low: "…キュウリ、落としちゃった。" }, questions: [{ q: "尻尾がボサボサになっちゃった…。アイドル失格かなぁ？", a: ["自然体で最高だよ", "ブラッシングしよう", "ちょっと冒険だね"], scores: [10, 5, -5] }], timeQuests: { morning: { q: "おっはよー！朝のキュウリはシャキシャキだよぉ！", a: ["半分ちょうだい", "元気だね！", "まだ眠いよ"], scores: [10, 5, -5] } }, maxStrokes: ["主様になでられるの、美容液だよ！", "主様、だーいすき！"], farewell: "バイバイ。" },
            tora: { welcome: "おかえりガオー！トマトパワー全開だ！", maxWelcome: "お前がいないとトマトが枯れちまうかと思ったぜ！", strokeRes: "ガオーッ！力がみなぎってくるガオ！もっとだ！", ansRes: { high: "ガオーッ！最高のトマトパワーだガオ！", mid: "おう、サンキューな！", low: "…火が消えちまったガオ。" }, questions: [{ q: "ガオーッ！…今の吠え方、迫力足りなかったガオ？", a: ["可愛くて最高だよ", "一生懸命で良いガオ", "全然怖くないよ"], scores: [10, 5, -5] }], timeQuests: { morning: { q: "朝だガオーッ！真っ赤に燃えるガオ！", a: ["眩しいガオ！", "元気だね", "朝からうるさいよ"], scores: [10, 5, -5] } }, maxStrokes: ["おいおい、照れるガオ！", "お前となら、どこまでも強くなれるぜ！"], farewell: "あばよガオ。" },
            chabo: { welcome: "よお、主。待ってたぜ。座って休めよ。", maxWelcome: "おかえり、あんた。とにかく、無事でよかったぜ。", strokeRes: "…ふん、悪くねぇ。もっと端の方もなでろよ。", ansRes: { high: "…あんた、たまに心にくること言うよな。", mid: "ふん、分かってるじゃねぇか。", low: "…カボチャの皮より硬い言葉だな。" }, questions: [{ q: "俺の殻、ヒビが入っちまった。格好つかねぇな…。", a: ["戦った証だね", "味があっていいよ", "直さないの？"], scores: [10, 5, -5] }], timeQuests: { morning: { q: "朝か。収穫の手伝い、するかい？", a: ["喜んで！", "無理はしないで", "眠いから嫌"], scores: [10, 5, -5] } }, maxStrokes: ["あんたの手は…反則だな。", "畑仕事の疲れも吹っ飛ぶぜ。"], farewell: "じゃあな、主。" },
            saru: { welcome: "ウキキーッ！主！フレッシュなレモンはいかが！？", maxWelcome: "今日はずっとお祝いウキ！主様が大好きすぎるウキ！", strokeRes: "ウキッ！主のなでなで、ビタミンより効くぅ〜！", ansRes: { high: "ウキキーッ！ビタミンMAXだよぉ！", mid: "ウキッ！レモンみたいに効いたよ！", low: "…酸っぱすぎるよぉ。" }, questions: [{ q: "レモンが酸っぱすぎて、みんな逃げていっちゃうウキ…。", a: ["ボクは逃げないよ", "刺激的でいいよ", "確かに酸っぱい！"], scores: [10, 5, -5] }], timeQuests: { morning: { q: "おはようウキ！レモン絞りたてだウキ！", a: ["目が覚めた！", "酸っぱそうだね", "今は甘いのがいい"], scores: [10, 5, -5] } }, maxStrokes: ["主、最高だよぉ！", "レモンより甘い気分だウキーッ！"], farewell: "ウキィ…バイバイ。" },
            kame: { welcome: "おかえりなさい……。のんびり、いきましょうね。", maxWelcome: "あなたと過ごす、この一秒一秒が、私の永遠です……。", strokeRes: "あぁ……甲羅まで、ぬくもりが届きます……。", ansRes: { high: "あぁ…安らかな気持ちです…。", mid: "ありがとうございます……。", low: "……少し、甲羅の中に隠れますね。" }, questions: [{ q: "私……歩くの、遅すぎますか……？", a: ["一緒に歩けるから好き", "マイペースでいいよ", "もう少し急いで"], scores: [10, 5, -5] }], timeQuests: { morning: { q: "おはようございます……。朝露が綺麗ですね。", a: ["本当に綺麗だね", "ゆっくり見よう", "急がなきゃ"], scores: [10, 5, -5] } }, maxStrokes: ["あぁ…時が止まればいいのに……", "とっても優しい魔法ですね…"], farewell: "さようなら。" },
            nga: { welcome: "ピピィーッ！主様ぁ！会いたかったよぉ！", maxWelcome: "大好きな主様ぁ！もうどこへも行かないでぇ！", strokeRes: "ピピィッ！もっとぉ！主様のなでなで大好きぃー！", ansRes: { high: "ピピィッ！空まで飛べそうだよぉ！", mid: "ピピッ、ありがとうぅ！", low: "…ピーッ！嫌いになっちゃったの？" }, questions: [{ q: "甘えん坊すぎて、迷惑かなぁ…？ピピッ。", a: ["もっと甘えていいよ", "頼われて嬉しいよ", "時々ね"], scores: [10, 5, -5] }], timeQuests: { morning: { q: "ピピィッ！朝だよぉ！空散歩いくぅ！？", a: ["連れてって！", "高いの怖いよ", "まだ寝るぅ"], scores: [10, 5, -5] } }, maxStrokes: ["主様ぁ、だぁいすきだよぉ！", "これ、ボクへのプロポーズかなぁ！？"], farewell: "ピーッ！バイバイ。" },
            kuma: { welcome: "……お帰り。君の足音が聞こえたよ。", maxWelcome: "君が戻ってきてくれて、世界が色づいた。ありがとう。", strokeRes: "……君の手、とても温かい。心が解けていくようだね。", ansRes: { high: "……君という光に、救われた気がするよ。", mid: "……温かい言葉だね。", low: "……暗闇が、もっと深くなったみたいだ。" }, questions: [{ q: "イチジクの蜜で手がベタベタだ。触らないほうがいい。", a: ["気にせずなでさせて", "甘い香りがして好き", "汚れるのは嫌だな"], scores: [10, 5, -5] }], timeQuests: { morning: { q: "……朝の光は、少し眩しすぎるね。", a: ["一緒に浴びよう", "影を作ってあげる", "太陽は最高だよ"], scores: [10, 5, -5] } }, maxStrokes: ["君のぬくもり……これが「愛」なんだね。", "君がいれば、冬も怖くないよ。"], farewell: "さようなら。" }
        };

        let currentChar = localStorage.getItem('hagu_current_char') || "buta";
        let userName = localStorage.getItem('hagu_user') || "主様";
        let love = parseInt(localStorage.getItem(`hagu_love_${currentChar}`)) || 50;

        // --- 制限用システム ---
        let strokeCount = parseInt(localStorage.getItem('st_count')) || 0;
        let talkCount = parseInt(localStorage.getItem('tk_count')) || 0;
        let lastStrokeTime = parseInt(localStorage.getItem('st_time')) || Date.now();
        let lastTalkTime = parseInt(localStorage.getItem('tk_time')) || Date.now();

        function getName(text) {
            if (!text) return "";
            return text.replace(/主様/g, userName).replace(/主(?![ぁ-ん])/g, userName);
        }

        function save() {
            localStorage.setItem(`hagu_love_${currentChar}`, love);
            localStorage.setItem('hagu_user', userName);
            localStorage.setItem('hagu_current_char', currentChar);
            localStorage.setItem('st_count', strokeCount);
            localStorage.setItem('tk_count', talkCount);
            localStorage.setItem('st_time', lastStrokeTime);
            localStorage.setItem('tk_time', lastTalkTime);
        }

        function updateStatus() {
            const now = Date.now();
            
            // なでなで回復（1分経過でリセット）
            if (now - lastStrokeTime > 60000) {
                strokeCount = 0;
                lastStrokeTime = now;
            }
            // おしゃべり回復（15分経過でリセット）
            if (now - lastTalkTime > 900000) {
                talkCount = 0;
                lastTalkTime = now;
            }

            document.getElementById('love-val').innerText = love;
            document.getElementById('love-fill').style.width = love + "%";
            document.getElementById('user-display').innerText = userName + "のハグモルーム";
            
            // バッジ更新
            document.getElementById('st-stroke-badge').innerText = `👋 なで: ${10 - strokeCount}/10`;
            document.getElementById('st-talk-badge').innerText = `💬 話: ${5 - talkCount}/5`;

            // ボタン無効化（MAX時は制限なしで遊べるようにするのもアリですが、今は制限優先）
            document.getElementById('stroke-btn').disabled = (strokeCount >= 10 && love < 100);
            document.getElementById('talk-btn').disabled = (talkCount >= 5 && love < 100);

            // 背景色チェンジ
            if (love >= 100) document.body.style.background = "linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)";
            else if (love > 50) document.body.style.background = "#ffe0f0";
            else document.body.style.background = "#fff5f7";

            // MAX演出
            const sprite = document.getElementById('hagumo-sprite');
            const fill = document.getElementById('love-fill');
            if (love >= 100) {
                sprite.classList.add('max-chaos');
                fill.classList.add('max');
            } else {
                sprite.classList.remove('max-chaos');
                fill.classList.remove('max');
            }
            save();
        }

        function strokeHagumo(e) {
            if (strokeCount >= 10 && love < 100) {
                document.getElementById('chat-bubble').innerText = "（少し疲れちゃったみたい…時間を置いてみてね）";
                return;
            }
            strokeCount++;
            love = Math.min(100, love + 1);
            const data = charData[currentChar];
            document.getElementById('chat-bubble').innerText = getName((love >= 100) ? data.maxStrokes[Math.floor(Math.random()*2)] : data.strokeRes);
            createHeart(e.clientX || 200, e.clientY || 400);
            updateStatus();
        }

        function startTalk() {
            if (talkCount >= 5 && love < 100) {
                const wait = Math.ceil((900000 - (Date.now() - lastTalkTime)) / 60000);
                document.getElementById('chat-bubble').innerText = `今はのんびりしたいみたい。（あと${wait}分くらい）`;
                return;
            }
            const data = charData[currentChar];
            const quest = data.questions[Math.floor(Math.random() * data.questions.length)];
            
            document.getElementById('chat-bubble').innerText = getName(quest.q);
            const container = document.getElementById('choices');
            container.innerHTML = "";
            container.style.display = "flex";

            quest.a.forEach((text, i) => {
                const btn = document.createElement('button');
                btn.className = "choice-btn";
                btn.innerText = text;
                btn.onclick = () => {
                    talkCount++;
                    const score = quest.scores[i];
                    love = Math.min(100, Math.max(0, love + score));
                    container.style.display = "none";
                    document.getElementById('chat-bubble').innerText = getName(data.ansRes[score >= 10 ? "high" : (score < 0 ? "low" : "mid")]);
                    updateStatus();
                };
                container.appendChild(btn);
            });
        }

        function createHeart(x, y) {
            const h = document.createElement('div');
            h.className = 'heart'; h.innerHTML = '❤';
            h.style.left = (x - 12) + 'px'; h.style.top = (y - 12) + 'px';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 1000);
        }

        function changeChar() {
            currentChar = document.getElementById('char-selector').value;
            love = parseInt(localStorage.getItem(`hagu_love_${currentChar}`)) || 50;
            document.getElementById('hagumo-sprite').src = `./images/${currentChar}.PNG`;
            document.getElementById('chat-bubble').innerText = getName(love >= 100 ? charData[currentChar].maxWelcome : charData[currentChar].welcome);
            updateStatus();
        }

        function renameUser() {
            const n = prompt("新しいおなまえを教えてね", userName);
            if(n && n.trim()) { userName = n.trim(); updateStatus(); }
        }

        function manualReset() {
            if(confirm("絆をリセットして最初からやり直しますか？")) {
                localStorage.clear();
                location.reload();
            }
        }

        window.onload = () => {
            const savedChar = localStorage.getItem('hagu_current_char');
            if (savedChar) {
                currentChar = savedChar;
                document.getElementById('char-selector').value = savedChar;
            }
            changeChar();
            setInterval(updateStatus, 5000);
        };
    </script>
</body>
</html>
