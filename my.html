<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MY HAGUMO | 絆の部屋</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --main-pink: #ff7eb9; 
            --soft-pink: #fff5f7; 
            --pink1: #ffb3d9; 
            --pink2: #d1478e; 
            --gold: #ffd700; 
            --rainbow: linear-gradient(90deg, #ff2400, #e81d1d, #e8b71d, #1de840, #1ddde8, #2b1de8, #dd1de8, #ff2400); 
        }

        body { 
            font-family: 'Zen Maru Gothic', sans-serif; 
            background: var(--soft-pink); 
            margin: 0; 
            padding-top: 100px; 
            color: #555; 
        }

        /* --- 【決定版】スマホ対応ナビゲーション --- */
        .nav { 
            position: fixed; top: 0; left: 0; width: 100%; 
            background: white; z-index: 10000; border-bottom: 2px solid #fff0f6; 
            padding: 8px 0;
        }
        .nav-content { 
            max-width: 1100px; margin: 0 auto; padding: 0 15px;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .nav-logo-img { height: 28px; cursor: pointer; }
        .nav-links { 
            display: flex; flex-wrap: wrap; justify-content: center; 
            gap: 4px 8px;
        }
        .nav-link { 
            color: #888; text-decoration: none; font-size: 11px; font-weight: bold; 
            padding: 4px 8px; border-radius: 20px; transition: 0.3s;
            background: #fdfdfd; border: 1px solid #f0f0f0;
        }
        .nav-link:hover, .nav-link.active { 
            color: var(--main-pink); background: var(--soft-pink); border-color: var(--main-pink);
        }

        @media screen and (min-width: 769px) {
            body { padding-top: 90px; }
            .nav-content { flex-direction: row; justify-content: space-between; height: 60px; }
            .nav-logo-img { height: 35px; }
            .nav-link { font-size: 13px; background: none; border: none; }
        }

        /* --- メインレイアウト --- */
        .main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 1000px;
            margin: 0 auto;
            padding: 10px 20px 40px;
        }

        @media screen and (min-width: 769px) {
            .main-wrapper {
                flex-direction: row; 
                align-items: flex-start;
                justify-content: center;
                gap: 40px;
                padding-top: 40px;
            }
            .left-panel { width: 400px; position: sticky; top: 120px; }
            .right-panel { width: 450px; }
        }

        .status-container { 
            width: 100%;
            padding: 20px; 
            background: white; 
            border-radius: 35px; 
            box-shadow: 0 10px 25px rgba(255,126,185,0.1); 
            text-align: center;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        .user-name-display { font-size: 14px; color: var(--main-pink); font-weight: bold; margin-bottom: 10px; }

        .love-bar-bg { width: 90%; height: 16px; background: #eee; border-radius: 10px; margin: 10px auto; overflow: hidden; border: 2px solid white; }
        .love-bar-fill { height: 100%; background: linear-gradient(90deg, var(--pink1), var(--main-pink)); width: 50%; transition: 1s cubic-bezier(0.22, 1, 0.36, 1); }
        .love-bar-fill.max { background: var(--rainbow); background-size: 200% 100%; animation: moveBg 2s linear infinite; }
        @keyframes moveBg { 0% { background-position: 0% 0%; } 100% { background-position: 200% 0%; } }

        .room-main { position: relative; text-align: center; margin: 20px 0; }
        .hagumo-img { width: 220px; height: 220px; object-fit: contain; cursor: pointer; transition: 0.3s; filter: drop-shadow(0 10px 15px rgba(255,126,185,0.2)); }
        @media screen and (min-width: 769px) { .hagumo-img { width: 300px; height: 300px; } }
        
        .bounce { animation: bounce 3s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* 吹き出しのレスポンシブ調整 */
        .bubble { 
            position: relative; background: white; padding: 25px; border-radius: 30px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.06); margin-bottom: 20px; 
            font-weight: bold; font-size: 15px; min-height: 80px;
            display: flex; align-items: center; justify-content: center;
            line-height: 1.6;
        }
        
        @media screen and (max-width: 768px) {
            .bubble { order: -1; margin-top: 10px; } /* スマホでは画像の上にセリフ */
            .bubble::after {
                content: ""; position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%);
                border-width: 14px 14px 0; border-style: solid;
                border-color: white transparent transparent;
            }
        }
        @media screen and (min-width: 769px) {
            .bubble::after {
                content: ""; position: absolute; left: -14px; top: 50%; transform: translateY(-50%);
                border-width: 14px 14px 14px 0; border-style: solid;
                border-color: transparent white transparent transparent;
            }
        }

        .choice-container { display: none; flex-direction: column; gap: 10px; margin-bottom: 20px; width: 100%; }
        .choice-btn { background: white; border: 2px solid var(--main-pink); padding: 14px; border-radius: 50px; cursor: pointer; font-weight: bold; color: var(--main-pink); transition: 0.2s; font-size: 14px; }
        .choice-btn:hover { background: var(--main-pink); color: white; }

        .action-menu { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .action-btn { background: white; border: 1px solid #eee; padding: 12px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; -webkit-tap-highlight-color: transparent; }
        .action-btn:active { transform: scale(0.95); background: var(--soft-pink); }

        footer { text-align: center; padding: 40px 20px; background: white; margin-top: 40px; border-top: 1px solid #eee; }
        
        .max-flash { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9000; animation: flashEffect 0.5s ease-out; pointer-events: none; }
        @keyframes flashEffect { 0% { opacity: 1; } 100% { opacity: 0; } }
        .rainbow-body { animation: rainbowAnim 1.5s linear infinite !important; filter: drop-shadow(0 0 30px gold) !important; }
        @keyframes rainbowAnim { 0% { filter: hue-rotate(0deg) scale(1.05); } 100% { filter: hue-rotate(360deg) scale(1.05); } }
    </style>
</head>
<body>

    <div id="max-flash" class="max-flash"></div>

    <nav class="nav">
        <div class="nav-content">
            <img src="./images/rogo.PNG" class="nav-logo-img" onclick="location.href='index.html'">
            <div class="nav-links">
                <a href="index.html" class="nav-link">HOME</a>
                <a href="world.html" class="nav-link">WORLD</a>
                <a href="product.html" class="nav-link">PRODUCT</a>
                <a href="hagumo.html" class="nav-link">HAGUMO</a>
                <a href="diagnosis.html" class="nav-link">DIAGNOSIS</a>
                <a href="my.html" class="nav-link active">MY HAGUMO</a>
            </div>
        </div>
    </nav>

    <div class="main-wrapper">
        <div class="left-panel">
            <div class="status-container">
                <div id="user-display" class="user-name-display"></div>
                <select id="char-selector" onchange="changeChar()" style="padding: 10px; border-radius: 15px; font-weight: bold; font-family: inherit; color: var(--pink2); border: 2px solid var(--soft-pink); margin-bottom: 15px; outline: none;">
                    <option value="buta">かぶた</option>
                    <option value="imo">さつまいもぐら</option>
                    <option value="jaku">ばたふらいぴーこっく</option>
                    <option value="risu">きゅうりす</option>
                    <option value="tora">とまとら</option>
                    <option value="chabo">かぼちゃぼ</option>
                    <option value="saru">れもんきー</option>
                    <option value="kame">ぶるーべりくがめ</option>
                    <option value="nga">もももんが</option>
                    <option value="kuma">くろいちじくま</option>
                </select>
                <div class="love-bar-bg"><div id="love-fill" class="love-bar-fill"></div></div>
                <div style="font-size: 12px; font-weight: bold; color: #888; letter-spacing: 1px;">KIZUNA LEVEL: <span id="love-val" style="color:var(--main-pink); font-size: 18px;">50</span> / 100</div>
            </div>
            <div class="room-main">
                <img id="hagumo-sprite" src="./images/buta.PNG" class="hagumo-img bounce" onclick="撫でる()">
            </div>
        </div>

        <div class="right-panel">
            <div id="chat-bubble" class="bubble">……</div>
            <div id="choices" class="choice-container">
                <button class="choice-btn"></button>
                <button class="choice-btn"></button>
                <button class="choice-btn"></button>
            </div>
            <div class="action-menu">
                <button id="talk-btn" class="action-btn" onclick="startTalk()">💬 おしゃべり (<span id="talk-count">5</span>)</button>
                <button id="stroke-btn" class="action-btn" onclick="撫でる()">👋 なでなで (<span id="stroke-count">10</span>)</button>
                <div style="width: 100%; display: flex; justify-content: center; gap: 15px; margin-top: 10px;">
                    <button class="action-btn" onclick="renameUser()" style="color:#888; font-size: 11px; padding: 8px 15px; border: none;">名前変更</button>
                    <button class="action-btn" onclick="resetGame()" style="color:#bbb; font-size: 11px; padding: 8px 15px; border: none;">リセット</button>
                </div>
            </div>
        </div>
    </div>

    <footer><p style="font-size: 12px; color: #bbb;">&copy; 2026 MY HAGUMO Project</p></footer>

    <script>
        // ... (元のスクリプトをここに挿入) ...
    </script>
</body>
</html>
