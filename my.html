<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY HAGUMO | パートナーと遊ぶ</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <style>
        .my-header { text-align: center; padding: 40px 20px; background: #fff4f9; border-radius: 0 0 40px 40px; }
        .my-container { max-width: 500px; margin: 0 auto; padding: 20px; text-align: center; }

        /* ハグモの表示エリア */
        .stage {
            background: white;
            border-radius: 40px;
            padding: 40px 20px;
            box-shadow: 0 15px 40px rgba(255, 126, 185, 0.1);
            position: relative;
            margin-bottom: 20px;
            overflow: hidden;
        }

        /* ハグモの画像（アニメーション付） */
        .my-img {
            width: 180px; height: 180px;
            object-fit: contain;
            transition: 0.3s;
            cursor: pointer;
            filter: drop-shadow(0 8px 15px rgba(0,0,0,0.1));
        }
        .my-img:active { transform: scale(0.9) rotate(5deg); } /* クリックで動く */

        /* ハートが出るエフェクト */
        .heart-fx {
            position: absolute; color: #ff7eb9; font-size: 24px;
            animation: floatUp 1s forwards; pointer-events: none;
        }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }

        /* 仲良し度ゲージ */
        .love-gauge-container {
            background: #eee;
            height: 12px; border-radius: 10px;
            margin: 20px 0 10px; overflow: hidden;
        }
        #love-bar {
            background: linear-gradient(to right, #ff9ecb, #ff7eb9);
            width: 30%; height: 100%; transition: 0.5s;
        }

        /* 遊びメニュー */
        .play-menu {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            margin-top: 20px;
        }
        .play-btn {
            background: white; border: 2px solid #ffdaeb;
            padding: 12px; border-radius: 20px;
            font-size: 14px; font-weight: bold; color: #444;
            cursor: pointer; transition: 0.2s;
        }
        .play-btn:hover { background: #fff4f9; transform: translateY(-2px); }

        /* メッセージウィンドウ */
        .msg-bubble {
            background: #fafafa; border-radius: 20px;
            padding: 15px; margin-top: 20px;
            font-size: 13px; color: #666; min-height: 40px;
        }
    </style>
</head>
<body>
    <div class="container" style="margin-top: 80px;">
        <header class="my-header">
            <h1 style="font-family: 'Zen Maru Gothic'; color: #444;">🐾 MY HAGUMO</h1>
            <p id="partner-status" style="color: #ff7eb9; font-size: 12px; margin-top: 5px; font-weight: bold;">お腹が空いているみたい…</p>
        </header>

        <div class="my-container">
            <div id="has-data" style="display:none;">
                <div class="stage">
                    <h2 id="partner-name" style="font-family: 'Zen Maru Gothic'; margin-bottom: 20px;"></h2>
                    <img id="partner-img" class="my-img" src="" onclick="playAction('なでる')">
                    
                    <div style="font-size: 12px; color: #999; margin-top: 10px;">仲良し度</div>
                    <div class="love-gauge-container"><div id="love-bar"></div></div>
                    <div id="love-percent" style="font-size: 11px; color: #ff7eb9; font-weight: bold;">30%</div>
                </div>

                <div class="play-menu">
                    <button class="play-btn" onclick="playAction('なでる')">👋 なでる</button>
                    <button class="play-btn" onclick="playAction('おやつ')">🍎 おやつ</button>
                    <button class="play-btn" onclick="playAction('おしゃべり')">💬 話す</button>
                    <button class="play-btn" onclick="playAction('お掃除')">🧹 お掃除</button>
                </div>

                <div class="msg-bubble" id="msg">タップして遊んでね！</div>
            </div>

            <div id="no-data" style="padding: 60px 20px;">
                <p>まだあなたのパートナーがいません。</p>
                <a href="diagnosis.html" class="button" style="margin-top: 20px; display: inline-block;">診断をはじめる 🌱</a>
            </div>
        </div>
    </div>

    <script>
        let loveScore = 30;
        let partnerData = null;

        document.addEventListener('DOMContentLoaded', function() {
            const savedData = localStorage.getItem('myHagumo');
            if (savedData) {
                partnerData = JSON.parse(savedData);
                document.getElementById('partner-name').innerText = partnerData.name;
                const img = document.getElementById('partner-img');
                img.src = `./images/${partnerData.img}`;
                img.onerror = () => img.src = `./${partnerData.img}`;
                
                document.getElementById('has-data').style.display = 'block';
                document.getElementById('no-data').style.display = 'none';
            }
        });

        function playAction(type) {
            const msgBox = document.getElementById('msg');
            const bar = document.getElementById('love-bar');
            const percent = document.getElementById('love-percent');
            const status = document.getElementById('partner-status');

            // 仲良し度アップ
            loveScore = Math.min(loveScore + 5, 100);
            bar.style.width = loveScore + '%';
            percent.innerText = loveScore + '%';

            // エフェクト
            createHeart();

            // メッセージ切り替え
            if(type === 'なでる') {
                msgBox.innerText = `${partnerData.name}は気持ちよさそうに目を細めている！`;
                status.innerText = "ごきげん：ハッピー！";
            } else if(type === 'おやつ') {
                msgBox.innerText = `おいしいおやつを食べて、ツヤツヤになった！`;
                status.innerText = "ごきげん：お腹いっぱい！";
            } else if(type === 'おしゃべり') {
                msgBox.innerText = `${partnerData.name}はあなたの話を一生懸命聞いている…。`;
            } else {
                msgBox.innerText = `お部屋がきれいになって、${partnerData.name}も嬉しそう！`;
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart-fx';
            heart.innerText = '❤';
            heart.style.left = (Math.random() * 60 + 20) + '%';
            heart.style.top = '50%';
            document.querySelector('.stage').appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }
    </script>
    <script src="./common.js"></script>
</body>
</html>
