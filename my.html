<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY HAGUMO | 絆の部屋</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-pink: #ff7eb9; --bg-room: #fff5f7; }
        body { font-family: 'Zen Maru Gothic', sans-serif; background: var(--bg-room); margin: 0; padding-top: 90px; overflow-x: hidden; }

        /* --- 鉄壁ナビゲーション --- */
        .navbar { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: white; z-index: 5000; border-bottom: 2px solid #fff0f6; display: flex; align-items: center; justify-content: center; }
        .nav-content { width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .nav-logo-img { height: 40px; cursor: pointer; flex-shrink: 0; }
        .nav-links { display: flex; gap: 15px; flex-shrink: 0; }
        .nav-links a { color: #888; text-decoration: none; font-size: 14px; font-weight: bold; padding: 5px 10px; }
        .nav-links a.active { color: var(--main-pink); border-bottom: 2px solid var(--main-pink); }

        /* ステータス */
        .status-container { max-width: 400px; margin: 10px auto; padding: 15px; background: white; border-radius: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-align: center; }
        .love-bar-bg { width: 85%; height: 12px; background: #eee; border-radius: 10px; margin: 8px auto; overflow: hidden; }
        .love-bar-fill { height: 100%; background: linear-gradient(90deg, #ff9a9e, #ff7eb9); width: 50%; transition: 0.8s; }
        
        /* 演出 */
        @keyframes rainbow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        .rainbow-active { animation: rainbow 3s linear infinite !important; transform: scale(1.1); }

        /* メイン */
        .room-main { position: relative; height: 320px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hagumo-img { width: 200px; transition: 0.5s; cursor: pointer; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }
        .bounce { animation: bounce 2.5s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .bubble { position: relative; background: white; padding: 18px; border-radius: 25px; width: 80%; max-width: 300px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); margin-bottom: 25px; text-align: center; font-weight: bold; color: #555; font-size: 14px; }
        .bubble::after { content: ""; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); border-width: 10px 10px 0; border-style: solid; border-color: white transparent transparent; }

        .choice-container { display: none; flex-direction: column; gap: 8px; width: 90%; max-width: 300px; margin: 0 auto 20px auto; }
        .choice-btn { background: white; border: 2px solid var(--main-pink); padding: 12px; border-radius: 50px; cursor: pointer; font-weight: bold; color: var(--main-pink); font-size: 13px; }

        .action-menu { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .action-btn { background: white; border: none; padding: 12px 20px; border-radius: 50px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.08); cursor: pointer; font-size: 12px; }
        
        #name-modal, .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,192,203,0.98); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .overlay { background: rgba(0,0,0,0.9); color: white; }
    </style>
</head>
<body>

    <div id="name-modal">
        <h2 style="color:var(--main-pink);">お名前を教えて？</h2>
        <input type="text" id="user-name-input" style="padding:15px; border-radius:20px; border:2px solid var(--main-pink); margin-bottom:20px; text-align:center;">
        <button class="action-btn" onclick="saveName()">決定 🎀</button>
    </div>

    <nav class="navbar">
        <div class="nav-content">
            <img src="./images/rogo.PNG" class="nav-logo-img" onclick="location.href='index.html'">
            <div class="nav-links">
                <a href="index.html">HOME</a>
                <a href="product.html">PRODUCT</a>
                <a href="my.html" class="active">MY HAGUMO</a>
            </div>
        </div>
    </nav>

    <div class="status-container">
        <select id="char-selector" onchange="changeChar()" style="border:none; font-weight:bold; color:var(--main-pink); font-size:16px; font-family:inherit;">
            <option value="buta">かぶた</option>
            <option value="imo">さつまいもぐら</option>
            <option value="jaku">ばたふらいぴーこっく</option>
            <option value="risu">きゅうりす</option>
            <option value="tora">とまとら</option>
            <option value="chabo">かぼちゃぼ</option>
            <option value="saru">れもんきー</option>
            <option value="kame">ぶるーべりくがめ</option>
            <option value="nga">もももんが</option>
            <option value="kuma">くろいちじくま</option>
        </select>
        <div class="love-bar-bg"><div id="love-fill" class="love-bar-fill"></div></div>
        <div style="font-size: 11px; color: #888;">絆レベル: <span id="love-val">50</span> / 100</div>
    </div>

    <div class="room-main">
        <div id="chat-bubble" class="bubble">……</div>
        <img id="hagumo-sprite" src="./images/buta.PNG" class="hagumo-img bounce" onclick="撫でる()">
    </div>

    <div id="choices" class="choice-container">
        <button class="choice-btn" onclick="handleChoice(0)"></button>
        <button class="choice-btn" onclick="handleChoice(1)"></button>
        <button class="choice-btn" onclick="handleChoice(2)"></button>
    </div>

    <div class="action-menu">
        <button id="talk-btn" class="action-btn" onclick="startTalk()">💬 おしゃべり (<span id="talk-count">5</span>)</button>
        <button id="stroke-btn" class="action-btn" onclick="撫でる()">👋 なでなで (<span id="stroke-count">10</span>)</button>
        <button class="action-btn" onclick="sayGoodbye()" style="color:#cc0000; opacity:0.6;">お別れ</button>
        <button class="action-btn" onclick="resetGame()" style="color:#888; opacity:0.6;">リセット</button>
    </div>

    <div id="farewell-overlay" class="overlay">
        <h1>さようなら</h1>
        <p>HAGUMOは土へ帰りました。</p>
        <button class="action-btn" onclick="location.href='diagnosis.html'">診断へ戻る 🔍</button>
    </div>

    <script>
        let talkQuota = 5, strokeQuota = 10, userName = "あなた", currentChar = "buta", currentScenario = null;
        // キャラごとの好感度を保持するオブジェクト
        let loveData = { buta:50, imo:50, jaku:50, risu:50, tora:50, chabo:50, saru:50, kame:50, nga:50, kuma:50 };

        const charConfigs = {
            buta: { stroke: "えへへ、いい気持ち……♪", good: "わあ！すごく嬉しいな！✨", soso: "そうだね。わかるよ。", bad: "……そっか。ごめんね。", max: "${N}、君との絆はもう永遠だね。世界で一番幸せなカブだよ！" },
            imo: { stroke: "ホクホクしちゃうなぁ……。", good: "えへへ、君といると心が温まるよ。", soso: "うん、僕もそう思うよ。", bad: "土の中に隠れたくなっちゃうな…。", max: "${N}、君といると心がポカポカするんだ。ずっと一緒にいようね。" },
            jaku: { stroke: "あら、優しいのね。うふふ。", good: "あら、素敵な答え。気に入ったわ。", soso: "ええ、そうね。悪くないわ。", bad: "……少し、香りが乱れてしまったわ。", max: "愛という名の最高の一杯を貴方に。${N}、貴方の側が一番美しい場所だわ。" },
            risu: { stroke: "ほっぺが落ちちゃいそう！", good: "最高！君って本当に気が合うね！", soso: "ポリポリ……うん、いいんじゃない？", bad: "うーん、今はきゅうり気分じゃないかも。", max: "カリッ、ポリッ！${N}とおしゃべりするのは最高のリフレッシュだよ！大好き！" },
            tora: { stroke: "ガオーッ！もっとやってくれ！", good: "最高だぜ！お前、わかってるな！", soso: "おう、それもアリだな！", bad: "……なんだよ、つまんねーの。", max: "ガオーッ！${N}の笑顔が俺の元気の源だ！最強のバディだぜ！" },
            chabo: { stroke: "よしよし、落ち着くのう……。", good: "おお、お主は話がわかるやつじゃ。", soso: "ふむ、それも一理あるな。", bad: "……少し、カボチャが硬くなった気分じゃ。", max: "${N}、どっしり構えて待っておるぞ。お主の居場所はここにあるからな。" },
            saru: { stroke: "ウッキー！ビタミン感じるー！", good: "最高にフレッシュ！ウッキー！！", soso: "まあまあだね！酸っぱいね！", bad: "ウ……酸っぱすぎて涙が出ちゃうよ。", max: "ウッキー！${N}、酸いも甘いも一緒に乗り越えていこうね！ずっと親友だよ！" },
            kame: { stroke: "……ゆっくり、幸せ……。", good: "……嬉しい。時間はたっぷりあるからね。", soso: "……うん。いいと思うよ。", bad: "……（そっと甲羅に閉じこもった）", max: "……（ゆっくり擦り寄ってきた） ${N}、君と歩く時間が一番幸せなんだ。" },
            nga: { stroke: "ふわああ、とろけちゃうよお。", good: "わあーい！${N}、大好きー！", soso: "うん、桃色な気分だねっ！", bad: "えーん、桃が傷んじゃうよお。", max: "ふわふわ、とろとろ。${N}、僕のハートは君でいっぱいだよ！えへへ！" },
            kuma: { stroke: "……悪くないな。", good: "……ふっ。君は面白い人だ。", soso: "……ああ。そうかもしれないな。", bad: "……これ以上は、踏み込まないでくれ。", max: "……${N}。言葉はいらないな。君の側にいられるだけで、十分だ。" }
        };

        const allPatterns = {
            buta: [{ q: "ねえ${N}、一緒に食べる？", a: ["喜んで！", "あとでね", "苦手…"], scores: [10, 5, -5] }, { q: "パックしてあげようか？", a: ["お願い！", "大丈夫", "やだ"], scores: [10, 5, -5] }, { q: "${N}、大好きだよ！", a: ["私も！", "そうなんだ", "照れるな〜"], scores: [10, 5, 5] }, { q: "ずっと隣にいてもいい？", a: ["もちろんだよ！", "たまにね", "重いかな"], scores: [10, 5, -5] }, { q: "頑張ったから褒めて？", a: ["えらいえらい！", "普通だよ", "もっと頑張れ"], scores: [10, 5, -5] }],
            tora: [{ q: "元気？ガオー！", a: ["超元気！", "そこそこ", "ない…"], scores: [10, 5, 0] }, { q: "走りに行く？", a: ["行こう！", "歩きなら", "寝てたい"], scores: [10, 5, -5] }, { q: "俺、かっこいい？", a: ["一番！", "可愛いよ", "派手"], scores: [10, 5, -5] }, { q: "何か食いもんある？", a: ["トマト！", "後で作るぜ", "自分で探せ"], scores: [10, 5, -5] }, { q: "笑わせてやるよ！", a: ["ありがとな", "放っておけ", "面白いことして"], scores: [10, -5, 5] }]
            // ※他のキャラも同様にallDataから引き継ぎ（省略してもプログラム上はbutaをコピーして動くように下で調整）
        };

        window.onload = () => {
            const sn = localStorage.getItem('hName');
            const sl = localStorage.getItem('hLoveData');
            if (!sn) document.getElementById('name-modal').style.display = 'flex';
            else { 
                userName = sn; 
                if(sl) loveData = JSON.parse(sl);
                loadGame(); 
            }
        };

        function saveName() {
            const v = document.getElementById('user-name-input').value;
            if (v) { userName = v; localStorage.setItem('hName', v); document.getElementById('name-modal').style.display = 'none'; loadGame(); }
        }

        function loadGame() {
            currentChar = localStorage.getItem('hChar') || "buta";
            document.getElementById('char-selector').value = currentChar;
            updateCharDisplay(); updateUI();
        }

        function changeChar() {
            currentChar = document.getElementById('char-selector').value;
            localStorage.setItem('hChar', currentChar);
            updateCharDisplay();
            document.getElementById('chat-bubble').innerText = "これからよろしくね！";
            updateUI();
        }

        function updateCharDisplay() { 
            document.getElementById('hagumo-sprite').src = `./images/${currentChar}.PNG`;
            const love = loveData[currentChar];
            const sprite = document.getElementById('hagumo-sprite');
            if(love >= 100) sprite.classList.add('rainbow-active');
            else sprite.classList.remove('rainbow-active');
        }

        function updateLove(v) {
            loveData[currentChar] = Math.max(0, Math.min(100, loveData[currentChar] + v));
            localStorage.setItem('hLoveData', JSON.stringify(loveData));
            updateUI();
            
            const love = loveData[currentChar];
            const sprite = document.getElementById('hagumo-sprite');
            const bubble = document.getElementById('chat-bubble');

            if (love >= 100) {
                sprite.classList.add('rainbow-active');
                bubble.innerText = charConfigs[currentChar].max.replace("${N}", userName);
            } else {
                sprite.classList.remove('rainbow-active');
            }
            if (love === 0) showFarewell();
        }

        function updateUI() {
            const love = loveData[currentChar];
            document.getElementById('love-val').innerText = love;
            document.getElementById('love-fill').style.width = love + '%';
            document.getElementById('talk-count').innerText = talkQuota;
            document.getElementById('stroke-count').innerText = strokeQuota;
        }

        function 撫でる() {
            if (strokeQuota > 0) {
                strokeQuota--; updateLove(1);
                document.getElementById('chat-bubble').innerText = charConfigs[currentChar].stroke;
                document.getElementById('stroke-btn').disabled = true;
                setTimeout(() => { if(strokeQuota > 0) document.getElementById('stroke-btn').disabled = false; }, 1000);
            }
        }

        function startTalk() {
            if (talkQuota > 0) {
                talkQuota--;
                const p = allPatterns[currentChar] || allPatterns["buta"]; // 全キャラデータある前提
                const r = Math.floor(Math.random() * p.length);
                currentScenario = JSON.parse(JSON.stringify(p[r]));
                currentScenario.q = currentScenario.q.replace("${N}", userName);
                document.getElementById('chat-bubble').innerText = currentScenario.q;
                const bs = document.querySelectorAll('.choice-btn');
                currentScenario.a.forEach((t, i) => { bs[i].innerText = t; });
                document.getElementById('choices').style.display = 'flex';
                document.getElementById('talk-btn').disabled = true;
            }
        }

        function handleChoice(i) {
            const s = currentScenario.scores[i]; updateLove(s);
            const cfg = charConfigs[currentChar];
            document.getElementById('chat-bubble').innerText = s >= 10 ? cfg.good : s >= 5 ? cfg.soso : cfg.bad;
            document.getElementById('choices').style.display = 'none';
            document.getElementById('talk-btn').disabled = false;
        }

        function sayGoodbye() { if(confirm("本当にお別れしちゃうの…？")) showFarewell(); }
        function resetGame() { if(confirm("全部リセットして最初からにする？")) { localStorage.clear(); location.reload(); } }
        function showFarewell() { document.getElementById('farewell-overlay').style.display = 'flex'; }
    </script>
</body>
</html>
