<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAGUMO | MY HAGUMO 育成モード</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-pink: #ff7eb9;
            --soft-pink: #fff4f9;
            --sub-pink: #ffdaeb;
            --bg: #fff9fb;
        }

        body { margin: 0; padding: 0; background-color: var(--bg); font-family: 'Zen Maru Gothic', sans-serif; color: #444; }
        
        /* ナビゲーション */
        .navbar { position: fixed; top: 0; width: 100%; background: white; padding: 10px 0; z-index: 2000; border-bottom: 1px solid #f0f0f0; }
        .nav-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: center; align-items: center; gap: 30px; }
        .nav-logo-img { height: 30px; cursor: pointer; }
        .nav-links { display: flex; gap: 15px; }
        .nav-links a { color: #555; text-decoration: none; font-size: 13px; font-weight: bold; }
        .nav-links a.active { color: var(--main-pink); }

        .container { margin-top: 100px; padding: 20px; text-align: center; }

        .stage { 
            background: white; border-radius: 40px; padding: 40px 20px; 
            box-shadow: 0 15px 40px rgba(255, 126, 185, 0.15); 
            margin: 0 auto; max-width: 500px; position: relative; border: 3px solid var(--sub-pink);
        }
        
        .my-img { width: 220px; transition: 0.5s; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }
        .bounce { animation: bounce 0.8s infinite alternate cubic-bezier(0.45, 0.05, 0.55, 0.95); }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-15px); } }
        
        /* 虹色オーラ強制発動用 */
        .max-aura { filter: drop-shadow(0 0 25px #ff7eb9) !important; animation: rainbow 2s infinite linear !important; }
        @keyframes rainbow { 0% { filter: hue-rotate(0deg) drop-shadow(0 0 20px #ff7eb9); } 100% { filter: hue-rotate(360deg) drop-shadow(0 0 20px #ff7eb9); } }

        .speech-bubble { 
            background: var(--soft-pink); border: 3px solid var(--sub-pink); border-radius: 25px; 
            padding: 20px; margin-bottom: 30px; min-height: 60px; display: flex; 
            align-items: center; justify-content: center; font-weight: bold; color: #555; 
            position: relative; font-size: 14px; line-height: 1.6; 
        }
        .speech-bubble::after { 
            content: ""; position: absolute; bottom: -15px; left: 50%; 
            border-width: 15px 15px 0; border-style: solid; 
            border-color: var(--sub-pink) transparent; width: 0; margin-left: -15px; 
        }

        .gauge-wrap { width: 80%; height: 16px; background: #ffeef2; border-radius: 10px; margin: 20px auto 5px; overflow: hidden; border: 2px solid var(--sub-pink); }
        #love-bar { height: 100%; background: linear-gradient(to right, #ffb6c1, var(--main-pink)); transition: 1s; width: 0%; }
        
        .kawaii-btn { 
            background: white; border: 3px solid #ffb6c1; color: var(--main-pink); 
            padding: 12px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; 
            margin: 5px; font-size: 14px; transition: 0.2s; font-family: inherit;
        }
        .kawaii-btn:hover { background: #fff0f5; transform: scale(1.05); }
        
        .choice-container { display: none; flex-direction: column; gap: 10px; margin-top: 20px; }
        .main-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 500px; margin: 20px auto; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-content">
            <img src="./images/rogo.PNG" class="nav-logo-img" onclick="location.href='index.html'">
            <div class="nav-links">
                <a href="index.html">HOME</a>
                <a href="world.html">WORLD</a>
                <a href="hagumo.html">HAGUMO</a>
                <a href="diagnosis.html">DIAGNOSIS</a>
                <a href="product.html">PRODUCT</a>
                <a href="my.html" class="active">MY HAGUMO</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="has-data">
            <div class="stage">
                <div id="status-label" style="font-size: 12px; color: var(--main-pink); margin-bottom: 10px; font-weight: bold;">---</div>
                <div class="speech-bubble" id="msg-text">読み込み中...</div>
                <img id="partner-img" class="my-img bounce" src="">
                <div class="gauge-wrap"><div id="love-bar"></div></div>
                <div style="font-size: 13px; color: var(--main-pink); font-weight: bold;">なかよしレベル: <span id="love-num">0</span>%</div>
                <div id="choices" class="choice-container"></div>
            </div>

            <div id="main-actions" class="main-actions">
                <button class="kawaii-btn" onclick="playAction()">👋 なでなでする</button>
                <button class="kawaii-btn" onclick="startTalk()">💬 おしゃべりする</button>
            </div>
        </div>
        <div id="no-data" style="display:none; margin-top: 50px;">
            <p>まだパートナーがいないみたい...</p>
            <button class="kawaii-btn" onclick="location.href='diagnosis.html'">診断ページへ</button>
        </div>
    </div>

<script>
    let love = 50;
    let currentPartner = null;
    let partnerImgName = "";

    const charaData = {
        "risu.PNG": { name: "きゅうりす", key: "バランス・調和", maxMsg: "君との調和は完璧だよ。一生離さない。", talks: [
            {q:"心のバランス、整ってる？", a:[{t:"整ってる！", l:10, r:"完璧だね。今の君は美しいよ。"}, {t:"乱れ気味…", l:5, r:"深呼吸しよ？僕がリズムを合わせるから。"}]},
            {q:"ヨガに挑戦してみない？", a:[{t:"いいね！", l:10, r:"心と体の調和。それが一番大切なんだ。"}, {t:"体が硬い…", l:5, r:"少しずつでいいよ。"}]}
        ]},
        "tora.PNG": { name: "とまとら", key: "情熱・リーダー", maxMsg: "お前が最高の相棒だ！天下取りに行くぞ！", talks: [
            {q:"今の目標、ここで叫んでみろ！", a:[{t:"世界一！", l:15, r:"いい情熱だ！お前が皆を引っ張れ！"}, {t:"まだない", l:-5, r:"なら俺が道を作ってやる！ついてこい！"}]}
        ]},
        "saru.PNG": { name: "れもんきー", key: "ひらめき・自由", maxMsg: "君といると毎日が冒険だね！ウキーッ！", talks: [
            {q:"新しい遊び、ひらめいた！", a:[{t:"なになに？", l:10, r:"空飛ぶレモンだよ！ワクワクするね！"}]}
        ]},
        "kame.PNG": { name: "ぶるーべりくがめ", key: "知性・分析", maxMsg: "あなたの知性に完敗です。ずっと側に。分析完了。", talks: [
            {q:"今日の効率はどうでしたか？", a:[{t:"120%！", l:15, r:"分析以上の成果ですね。素晴らしい。"}]}
        ]},
        "buta.PNG": { name: "かぶた", key: "優しさ・包容", maxMsg: "あぁ…幸せですぅ。一生包んであげますねぇ。", talks: [
            {q:"ぎゅーしますかぁ？", a:[{t:"して！", l:15, r:"あったかいですねぇ。そのままおやすみなさぁい。"}, {t:"大丈夫", l:5, r:"いつでもここで待ってますよぉ。"}]}
        ]},
        "jaku.PNG": { name: "ばたふらいぴーこっく", key: "機転・賢さ", maxMsg: "最高の機転ね。あなたこそ私の運命の人よ。", talks: [
            {q:"このピンチ、どう抜けるかしら？", a:[{t:"機転を利かす", l:15, r:"流石ね。完璧な判断。惚れ直しちゃうわ。"}]}
        ]},
        "imo.PNG": { name: "さつまいもぐら", key: "努力・継続", maxMsg: "積み上げた努力の結晶だね！最高の絆だよ！", talks: [
            {q:"今日の一歩、進めたかな？", a:[{t:"進めた！", l:15, r:"偉い！地道な一歩が大きな成果になるんだ。"}]}
        ]},
        "nga.PNG": { name: "もももんが", key: "愛嬌・甘え上手", maxMsg: "もも、世界一幸せだもん！ずっと一緒だもん！", talks: [
            {q:"ももに 構ってよぉ〜！", a:[{t:"なでなで", l:15, r:"えへへ〜！幸せだもん！大好きだもん！"}]}
        ]},
        "kuma.PNG": { name: "くろいちじくま", key: "静か・ミステリアス", maxMsg: "…言葉はいらない。君の隣が、私の居場所だ。", talks: [
            {q:"…静かな時間は好きか？", a:[{t:"好き", l:10, r:"…そうか。心地いいな。君とは気が合う。"}]}
        ]},
        "chabo.PNG": { name: "かぼちゃぼ", key: "明るい・ポジティブ", maxMsg: "ハッピー爆発だよー！君といると最高だね！", talks: [
            {q:"ハッピーなことあった！？", a:[{t:"あったよ！", l:15, r:"最高！ハッピー連鎖だね！いいことあるよ！"}]}
        ]}
    };

    window.onload = () => {
        const saved = localStorage.getItem('myHagumo');
        if (!saved) {
            document.getElementById('has-data').style.display = 'none';
            document.getElementById('no-data').style.display = 'block';
            return;
        }
        const data = JSON.parse(saved);
        partnerImgName = data.img;
        currentPartner = charaData[partnerImgName] || charaData["risu.PNG"];
        love = data.love || 50;

        // --- 放置による減少処理 ---
        const now = Date.now();
        const lastTime = data.lastTime || now;
        const diffHours = Math.floor((now - lastTime) / (1000 * 60 * 60)); // 1時間単位
        if (diffHours > 0) {
            love = Math.max(0, love - diffHours); // 1時間につき1%ダウン
            document.getElementById('msg-text').innerText = "しばらく会えなくて寂しかったよぉ...";
        } else {
            document.getElementById('msg-text').innerText = "おかえりなさい！待ってたよ。";
        }
        
        document.getElementById('partner-img').src = `./images/${partnerImgName}`;
        document.getElementById('status-label').innerText = `${currentPartner.name} | ${currentPartner.key}`;
        updateGauge();
    };

    function updateGauge() {
        love = Math.max(0, Math.min(100, love));
        document.getElementById('love-bar').style.width = love + '%';
        document.getElementById('love-num').innerText = Math.floor(love);
        
        const img = document.getElementById('partner-img');
        if (love >= 100) {
            img.classList.add('max-aura');
            document.getElementById('msg-text').innerText = currentPartner.maxMsg;
        } else {
            img.classList.remove('max-aura');
        }
        
        // データの保存（現在時刻も保存）
        const saved = { img: partnerImgName, love: love, lastTime: Date.now() };
        localStorage.setItem('myHagumo', JSON.stringify(saved));
    }

    function playAction() {
        love = Math.min(100, love + 1);
        const msg = document.getElementById('msg-text');
        if (love < 100) {
            msg.innerText = "なでなで、うれしいな！";
        }
        updateGauge();
    }

    function startTalk() {
        const talk = currentPartner.talks[Math.floor(Math.random() * currentPartner.talks.length)];
        const msg = document.getElementById('msg-text');
        const choiceBox = document.getElementById('choices');
        
        msg.innerText = talk.q;
        choiceBox.innerHTML = '';
        choiceBox.style.display = 'flex';

        talk.a.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'kawaii-btn';
            btn.innerText = choice.t;
            btn.onclick = () => {
                love = Math.max(0, Math.min(100, love + choice.l));
                msg.innerText = choice.r;
                choiceBox.style.display = 'none';
                updateGauge();
            };
            choiceBox.appendChild(btn);
        });
    }
</script>
</body>
</html>
