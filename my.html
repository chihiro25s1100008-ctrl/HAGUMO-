<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-pink: #ff7eb9; --sub-pink: #ffdaeb; --bg: #fff9fb; }
        body { margin: 0; background: var(--bg); font-family: 'Zen Maru Gothic', sans-serif; color: #444; }
        .navbar { position: fixed; top: 0; width: 100%; background: white; padding: 10px 0; z-index: 1000; border-bottom: 1px solid #f0f0f0; text-align: center;}
        .nav-logo-img { height: 25px; }
        .container { margin-top: 70px; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* ステージ */
        .stage { position: relative; width: 100%; max-width: 450px; background: white; border-radius: 40px; padding: 30px 10px; box-shadow: 0 10px 30px rgba(255,126,185,0.1); display: flex; flex-direction: column; align-items: center; }
        .my-img { width: 220px; transition: 0.3s; }
        .bounce { animation: bounce 1.5s infinite alternate ease-in-out; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-15px); } }
        .max-aura { filter: drop-shadow(0 0 15px gold); animation: rainbow 3s infinite linear; }
        @keyframes rainbow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        /* メッセージ */
        .window { width: 85%; background: #fffaff; border: 3px solid var(--sub-pink); border-radius: 20px; padding: 15px; position: relative; margin: 20px 0; min-height: 60px; text-align: center; }
        .name-tag { position: absolute; top: -12px; left: 15px; background: var(--main-pink); color: white; padding: 2px 12px; border-radius: 8px; font-weight: bold; font-size: 12px; }
        .msg-text { font-size: 15px; font-weight: bold; line-height: 1.4; }

        /* ゲージ */
        .gauge-area { width: 80%; margin-bottom: 20px; text-align: center; }
        .gauge-bar { height: 10px; background: #eee; border-radius: 10px; overflow: hidden; }
        #love-fill { height: 100%; background: linear-gradient(90deg, #ffb6c1, var(--main-pink)); width: 50%; transition: 1s; }
        .love-num { color: var(--main-pink); font-weight: bold; font-size: 12px; margin-top: 5px; }

        /* ボタン */
        .choice-box { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .btn { background: white; border: 2px solid var(--sub-pink); padding: 10px; border-radius: 30px; cursor: pointer; font-weight: bold; color: #666; font-size: 14px; transition: 0.2s; }
        .btn:hover { background: var(--main-pink); color: white; }
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }

        /* フレンド診断 */
        .friend-box { margin-top: 30px; width: 100%; max-width: 450px; background: #fff; border-radius: 25px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; }
        .f-input { width: 80%; padding: 10px; border-radius: 15px; border: 1px solid #ddd; margin-bottom: 10px; font-family: inherit; }
    </style>
</head>
<body>

<nav class="navbar"><img src="./images/rogo.PNG" class="nav-logo-img"></nav>

<div class="container">
    <div class="stage">
        <div class="name-tag" id="char-name">HAGUMO</div>
        <img id="char-img" class="my-img bounce" src="">
        
        <div class="window">
            <div id="msg-text" class="msg-text">呼び出し中...</div>
            <div id="choices" class="choice-box"></div>
        </div>

        <div class="gauge-area">
            <div class="gauge-bar"><div id="love-fill"></div></div>
            <div class="love-num">なかよしレベル: <span id="love-val">50</span>%</div>
        </div>

        <div class="action-btns" id="main-actions">
            <button class="btn" onclick="pet()">💖 なでなで</button>
            <button class="btn" onclick="startTalk()">💬 おはなし</button>
        </div>
    </div>

    <div class="friend-box">

    </div>

let love = 50;
let currentImg = "buta.PNG";

function init() {
    const saved = JSON.parse(localStorage.getItem('myHagumo')) || { img: "buta.PNG", love: 50, time: Date.now() };
    currentImg = saved.img;
    love = saved.love;
    
    // 放置ペナルティ（1時間ごとに-2%）
    const hours = (Date.now() - saved.time) / 3600000;
    if (hours >= 1) love = Math.max(0, love - Math.floor(hours) * 2);

    document.getElementById('char-img').src = `./images/${currentImg}`;
    document.getElementById('char-name').innerText = charaData[currentImg].name;
    document.getElementById('msg-text').innerText = "おかえりなさい！待ってましたよぉ。";
    updateUI();
}

function updateUI() {
    document.getElementById('love-val').innerText = Math.floor(love);
    document.getElementById('love-fill').style.width = love + "%";
    if (love >= 100) document.getElementById('char-img').classList.add('max-aura');
    localStorage.setItem('myHagumo', JSON.stringify({ img: currentImg, love: love, time: Date.now() }));
}

function pet() {
    love = Math.min(100, love + 1);
    document.getElementById('msg-text').innerText = "なでなで、気持ちいいですぅ♪";
    updateUI();
}

function startTalk() {
    const talks = charaData[currentImg].talks;
    const talk = talks[Math.floor(Math.random() * talks.length)];
    const msg = document.getElementById('msg-text');
    const choiceBox = document.getElementById('choices');
    const actions = document.getElementById('main-actions');

    msg.innerText = talk.q;
    choiceBox.innerHTML = '';
    actions.style.display = 'none';

    talk.a.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'btn';
        btn.innerText = c.t;
        btn.onclick = () => {
            love = Math.max(0, Math.min(100, love + c.l));
            msg.innerText = c.r;
            choiceBox.innerHTML = '';
            actions.style.display = 'grid';
            updateUI();
        };
        choiceBox.appendChild(btn);
    });
}

function checkFriend() {
    const fName = document.getElementById('friend-name').value;
    const res = document.getElementById('friend-res');
    if(!fName) return;
    const score = Math.floor(Math.random() * 51) + 50; // 50-100%
    res.innerHTML = `💖 ${fName}との相性: ${score}%<br><span style="font-size:11px; color:#777;">二人はとっても気が合うみたい！<br>ハグモ同士も仲良くお喋りしてるよ♪</span>`;
}

window.onload = init;
