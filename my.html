<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MY HAGUMO | ハグモの部屋</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        /* --- HOMEと完全に共通のデザイン変数 --- */
        :root { 
            --main-pink: #ff7eb9; 
            --soft-pink: #fff5f7; 
            --pink1: #ffb3d9; 
            --pink2: #d1478e; 
            --white-glass: rgba(255, 255, 255, 0.85);
            --rainbow: linear-gradient(90deg, #ff2400, #e81d1d, #e8b71d, #1de840, #1ddde8, #2b1de8, #dd1de8, #ff2400); 
        }

        body { 
            font-family: 'Zen Maru Gothic', sans-serif; 
            background: var(--soft-pink); 
            margin: 0; 
            padding-top: 80px; 
            color: #555; 
            overflow-x: hidden;
            transition: background 0.5s;
        }

        /* --- ナビゲーション（HOME完全一致） --- */
        .nav { 
            position: fixed; top: 0; left: 0; width: 100%; 
            background: var(--white-glass);
            backdrop-filter: blur(10px); 
            z-index: 10000; 
            border-bottom: 2px solid rgba(255, 179, 217, 0.3); 
            padding: 12px 0;
        }
        .nav-content { 
            max-width: 1100px; margin: 0 auto; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .nav-logo-img { height: 35px; cursor: pointer; transition: 0.3s; }
        .nav-logo-img:hover { transform: scale(1.1) rotate(-3deg); }

        .nav-links { display: flex; gap: 12px; }
        .nav-link { 
            color: #888; text-decoration: none; font-size: 13px; font-weight: bold; 
            padding: 8px 16px; border-radius: 50px; transition: 0.3s;
            border: 1px solid transparent; font-family: 'Quicksand', sans-serif;
        }
        .nav-link:hover, .nav-link.active { 
            color: var(--pink2); background: white; border-color: var(--pink1);
            box-shadow: 0 4px 10px rgba(255, 126, 185, 0.2);
        }

        /* --- MY HAGUMO レイアウト --- */
        .main-wrapper { 
            display: flex; flex-direction: column; align-items: center; 
            max-width: 1000px; margin: 0 auto; padding: 20px; 
        }

        @media screen and (min-width: 769px) {
            .main-wrapper { 
                flex-direction: row; align-items: flex-start; 
                justify-content: center; gap: 50px; padding-top: 40px; 
            }
            .left-panel { width: 350px; position: sticky; top: 120px; }
            .right-panel { width: 450px; }
        }

        /* カード・吹き出しのデザイン */
        .status-container, .bubble {
            background: white;
            border: 2px solid var(--soft-pink);
            border-radius: 35px;
            box-shadow: 0 15px 35px rgba(255, 126, 185, 0.12);
            padding: 25px;
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 25px;
        }

        /* 絆ゲージ */
        .love-bar-bg { width: 100%; height: 20px; background: #f0f0f0; border-radius: 15px; margin: 15px 0; overflow: hidden; }
        .love-bar-fill { height: 100%; background: linear-gradient(90deg, var(--pink1), var(--main-pink)); width: 50%; transition: 0.5s; }
        .love-bar-fill.max { background: var(--rainbow); background-size: 200% 100%; animation: moveBg 2s linear infinite; }
        @keyframes moveBg { 0% { background-position: 0% 0%; } 100% { background-position: 200% 0%; } }

        /* キャラクター画像 */
        .hagumo-img { 
            width: 280px; height: 280px; object-fit: contain; cursor: pointer; transition: 0.3s; 
            filter: drop-shadow(0 15px 25px rgba(255,126,185,0.3)); 
        }
        .bounce { animation: bounce 4s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* ボタンデザイン（HOMEの丸みと合わせる） */
        .action-btn { 
            background: white; border: 2px solid var(--soft-pink); padding: 15px 25px; border-radius: 50px; 
            font-weight: bold; cursor: pointer; color: #666; transition: 0.3s; flex: 1;
            font-family: 'Zen Maru Gothic', sans-serif;
        }
        .action-btn:hover { border-color: var(--pink1); color: var(--pink2); transform: translateY(-2px); }
        .main-actions { display: flex; gap: 15px; width: 100%; }

        /* おしゃべり選択肢 */
        #choices { display: none; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 15px; }
        .choice-btn {
            background: var(--soft-pink); border: none; padding: 10px 20px; border-radius: 20px;
            cursor: pointer; font-size: 13px; color: var(--pink2); transition: 0.3s;
        }
        .choice-btn:hover { background: var(--pink1); color: white; }

        /* ハート演出 */
        .heart { position: fixed; color: #ff4d94; pointer-events: none; animation: heartUp 1.5s forwards; font-size: 24px; z-index: 9999; }
        @keyframes heartUp { 0% { transform: scale(0.5) translateY(0); opacity: 1; } 100% { transform: scale(1.5) translateY(-100px); opacity: 0; } }

        /* 特殊状態の背景（絆MAXなど） */
        body.bg-level-1 { background: #fff5f7; }
        body.bg-level-2 { background: #ffe0f0; }
        body.bg-level-3 { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); }

        .reset-btn { background: none; border: none; color: #ccc; font-size: 11px; cursor: pointer; margin-top: 20px; }

        /* --- フッター（HOME完全一致） --- */
        footer { background: white; padding: 60px 20px; text-align: center; border-top: 2px solid var(--soft-pink); margin-top: 100px; }

        /* スマホ調整 */
        @media screen and (max-width: 768px) {
            .nav-links { gap: 5px; overflow-x: auto; white-space: nowrap; padding-bottom: 3px; }
            .nav-link { padding: 6px 12px; font-size: 11px; }
            body { padding-top: 110px; }
            .hagumo-img { width: 220px; height: 220px; }
        }
    </style>
</head>

                ansRes: { high: "ウキキーッ！主、最高！ビタミンMAXだよぉ！", mid: "ウキッ！今の言葉、レモンみたいに効いたよ！", low: "…酸っぱすぎるよぉ。そんなの、ウキィ…。" },
                questions: [{ q: "レモンが酸っぱすぎて、みんな逃げていっちゃうウキ…。", a: ["ボクは逃げないよ", "刺激的でいいよ", "確かに酸っぱい！"], scores: [10, 5, -5] }, { q: "ウキッ！ボク、お調子に乗りすぎちゃうウキ？", a: ["明るくて元気が出るよ", "そのままでいいよ", "少し静かにして"], scores: [10, 5, -5] }],
                timeQuests: { morning: { q: "おはようウキ！朝イチのレモン絞りたてだウキ！", a: ["目が覚めたよ！", "酸っぱそうだね", "今は甘いのがいい"], scores: [10, 5, -5] }, lunch: { q: "お昼だウキ！木の上で一緒にランチするウキ？", a: ["登るよ！", "危なくない？", "地面がいい"], scores: [10, 5, -5] }, night: { q: "夜だウキ！レモンの皮でお風呂にするウキ！", a: ["お肌ツルツルだね", "贅沢だね", "染みそう…"], scores: [10, 5, -5] }, midnight: { q: "ウキキー！夜更かしウッキー！踊るウキ！", a: ["一緒に踊ろう！", "静かにね", "うるさいウキ！"], scores: [10, 5, -5] } },
                maxStrokes: ["ウキキッ！気持ちいい〜！主、最高だよぉ！", "レモンより甘い気分になっちゃうウキーッ！"],
                farewell: "…なんだか酸っぱい気持ちだよ。ウキィ…バイバイ。"
            },
            kame: {
                welcome: "おかえりなさい……。のんびり、いきましょうね。",
                maxWelcome: "おかえりなさい……主様。あなたと過ごす、この一秒一秒が、私の永遠です……。",
                strokeRes: "あぁ……甲羅まで、主様のぬくもりが届きます……。",
                ansRes: { high: "あぁ…深い海の底にいるような, 安らかな気持ちです…。", mid: "ありがとうございます…。ゆっくり、大切にしますね。", low: "……少し、甲羅の中に隠れますね……。悲しいです。" },
                questions: [{ q: "ブルーベリーの果汁が甲羅に染みちゃって…汚いですか？", a: ["綺麗なグラデーションだよ", "一生懸命な証拠だね", "洗ったほうがいいかも"], scores: [10, 5, -5] }, { q: "私……歩くの、遅すぎますか……？", a: ["一緒に歩けるから好き", "マイペースでいいよ", "もう少し急いで"], scores: [10, 5, -5] }],
                timeQuests: { morning: { q: "おはようございます……。朝露が慶事ですね……。", a: ["本当に綺麗だね", "ゆっくり見おう", "早く行かなきゃ"], scores: [10, 5, -5] }, lunch: { q: "お昼寝の時間でしょうか……。一緒にどうですか……？", a: ["おやすみなさい", "のんびりしよう", "忙しいんだ"], scores: [10, 5, -5] }, night: { q: "星が出てきました……。ブルーベリーみたいですね……。", a: ["ロマンチックだね", "美味しそうだね", "ただの点だよ"], scores: [10, 5, -5] }, midnight: { q: "こんな時間……。静かで、心が落ち着きます……。", a: ["ずっとこうしていたい", "怖くない？", "もう寝る時間だよ"], scores: [10, 5, -5] } },
                maxStrokes: ["あぁ…時が止まればいいのに……幸せです……", "主様のなでなで、とっても優しい魔法ですね…"],
                farewell: "……さようなら。ゆっくり、思い出に変わりますね……。"
            },
            nga: {
                welcome: "ピピィーッ！主様ぁ！会いたかったよぉ！",
                maxWelcome: "ピピィーッ！大好きな主様ぁ！もうどこへも行かないでぁ！ギュッとしてぇ！",
                strokeRes: "ピピィッ！もっとぉ！主様のなでなで大好きぃー！",
                ansRes: { high: "ピピィッ！主様ぁ、だーいすき！空まで飛べそうだよぉ！", mid: "ピピッ、ありがとうぅ！主様は優しいねぇ！", low: "…ピーッ！嫌いになっちゃったのぉ？悲しいよぉ…。" },
                questions: [{ q: "ボク、飛ぶときにいつもフラフラしちゃうのぉ…。", a: ["危なっかしくて可愛いね", "着地はボクの腕に！", "もっと特訓だね"], scores: [10, 5, -5] }, { q: "甘えん坊すぎて、迷惑かなぁ…？ピピッ。", a: ["もっと甘えていいよ", "頼われて嬉しいよ", "時々ね"], scores: [10, 5, -5] }],
                timeQuests: { morning: { q: "ピピィッ！朝だよぉ！空散歩いくぅ！？", a: ["連れてって！", "高いの怖いよ", "まだ寝るぅ"], scores: [10, 5, -5] }, lunch: { q: "ランチピピッ！美味しい実を見つけたよぉ！", a: ["食べたい！", "どこにあったの？", "お腹いっぱい"], scores: [10, 5, -5] }, night: { q: "暗くなっちゃったぁ…寂しいよぉ、ピピッ。", a: ["ギュッとしてあげる", "隣にいるよ", "もう寝なさい"], scores: [10, 5, -5] }, midnight: { q: "夜中の大冒険だピピィッ！主様も飛べるかなぁ！？", a: ["飛べる気がする！", "危ないよぉ", "無理だよぉ"], scores: [10, 5, -5] } },
                maxStrokes: ["もっとぉ！もっとぉ！主様ぁ、だぁいすきだよぉ！", "ピピィ！これ、ボクへのプロポーズかなぁ！？"],
                farewell: "…ピーッ！嫌われちゃったのぉ…？悲しいよぉ。バイバイ。"
            },
            kuma: {
                welcome: "……お帰り。君の足音が聞こえたよ。",
                maxWelcome: "……お帰り。君がいない間、世界がモノクロだった。戻ってきてくれて、ありがとう。",
                strokeRes: "……君の手、とても温かい。心が解けていくようだね。",
                ansRes: { high: "……君という光に、救われた気がするよ。ありがとう。", mid: "……温かい言葉だね。冷えた体が少し、溶けたよ。", low: "……暗闇が、もっと深くなったみたいだ。寂しいね。" },
                questions: [{ q: "私の体、真っ暗で何も見えないね。……寂しい姿だろう？", a: ["深い優しさを感じるよ", "影みたいで落ち着くよ", "確かに暗いね"], scores: [10, 5, -5] }, { q: "……イチジクの蜜で手がベタベタだ。触らないほうがいい。", a: ["気にせずなでさせて", "甘い香りがして好きだよ", "汚れるのは嫌だな"], scores: [10, 5, -5] }],
                timeQuests: { morning: { q: "……朝の光は、少し眩しすぎるね。君は平気かい？", a: ["一緒に浴びよう", "影を作ってあげる", "太陽は最高だよ"], scores: [10, 5, -5] }, lunch: { q: "……お昼だね。イチジクの木の下で休もうか。", a: ["隣に座るよ", "涼しそうだね", "別の場所がいい"], scores: [10, 5, -5] }, night: { q: "……夜だ。やっと私の時間だね。少し落ち着くよ。", a: ["静かな君も好き", "落ち着くね", "暗くて不安だよ"], scores: [10, 5, -5] }, midnight: { q: "……まだ起きていたのか。深夜の蜜は、とても甘いんだよ。", a: ["舐めてもいい？", "不思議だね", "歯に悪そう"], scores: [10, 5, -5] } },
                maxStrokes: ["君のぬくもり……これが「愛」なんだね。", "もっと触れていて……君がいれば、冬も怖くないよ。"],
                farewell: "……君という光がいなくなった。闇に帰るよ。さようなら。"
            }
        };

        let currentChar = localStorage.getItem('hagu_current_char') || "buta";
        let love = 50;
        let lastUpdate = Date.now();
        let lastMaxTime = 0;
        let userName = localStorage.getItem('hagu_user') || "主様";
        let welcomeTimer = null; 
        let strokeReturnTimer = null; 
        let strokeHistory = []; 

        function getName(text) {
            if (!text) return "";
            return text.replace(/主様/g, userName).replace(/主(?![ぁ-ん])/g, userName);
        }

        function getTimeLabel() {
            const hour = new Date().getHours();
            if (hour >= 5 && hour < 10) return "morning";
            if (hour >= 10 && hour < 17) return "lunch";
            if (hour >= 17 && hour < 23) return "night";
            return "midnight";
        }

        function checkTimeAndEffect() {
            const container = document.body;
            container.classList.remove('bg-level-1', 'bg-level-2', 'bg-level-3');
            if (love >= 100) container.classList.add('bg-level-3');
            else if (love > 50) container.classList.add('bg-level-2');
            else container.classList.add('bg-level-1');
        }

        function updateStatus() {
            const now = Date.now();
            let diff = now - lastUpdate;
            let isImmune = (love >= 100 && (now - lastMaxTime < 60 * 60 * 1000));

            if (!isImmune && diff > 0) {
                let loss = 0;
                if (love > 51) {
                    loss = Math.floor(diff / (60 * 1000));
                    if (loss > 0) {
                        love = Math.max(51, love - loss);
                        lastUpdate += loss * (60 * 1000);
                    }
                } else if (love > 1) {
                    loss = Math.floor(diff / (3600 * 1000));
                    if (loss > 0) {
                        love = Math.max(1, love - loss);
                        lastUpdate += loss * (3600 * 1000);
                    }
                }
                save();
            }

            document.getElementById('love-val').innerText = love;
            document.getElementById('user-display').innerText = userName + "の絆ルーム";
            
            const fill = document.getElementById('love-fill');
            fill.style.width = love + "%";

            if (love >= 100) {
                fill.classList.add('max'); 
                document.getElementById('talk-btn').disabled = true;
                document.getElementById('talk-btn').innerText = "❤️ 永遠の絆";
            } else {
                fill.classList.remove('max');
                document.getElementById('talk-btn').disabled = false;
                document.getElementById('talk-btn').innerText = "💬 おしゃべり";
            }

            if (love <= 0) {
                alert(getName(charData[currentChar].farewell));
                manualReset();
            }
            checkTimeAndEffect();
        }

        function strokeHagumo(e) {
            const now = Date.now();
            if (love < 100) {
                strokeHistory = strokeHistory.filter(time => now - time < 60000);
                if (strokeHistory.length >= 15) return; // 制限
                strokeHistory.push(now);
            }

            if (welcomeTimer) clearTimeout(welcomeTimer);
            if (strokeReturnTimer) clearTimeout(strokeReturnTimer); 
            
            const oldLove = love;
            love = Math.min(100, love + 1);
            if (love >= 100 && oldLove < 100) lastMaxTime = Date.now();

            const x = e.clientX || (e.touches && e.touches[0].clientX) || window.innerWidth / 2;
            const y = e.clientY || (e.touches && e.touches[0].clientY) || window.innerHeight / 2;
            createHeart(x, y);

            const bubble = document.getElementById('chat-bubble');
            if (love >= 100) {
                const maxStrokes = charData[currentChar].maxStrokes;
                bubble.innerText = getName(maxStrokes[Math.floor(Math.random() * maxStrokes.length)]);
            } else {
                bubble.innerText = getName(charData[currentChar].strokeRes);
            }

            strokeReturnTimer = setTimeout(() => {
                loadCharStatus(currentChar, true); 
            }, 3000);

            updateStatus();
            save();
        }

        function startTalk() {
            if (love >= 100) return;
            const data = charData[currentChar];
            let quest;
            const timeLabel = getTimeLabel();
            if (Math.random() < 0.4) quest = data.timeQuests[timeLabel];
            else quest = data.questions[Math.floor(Math.random() * data.questions.length)];

            document.getElementById('chat-bubble').innerText = getName(quest.q);
            const container = document.getElementById('choices');
            container.innerHTML = "";
            container.style.display = "flex";

            quest.a.forEach((text, i) => {
                const btn = document.createElement('button');
                btn.className = "choice-btn";
                btn.innerText = text;
                btn.onclick = () => {
                    const score = quest.scores[i];
                    love = Math.min(100, Math.max(0, love + score));
                    container.style.display = "none";
                    document.getElementById('chat-bubble').innerText = getName(data.ansRes[score >= 10 ? "high" : (score < 0 ? "low" : "mid")]);
                    setTimeout(() => loadCharStatus(currentChar, true), 3000);
                    updateStatus();
                    save();
                };
                container.appendChild(btn);
            });
        }

        function createHeart(x, y) {
            const h = document.createElement('div');
            h.className = 'heart'; h.innerHTML = '❤';
            h.style.left = (x - 12) + 'px'; h.style.top = (y - 12) + 'px';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 1500);
        }

        function renameUser() {
            const newName = prompt("新しいおなまえを教えてね", userName);
            if (newName && newName.trim()) {
                userName = newName.trim();
                save();
                updateStatus();
            }
        }

        function changeChar() {
            currentChar = document.getElementById('char-selector').value;
            document.getElementById('hagumo-sprite').src = `./images/${currentChar}.PNG`;
            loadCharStatus(currentChar);
        }

        function loadCharStatus(charKey, skipWelcome = false) {
            love = parseInt(localStorage.getItem(`hagu_love_${charKey}`)) || 50;
            lastUpdate = parseInt(localStorage.getItem(`hagu_time_${charKey}`)) || Date.now();
            
            updateStatus();
            const bubble = document.getElementById('chat-bubble');
            if (love >= 100) {
                bubble.innerText = getName(charData[charKey].maxWelcome);
            } else if (!skipWelcome) {
                bubble.innerText = getName(charData[charKey].welcome);
            }
        }

        function save() {
            localStorage.setItem(`hagu_love_${currentChar}`, love);
            localStorage.setItem(`hagu_time_${currentChar}`, lastUpdate);
            localStorage.setItem('hagu_user', userName);
            localStorage.setItem('hagu_current_char', currentChar);
        }

        function manualReset() {
            if (confirm("絆をリセットして最初からやり直しますか？")) {
                localStorage.removeItem(`hagu_love_${currentChar}`);
                location.reload();
            }
        }

        window.onload = () => {
            const savedChar = localStorage.getItem('hagu_current_char');
            if (savedChar) {
                currentChar = savedChar;
                document.getElementById('char-selector').value = savedChar;
            }
            changeChar();
        };
    </script>
