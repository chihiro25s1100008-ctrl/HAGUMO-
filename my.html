<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY HAGUMO | Sweet Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-pink: #ff7eb9; --sub-pink: #ffdaeb; --bg: #fff9fb; }
        body { margin: 0; padding: 0; background-color: var(--bg); font-family: 'Zen Maru Gothic', sans-serif; overflow-x: hidden; }
        
        /* ナビゲーション */
        .navbar { position: fixed; top: 0; width: 100%; height: 60px; background: white; z-index: 1000; border-bottom: 2px solid var(--sub-pink); display: flex; align-items: center; justify-content: center; }
        .nav-logo-img { height: 30px; }

        .container { margin-top: 80px; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* ゲーム画面 */
        .stage { background: white; border-radius: 40px; padding: 40px 20px; box-shadow: 0 15px 40px rgba(255, 126, 185, 0.15); width: 100%; max-width: 450px; position: relative; border: 2px solid var(--sub-pink); text-align: center; }
        
        .char-label { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); background: var(--main-pink); color: white; padding: 5px 25px; border-radius: 20px; font-weight: bold; font-size: 14px; box-shadow: 0 4px 10px rgba(255,126,185,0.3); }
        
        .my-img { width: 220px; transition: 0.3s; filter: drop-shadow(0 8px 15px rgba(0,0,0,0.1)); cursor: pointer; }
        .bounce { animation: bounce 1.2s infinite alternate ease-in-out; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-15px); } }
        .max-aura { filter: drop-shadow(0 0 15px var(--main-pink)) !important; }

        /* メッセージウィンドウ */
        .speech-bubble { background: #fff4f9; border: 3px solid var(--sub-pink); border-radius: 25px; padding: 20px; margin: 25px 0; min-height: 80px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #555; position: relative; font-size: 15px; line-height: 1.5; }

        /* ゲージ */
        .gauge-wrap { width: 80%; height: 16px; background: #ffeef2; border-radius: 10px; margin: 10px auto; overflow: hidden; border: 2px solid var(--sub-pink); }
        #love-bar { height: 100%; background: linear-gradient(to right, #ffb6c1, var(--main-pink)); transition: 0.8s; width: 50%; }
        
        /* ボタン */
        .action-area { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 450px; margin-top: 20px; }
        .kawaii-btn { background: white; border: 3px solid var(--sub-pink); color: var(--main-pink); padding: 12px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; outline: none; }
        .kawaii-btn:hover { background: #fff0f5; transform: scale(1.03); }
        
        .choice-container { display: none; flex-direction: column; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body>

    <nav class="navbar"><img src="./images/rogo.PNG" class="nav-logo-img"></nav>

    <div class="container">
        <div class="stage">
            <div class="char-label" id="status-label">LOADING...</div>
            <div class="speech-bubble" id="msg-text">Chihiroさん、待ってたよ！</div>
            <img id="partner-img" class="my-img bounce" src="">
            <div class="gauge-wrap"><div id="love-bar"></div></div>
            <div style="font-size: 13px; color: var(--main-pink); font-weight: bold; margin-bottom: 10px;">なかよしレベル: <span id="love-num">50</span>%</div>
            
            <div id="choices" class="choice-container"></div>
            
            <div id="main-actions" class="action-area">
                <button class="kawaii-btn" onclick="petAction()">👋 なでなで</button>
                <button class="kawaii-btn" onclick="startTalk()">💬 おはなし</button>
            </div>
        </div>
    </div>

    <script>
        let love = 50;
        let currentChara = null;

        const charaDatabase = {
            "buta.PNG": { name: "かぶた", suffix: "ですよぉ", talks: [
                {q:"ぎゅーってしてもいいですかぁ？", a:[{t:"いいよ！", l:10, r:"えへへ、あったかいですねぇ♪"}, {t:"また今度ね", l:5, r:"いつでも待ってますよぉ。"}]},
                {q:"Chihiroさん、お疲れじゃないですかぁ？", a:[{t:"ちょっと疲れた", l:15, r:"よしよしですよぉ。癒してあげますぅ。"}, {t:"元気だよ！", l:10, r:"それは良かったですぅ！"}]}
            ]},
            "tora.PNG": { name: "とまとら", suffix: "ぜ！", talks: [
                {q:"おい！今日の気合はどうだ！？", a:[{t:"最高だぜ！", l:15, r:"いい返事だ！燃えてきたぜ！"}, {t:"そこそこかな", l:5, r:"もっと情熱燃やしていこうぜ！"}]},
                {q:"俺の背中についてくる勇気はあるか！", a:[{t:"もちろん！", l:15, r:"ハハッ！最高の相棒だな！"}, {t:"怖いよー", l:5, r:"心配すんな、俺が守ってやる！"}]}
            ]},
            "risu.PNG": { name: "きゅうりす", suffix: "だね", talks: [
                {q:"心のバランス、整ってるかな？", a:[{t:"バッチリ！", l:10, r:"素晴らしい調和だね。"}, {t:"乱れてるかも", l:5, r:"深呼吸して、僕と合わせよう。"}]},
                {q:"このハーブティー、一緒に飲む？", a:[{t:"飲む！", l:10, r:"心が落ち着く香りがするね。"}, {t:"今はいいや", l:5, r:"気が向いたらいつでも言って。"}]}
            ]},
            "saru.PNG": { name: "れもんきー", suffix: "だよ！", talks: [
                {q:"ねえねえ、イタズラしちゃおうよ！", a:[{t:"しちゃおう！", l:15, r:"ウキー！ワクワクが止まらないね！"}, {t:"ダメだよー", l:-5, r:"ちぇー、自由じゃないなぁ！"}]},
                {q:"新しい遊び、ひらめいちゃった！", a:[{t:"教えて！", l:10, r:"空飛ぶレモンごっこだよ！"}, {t:"また今度", l:5, r:"えー！損してるよー！"}]}
            ]},
            "kame.PNG": { name: "ぶるーべりくがめ", suffix: "です", talks: [
                {q:"今日の活動効率を分析しましょう。", a:[{t:"お願い！", l:10, r:"無駄のない、完璧な一日ですね。"}, {t:"適当がいいな", l:-10, r:"…理解に苦しみますが、休息も必要です。"}]},
                {q:"私の甲羅、硬度を測ってみますか？", a:[{t:"触っていい？", l:10, r:"どうぞ。知性が詰まった硬さです。"}, {t:"重そう…", l:5, r:"合理的な重心設計ですよ。"}]}
            ]},
            "imo.PNG": { name: "さつまいもぐら", suffix: "だな", talks: [
                {q:"今日の一歩、ちゃんと踏み出せたか？", a:[{t:"頑張った！", l:15, r:"偉いぞ。その継続が力になる。"}, {t:"休んじゃった", l:5, r:"休むのも計画のうちだ。明日からまたな。"}]},
                {q:"地道な努力が一番強いんだぞ。", a:[{t:"そうだね！", l:10, r:"お前なら分かってくれると思ってた。"}, {t:"近道したい", l:-5, r:"焦るな。土台が大事だ。"}]}
            ]},
            "nga.PNG": { name: "もももんが", suffix: "もん！", talks: [
                {q:"ももに構ってくれないと、泣いちゃうもん！", a:[{t:"なでなで", l:15, r:"えへへー！大好きだもん！"}, {t:"後でね", l:-10, r:"ぷんぷんだもん！もう知らないもん！"}]},
                {q:"もも、世界一可愛いでしょぉ？", a:[{t:"可愛い！", l:15, r:"もっと言って！もも、幸せだもん！"}, {t:"普通かな", l:-5, r:"ひどいもん！ちゃんと見てほしいもん！"}]}
            ]},
            "kuma.PNG": { name: "くろいちじくま", suffix: "…", talks: [
                {q:"…静かな時間は、嫌いか？", a:[{t:"好きだよ", l:10, r:"…そうか。君とは気が合いそうだ。"}, {t:"寂しいな", l:5, r:"…私が隣にいる。それで十分だ。"}]},
                {q:"…影に隠れて、君を見ていてもいいか？", a:[{t:"いいよ", l:15, r:"…ミステリアスな君を、もっと知りたい。"}, {t:"恥ずかしい", l:5, r:"…では、そっと見守ろう。"}]}
            ]},
            "chabo.PNG": { name: "かぼちゃぼ", suffix: "だよ！", talks: [
                {q:"ハッピーなこと、探しに行こうよ！", a:[{t:"いくいく！", l:15, r:"最高！君がいると太陽みたいだ！"}, {t:"疲れたなぁ", l:5, r:"僕がハッピーを運んであげる！"}]},
                {q:"笑顔を見せて！ハッピー連鎖だよ！", a:[{t:"ニコッ！", l:15, r:"うわぁ！世界が輝きだしたよ！"}, {t:"ムリ…", l:5, r:"僕が笑わせちゃうもんね！アハハ！"}]}
            ]},
            "jaku.PNG": { name: "ばたふらいぴーこっく", suffix: "わね", talks: [
                {q:"あら、私を使いこなせるかしら？", a:[{t:"任せて！", l:15, r:"ふふ、その自信。嫌いじゃないわ。"}, {t:"自信ないな", l:5, r:"私が機転を利かせてあげるわ。"}]},
                {q:"美しいものには、棘があるのよ。", a:[{t:"カッコいい！", l:10, r:"淑女のたしなみ、教えてあげるわ。"}, {t:"怖いなぁ", l:5, r:"ふふ、冗談よ。安心なさい。"}]}
            ]}
        };

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('myHagumo'));
            if (!saved) {
                document.getElementById('msg-text').innerText = "診断を先にしてね！";
                return;
            }
            currentChara = charaDatabase[saved.img] || charaDatabase["buta.PNG"];
            love = saved.love || 50;
            
            document.getElementById('partner-img').src = `./images/${saved.img}`;
            document.getElementById('status-label').innerText = `${currentChara.name}`;
            updateUI();
        };

        function updateUI() {
            document.getElementById('love-bar').style.width = love + '%';
            document.getElementById('love-num').innerText = Math.floor(love);
            if (love >= 90) document.getElementById('partner-img').classList.add('max-aura');
            
            const saved = JSON.parse(localStorage.getItem('myHagumo'));
            saved.love = love;
            localStorage.setItem('myHagumo', JSON.stringify(saved));
        }

        function petAction() {
            love = Math.min(100, love + 2);
            document.getElementById('msg-text').innerText = "なでなで、心地いい" + currentChara.suffix + "…♪";
            updateUI();
        }

        function startTalk() {
            const talk = currentChara.talks[Math.floor(Math.random() * currentChara.talks.length)];
            const msg = document.getElementById('msg-text');
            const choiceBox = document.getElementById('choices');
            const actionBox = document.getElementById('main-actions');

            msg.innerText = talk.q;
            choiceBox.innerHTML = '';
            choiceBox.style.display = 'flex';
            actionBox.style.display = 'none';

            talk.a.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'kawaii-btn';
                btn.innerText = choice.t;
                btn.onclick = () => {
                    love = Math.max(0, Math.min(100, love + choice.l));
                    msg.innerText = choice.r;
                    choiceBox.style.display = 'none';
                    actionBox.style.display = 'grid';
                    updateUI();
                };
                choiceBox.appendChild(btn);
            });
        }
    </script>
</body>
</html>
