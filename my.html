<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MY HAGUMO | ハグモの部屋</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --main-pink: #ff7eb9; 
            --soft-pink: #fff5f7; 
            --pink1: #ffb3d9; 
            --pink2: #d1478e; 
            --white-glass: rgba(255, 255, 255, 0.85);
            --rainbow: linear-gradient(90deg, #ff2400, #e81d1d, #e8b71d, #1de840, #1ddde8, #2b1de8, #dd1de8, #ff2400); 
        }

        body { 
            font-family: 'Zen Maru Gothic', sans-serif; 
            background: var(--soft-pink); 
            margin: 0; padding-top: 80px; color: #555; 
            overflow-x: hidden; transition: background 0.5s;
        }

        /* --- ナビゲーション --- */
        .nav { 
            position: fixed; top: 0; left: 0; width: 100%; 
            background: var(--white-glass); backdrop-filter: blur(10px); 
            z-index: 10000; border-bottom: 2px solid rgba(255, 179, 217, 0.3); padding: 12px 0;
        }
        .nav-content { max-width: 1100px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo-img { height: 35px; cursor: pointer; transition: 0.3s; }
        .nav-links { display: flex; gap: 12px; }
        .nav-link { 
            color: #888; text-decoration: none; font-size: 13px; font-weight: bold; 
            padding: 8px 16px; border-radius: 50px; font-family: 'Quicksand', sans-serif;
        }
        .nav-link.active { color: var(--pink2); background: white; border: 1px solid var(--pink1); }

        /* --- レイアウト --- */
        .main-wrapper { display: flex; flex-direction: column; align-items: center; max-width: 1000px; margin: 0 auto; padding: 20px; }
        @media screen and (min-width: 769px) {
            .main-wrapper { flex-direction: row; align-items: flex-start; justify-content: center; gap: 50px; padding-top: 40px; }
            .left-panel { width: 350px; position: sticky; top: 120px; }
            .right-panel { width: 450px; }
        }

        .status-container, .bubble {
            background: white; border: 2px solid var(--soft-pink); border-radius: 35px;
            box-shadow: 0 15px 35px rgba(255, 126, 185, 0.12); padding: 25px; text-align: center; margin-bottom: 25px;
        }

        /* 名前表示エリア */
        .user-name-area { 
            display: inline-block; background: var(--soft-pink); padding: 5px 15px; 
            border-radius: 20px; cursor: pointer; margin-bottom: 10px; transition: 0.2s;
            border: 1px solid transparent;
        }
        .user-name-area:hover { border-color: var(--pink1); background: white; }

        .love-bar-bg { width: 100%; height: 20px; background: #f0f0f0; border-radius: 15px; margin: 15px 0; overflow: hidden; }
        .love-bar-fill { height: 100%; background: linear-gradient(90deg, var(--pink1), var(--main-pink)); width: 50%; transition: 0.5s; }
        .love-bar-fill.max { background: var(--rainbow); background-size: 200% 100%; animation: moveBg 2s linear infinite; }
        @keyframes moveBg { 0% { background-position: 0% 0%; } 100% { background-position: 200% 0%; } }

        .hagumo-img { width: 280px; height: 280px; object-fit: contain; cursor: pointer; transition: 0.3s; filter: drop-shadow(0 15px 25px rgba(255,126,185,0.3)); }
        .max-chaos { animation: abare-move 0.2s infinite, rainbow-flash 0.5s infinite !important; }
        @keyframes abare-move { 0% { transform: translate(0,0) rotate(0); } 25% { transform: translate(-5px,5px) rotate(-5deg); } 75% { transform: translate(5px,-5px) rotate(5deg); } }
        @keyframes rainbow-flash { 0% { filter: hue-rotate(0deg) drop-shadow(0 0 10px red); } 100% { filter: hue-rotate(360deg) drop-shadow(0 0 10px red); } }

        .action-btn { 
            background: white; border: 2px solid var(--soft-pink); padding: 15px; border-radius: 50px; 
            font-weight: bold; cursor: pointer; color: #666; transition: 0.3s; flex: 1; font-family: inherit;
        }
        .action-btn:hover:not(:disabled) { border-color: var(--pink1); color: var(--pink2); transform: translateY(-2px); }
        .main-actions { display: flex; gap: 15px; width: 100%; }

        #choices { display: none; flex-direction: column; gap: 12px; width: 100%; margin-top: 20px; }
        .choice-btn {
            background: white; border: 2px solid var(--pink1); padding: 15px; border-radius: 30px;
            cursor: pointer; font-size: 15px; color: var(--pink2); font-weight: bold; transition: 0.2s; text-align: center;
        }
        .heart { position: fixed; color: #ff4d94; pointer-events: none; animation: heartUp 1.5s forwards; font-size: 24px; z-index: 9999; }
        @keyframes heartUp { 0% { transform: scale(0.5) translateY(0); opacity: 1; } 100% { transform: scale(1.5) translateY(-100px); opacity: 0; } }

        select { width: 100%; padding: 12px; border-radius: 15px; border: 2px solid var(--pink1); margin-bottom: 15px; font-family: inherit; color: var(--pink2); font-weight: bold; }
    </style>
</head>

            <center><button onclick="manualReset()" style="margin-top:20px; background:none; border:none; color:#ccc; cursor:pointer; font-size:10px;">絆をリセット</button></center>

            },
            kuma: {
                welcome: "……お帰り、{name}。足音が聞こえたよ。",
                maxWelcome: "……お帰り。君がいない間、世界がモノクロだった。戻ってきてくれて、ありがとう。",
                strokeRes: "……君の手、とても温かい。心が解けていくようだね。",
                ansRes: { high: "……君という光に、救われた気がするよ。", mid: "……温かい言葉だね。少し、溶けたよ。", low: "……暗闇が、もっと深くなったみたいだ。" },
                questions: [{ q: "{name}、イチジクの蜜で手がベタベタだ。触らないほうがいい。", a: ["気にせずなでさせて", "甘い香りがして好きだよ", "汚れるのは嫌だな"], scores: [10, 5, -5] }],
                timeQuests: { morning: { q: "……{name}、朝の光は少し眩しすぎるね。", a: ["一緒に浴びよう", "影を作ってあげる", "太陽は最高だよ"], scores: [10, 5, -5] }, lunch: { q: "……イチジクの木の下で休もうか。", a: ["隣に座るよ", "涼しそうだね", "別の場所がいい"], scores: [10, 5, -5] }, night: { q: "……夜だ。やっと私の時間だね。", a: ["静かな君も好き", "落ち着くね", "暗くて不安だよ"], scores: [10, 5, -5] }, midnight: { q: "{name}、まだ起きていたのか。", a: ["舐めてもいい？", "不思議だね", "歯に悪そう"], scores: [10, 5, -5] } },
                maxStrokes: ["君のぬくもり……これが「愛」なんだね。", "主様がいれば、冬も怖くないよ。"]
            }
        };

        let currentChar = "buta";

        // 名前変更機能
        function renameUser() {
            const newName = prompt("新しい名前を入れてね", userName);
            if (newName && newName.trim() !== "") {
                userName = newName;
                localStorage.setItem('hagu_user_name', userName);
                updateStatus();
                // 変更した瞬間にウェルカムメッセージを更新
                const love = getLove();
                const msg = (love >= 100) ? charData[currentChar].maxWelcome : charData[currentChar].welcome;
                document.getElementById('chat-bubble').innerText = replaceName(msg);
            }
        }

        // 名前の置換
        function replaceName(text) {
            return text.replace(/{name}/g, userName);
        }

        function getLove() { 
            return parseInt(localStorage.getItem(`hagu_love_${currentChar}`)) || 50; 
        }
        function setLove(val) { 
            localStorage.setItem(`hagu_love_${currentChar}`, val); 
        }

        function getTimeLabel() {
            const h = new Date().getHours();
            if (h >= 5 && h < 11) return "morning";
            if (h >= 11 && h < 17) return "lunch";
            if (h >= 17 && h < 22) return "night";
            return "midnight";
        }

        function updateStatus() {
            const love = getLove();
            const fill = document.getElementById('love-fill');
            const sprite = document.getElementById('hagumo-sprite');
            const valLabel = document.getElementById('love-val');
            const talkBtn = document.getElementById('talk-btn');

            valLabel.innerText = love;
            fill.style.width = love + "%";
            document.getElementById('display-user-name').innerText = userName;

            if (love >= 100) {
                fill.classList.add('max');
                sprite.classList.add('max-chaos');
                talkBtn.disabled = true;
                talkBtn.innerText = "❤️ 永遠の絆";
            } else {
                fill.classList.remove('max');
                sprite.classList.remove('max-chaos');
                talkBtn.disabled = false;
                talkBtn.innerText = "💬 おしゃべり";
            }
        }

        function strokeHagumo(e) {
            let currentLove = getLove();
            const data = charData[currentChar];
            currentLove = Math.min(100, currentLove + 1);
            setLove(currentLove);
            
            const rawMsg = (currentLove >= 100) ? 
                data.maxStrokes[Math.floor(Math.random() * data.maxStrokes.length)] : data.strokeRes;
            document.getElementById('chat-bubble').innerText = replaceName(rawMsg);

            createHeart(e.clientX || window.innerWidth/2, e.clientY || window.innerHeight/2);
            updateStatus();
        }

        function startTalk() {
            if (getLove() >= 100) return;
            const data = charData[currentChar];
            let quest;
            if (Math.random() < 0.4) quest = data.timeQuests[getTimeLabel()];
            else quest = data.questions[Math.floor(Math.random() * data.questions.length)];

            document.getElementById('chat-bubble').innerText = replaceName(quest.q);
            const container = document.getElementById('choices');
            container.innerHTML = "";
            container.style.display = "flex";

            quest.a.forEach((text, i) => {
                const btn = document.createElement('button');
                btn.className = "choice-btn";
                btn.innerText = text;
                btn.onclick = () => {
                    let currentLove = getLove();
                    const score = quest.scores[i];
                    currentLove = Math.min(100, Math.max(0, currentLove + score));
                    setLove(currentLove);
                    container.style.display = "none";
                    const res = data.ansRes[score >= 10 ? "high" : (score < 0 ? "low" : "mid")];
                    document.getElementById('chat-bubble').innerText = replaceName(res);
                    updateStatus();
                };
                container.appendChild(btn);
            });
        }

        function changeChar() {
            currentChar = document.getElementById('char-selector').value;
            localStorage.setItem('hagu_current_char', currentChar);
            document.getElementById('hagumo-sprite').src = `./images/${currentChar}.PNG`;
            const currentLove = getLove();
            const rawMsg = (currentLove >= 100) ? charData[currentChar].maxWelcome : charData[currentChar].welcome;
            document.getElementById('chat-bubble').innerText = replaceName(rawMsg);
            document.getElementById('choices').style.display = "none";
            updateStatus();
        }

        function createHeart(x, y) {
            const h = document.createElement('div');
            h.className = 'heart'; h.innerHTML = '❤';
            h.style.left = (x - 12) + 'px'; h.style.top = (y - 12) + 'px';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 1500);
        }

        function manualReset() {
            if (confirm(`${currentChar}との絆をリセットしますか？`)) {
                localStorage.removeItem(`hagu_love_${currentChar}`);
                location.reload();
            }
        }

        window.onload = () => {
            const savedChar = localStorage.getItem('hagu_current_char');
            if (savedChar) {
                currentChar = savedChar;
                document.getElementById('char-selector').value = savedChar;
            }
            changeChar();
        };
    </script>
</body>
</html>
