<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MY HAGUMO</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#fffdf8;
}

.nav{
display:flex;
justify-content:center;
gap:25px;
padding:20px;
background:white;
box-shadow:0 5px 20px rgba(0,0,0,.05);
}

.nav a{
text-decoration:none;
color:#333;
font-weight:bold;
}

.nav a.active{
color:#ff4fa3;
border-bottom:3px solid #ff4fa3;
}

.card{

background:white;

margin:20px auto;

padding:20px;

border-radius:20px;

width:260px;

box-shadow:0 10px 20px rgba(0,0,0,.1);

}

img{

width:150px;

border-radius:20px;

}

button{

margin-top:10px;

padding:8px 15px;

border:none;

border-radius:20px;

background:#ff9fcf;

color:white;

}

</style>

</head>

<body>

<div class="nav">
<a href="index.html">HOME</a>
<a href="world.html">WORLD</a>
<a href="hagumo.html">HAGUMO</a>
<a href="diagnosis.html">DIAGNOSIS</a>
<a href="product.html">PRODUCT</a>
<a href="my.html" class="active">MY HAGUMO</a>
</div>

<h1>🌿 MY HAGUMO</h1>

<div id="history"></div>

<script>

let history=JSON.parse(localStorage.getItem("hagumoHistory"))||[]

let container=document.getElementById("history")

history.reverse().forEach((h,i)=>{

let div=document.createElement("div")

div.className="card"

div.innerHTML=`

<img src="${h.img}">

<h3>${h.name}</h3>

<p>${h.date}</p>

<button onclick="setOshi('${h.name}')">推しにする</button>

`

container.appendChild(div)

})

function setOshi(name){

localStorage.setItem("oshiHagumo",name)

alert(name+" を推しハグモに設定しました！")

}

</script>

</body>

</html>
