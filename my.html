<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MY HAGUMO | 絆の部屋</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --main-pink: #ff7eb9; 
            --soft-pink: #fff5f7; 
            --pink1: #ffb3d9; 
            --pink2: #d1478e; 
            --gold: #ffd700; 
            --rainbow: linear-gradient(90deg, #ff2400, #e81d1d, #e8b71d, #1de840, #1ddde8, #2b1de8, #dd1de8, #ff2400); 
        }

        body { 
            font-family: 'Zen Maru Gothic', sans-serif; 
            background: var(--soft-pink); 
            margin: 0; 
            padding-top: 100px; 
            color: #555; 
            overflow-x: hidden;
        }

        /* ナビゲーション */
        .nav { 
            position: fixed; top: 0; left: 0; width: 100%; 
            background: white; z-index: 10000; border-bottom: 2px solid #fff0f6; 
            padding: 8px 0;
        }
        .nav-content { 
            max-width: 1100px; margin: 0 auto; padding: 0 15px;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .nav-logo-img { height: 28px; cursor: pointer; }
        .nav-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px 8px; }
        .nav-link { 
            color: #888; text-decoration: none; font-size: 11px; font-weight: bold; 
            padding: 4px 8px; border-radius: 20px; transition: 0.3s;
            background: #fdfdfd; border: 1px solid #f0f0f0;
        }
        .nav-link.active { color: var(--main-pink); background: var(--soft-pink); border-color: var(--main-pink); }

        @media screen and (min-width: 769px) {
            body { padding-top: 110px; }
            .nav-content { flex-direction: row; justify-content: space-between; height: 60px; }
            .nav-link { font-size: 13px; background: none; border: none; }
        }

        /* メインレイアウト */
        .main-wrapper {
            display: flex; flex-direction: column; align-items: center;
            max-width: 1000px; margin: 0 auto; padding: 10px 20px 40px;
        }

        @media screen and (min-width: 769px) {
            .main-wrapper { flex-direction: row; align-items: flex-start; justify-content: center; gap: 40px; padding-top: 40px; }
            .left-panel { width: 400px; position: sticky; top: 120px; }
            .right-panel { width: 450px; }
        }

        /* ステータスボード */
        .status-container { 
            width: 100%; padding: 25px; background: white; border-radius: 35px; 
            box-shadow: 0 15px 35px rgba(255,126,185,0.15); text-align: center;
            margin-bottom: 25px; box-sizing: border-box; border: 2px solid #fff;
        }
        .user-name-display { font-size: 16px; color: var(--main-pink); font-weight: bold; margin-bottom: 15px; text-shadow: 1px 1px 0 white; }

        .love-bar-bg { width: 100%; height: 20px; background: #eee; border-radius: 15px; margin: 15px 0; overflow: hidden; border: 3px solid #fff; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1); }
        .love-bar-fill { height: 100%; background: linear-gradient(90deg, var(--pink1), var(--main-pink)); width: 50%; transition: 1.5s cubic-bezier(0.22, 1, 0.36, 1); position: relative; }
        
        .love-bar-fill.max { background: var(--rainbow); background-size: 200% 100%; animation: moveBg 2s linear infinite; }
        @keyframes moveBg { 0% { background-position: 0% 0%; } 100% { background-position: 200% 0%; } }

        .room-main { position: relative; text-align: center; margin: 30px 0; perspective: 1000px; }
        .hagumo-img { 
            width: 250px; height: 250px; object-fit: contain; cursor: pointer; 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            filter: drop-shadow(0 15px 25px rgba(255,126,185,0.3)); 
        }
        
        .bounce { animation: bounce 4s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .bubble { 
            position: relative; background: white; padding: 25px; border-radius: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 25px; 
            font-weight: bold; font-size: 16px; min-height: 90px;
            display: flex; align-items: center; justify-content: center;
            line-height: 1.6; border: 2px solid #fff; transition: opacity 0.2s;
        }
        
        @media screen and (max-width: 768px) {
            .bubble { order: -1; }
            .bubble::after {
                content: ""; position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%);
                border-width: 18px 18px 0; border-style: solid; border-color: white transparent transparent;
            }
        }
        @media screen and (min-width: 769px) {
            .bubble::after {
                content: ""; position: absolute; left: -18px; top: 50%; transform: translateY(-50%);
                border-width: 18px 18px 18px 0; border-style: solid; border-color: transparent white transparent transparent;
            }
        }

        .action-menu { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .action-btn { 
            background: white; border: none; padding: 15px 25px; border-radius: 50px; 
            font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); color: #666;
            display: flex; align-items: center; gap: 8px;
        }
        .action-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(255,126,185,0.2); color: var(--main-pink); }
        .action-btn span { color: var(--main-pink); font-size: 12px; }

        .heart { position: absolute; pointer-events: none; color: #ff7eb9; animation: heartUp 1.5s forwards; font-size: 20px; z-index: 9999; }
        @keyframes heartUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-100px) scale(1.5); opacity: 0; } }

        .max-flash { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 20000; animation: flashEffect 0.8s ease-out; pointer-events: none; }
        @keyframes flashEffect { 0% { opacity: 1; } 100% { opacity: 0; } }
        .rainbow-body { animation: rainbowAnim 1.5s linear infinite !important; filter: drop-shadow(0 0 30px gold) !important; }
        @keyframes rainbowAnim { 0% { filter: hue-rotate(0deg) scale(1.05); } 100% { filter: hue-rotate(360deg) scale(1.05); } }

        footer { text-align: center; padding: 50px 20px; color: #ccc; font-size: 12px; }
    </style>
</head>
<body>

    <div id="max-flash" class="max-flash"></div>

    <nav class="nav">
        <div class="nav-content">
            <img src="./images/rogo.PNG" class="nav-logo-img" onclick="location.href='index.html'">
            <div class="nav-links">
                <a href="index.html" class="nav-link">HOME</a>
                <a href="world.html" class="nav-link">WORLD</a>
                <a href="product.html" class="nav-link">PRODUCT</a>
                <a href="hagumo.html" class="nav-link">HAGUMO</a>
                <a href="diagnosis.html" class="nav-link">DIAGNOSIS</a>
                <a href="my.html" class="nav-link active">MY HAGUMO</a>
            </div>
        </div>
    </nav>

    <div class="main-wrapper">
        <div class="left-panel">
            <div class="status-container">
                <div id="user-display" class="user-name-display">ようこそ！HAGUMOの部屋へ</div>
                
                <label style="font-size: 11px; color: #aaa; display: block; margin-bottom: 5px;">パートナーを選択</label>
                <select id="char-selector" onchange="changeChar()" style="width: 80%; padding: 12px; border-radius: 15px; font-weight: bold; font-family: inherit; color: var(--pink2); border: 2px solid var(--soft-pink); margin-bottom: 10px; outline: none; cursor: pointer; background: #fffcfd;">
                    <option value="buta">かぶた</option>
                    <option value="imo">さつまいもぐら</option>
                    <option value="jaku">ばたふらいぴーこっく</option>
                    <option value="risu">きゅうりす</option>
                    <option value="tora">とまとら</option>
                    <option value="chabo">かぼちゃぼ</option>
                    <option value="saru">れもんきー</option>
                    <option value="kame">ぶるーべりくがめ</option>
                    <option value="nga">もももんが</option>
                    <option value="kuma">くろいちじくま</option>
                </select>

                <div class="love-bar-bg"><div id="love-fill" class="love-bar-fill"></div></div>
                <div style="font-size: 11px; font-weight: bold; color: #999; letter-spacing: 1px;">KIZUNA LEVEL: <span id="love-val" style="color:var(--main-pink); font-size: 20px;">50</span> / 100</div>
            </div>

            <div class="room-main" id="hagumo-area">
                <img id="hagumo-sprite" src="./images/buta.PNG" class="hagumo-img bounce" onclick="撫でる(event)">
            </div>
        </div>

        <div class="right-panel">
            <div id="chat-bubble" class="bubble">主様、お帰りなさい！<br>今日は何して遊ぶ？</div>
            
            <div class="action-menu">
                <button id="talk-btn" class="action-btn" onclick="startTalk()">💬 おしゃべり <span>(<span id="talk-count">5</span>)</span></button>
                <button id="stroke-btn" class="action-btn" onclick="撫でる(event)">👋 なでなで <span>(<span id="stroke-count">10</span>)</span></button>
                <button class="action-btn" onclick="renameUser()">✏️ 名前を教える</button>
                <button class="action-btn" onclick="resetGame()" style="opacity: 0.5; font-size: 12px;">🔄 リセット</button>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 MY HAGUMO Project | 絆を育む農業×美肌</footer>

    <script>
        const charData = {
            buta: { 
                name: "かぶた", 
                lines: ["お腹すいたぶー...", "一緒に畑いくぶ？", "主様、だいすきぶ！", "泥遊び、楽しいぶよ♪"],
                welcome: "主様、お帰りぶ！<br>おいしい野菜、育ってるぶ？",
                rename: (n) => `${n}！おいしそうな名前ぶ！<br>お腹すいてきちゃったぶ〜。`
            },
            imo: { 
                name: "さつまいもぐら", 
                lines: ["土の中は落ち着くもにょ...", "お芋、食べるもにょ？", "主様の手、あったかいもにょ。", "もにょもにょ...お昼寝タイム？"],
                welcome: "あ、主様...おかえりもにょ。<br>今、土を耕してたもにょ。",
                rename: (n) => `${n}、いい響きもにょ。<br>土の中にまで響くいい声もにょ。`
            },
            risu: { 
                name: "きゅうりす", 
                lines: ["水分補給は大事だよ！", "バランスの良い食生活、してる？", "主様の肌、ツヤツヤにしたいなっ！", "ポリポリ...このキュウリ、最高！"],
                welcome: "主様、おかえり！<br>ちゃんと野菜食べてる？チェックしちゃうよ！",
                rename: (n) => `${n}って言うんだね！<br>ボクの次に素敵な名前だよ、えっへん！`
            },
            tora: { 
                name: "とまとら", 
                lines: ["情熱の赤！トマトパワーだよ！", "今日も元気にいこう！ガオー！", "主様、一緒に運動する？", "リコピン、足りてる？"],
                welcome: "主様、おかえりー！<br>今日も真っ赤に燃える情熱、持ってる！？",
                rename: (n) => `${n}！強そうな名前だガオ！<br>気に入った！よろしくな！`
            },
            chabo: { 
                name: "かぼちゃぼ", 
                lines: ["どっしり構えていこうぜ。", "カボチャの煮物、作ってくれる？", "主様、いつも頑張ってるね。", "コケッ...あ、つい出ちゃった。"],
                welcome: "よお、主様。<br>ゆっくり座って、お茶でも飲もうぜ。",
                rename: (n) => `${n}か、いい名前じゃねぇか。<br>落ち着く響きだ。`
            },
            kuma: { 
                name: "くろいちじくま", 
                lines: ["……静かに、育つのを待とう。", "この果実、君にあげるよ。", "……そばにいてくれて、ありがとう。", "闇夜に紛れて、美しく……"],
                welcome: "……お帰り。君が来ると、<br>この部屋が少し明るくなるね。",
                rename: (n) => `${n}……。<br>……忘れないように、心に刻んでおくよ。`
            },
            saru: { 
                name: "れもんきー", 
                lines: ["酸っぱいけど、クセになるよ！", "ビタミンC、たっぷりだよ！", "ウキー！主様、遊ぼう！", "肌がシャキッとするね！"],
                welcome: "ウキキーッ！主様おかえり！<br>ビタミン、足りてる！？",
                rename: (n) => `${n}！フレッシュな名前だね！<br>覚えるのもカンタン、ウキッ！`
            },
            kame: { 
                name: "ぶるーべりくがめ", 
                lines: ["ゆっくり、美しくなればいい。", "目は大事にしなきゃダメだよ。", "のんびり畑を見守ってるね。", "アントシアニン、あげる。"],
                welcome: "おかえりなさい……。<br>慌てなくていいですよ、のんびりしましょう。",
                rename: (n) => `${n}さん……。<br>ゆっくり、覚えさせていただきますね。`
            },
            nga: { 
                name: "もももんが", 
                lines: ["ふわふわ、桃の香りがする？", "主様のところに飛んでいくよ！", "甘い果汁が一番の美容液！", "ピー！撫でて撫でて！"],
                welcome: "ピピィー！主様！<br>待ってたよ、ふわふわさせて！",
                rename: (n) => `${n}！甘くて美味しそうな名前だね！<br>大好きになっちゃいそう！`
            },
            jaku: { 
                name: "ばたふらいぴーこっく", 
                lines: ["私の色、不思議だと思わない？", "ハーブの力で癒やしてあげる。", "主様、気品を忘れないで。", "……綺麗、と言ってくれるの？"],
                welcome: "お帰りなさい、主様。<br>ハーブティーでもいかがかしら？",
                rename: (n) => `${n}……。<br>優雅な響きですこと。大切にしますわ。`
            }
        };

        let love = parseInt(localStorage.getItem('hagumo_love')) || 50;
        let userName = localStorage.getItem('hagumo_user') || "主様";
        let talkCount = 5;
        let strokeCount = 10;

        window.onload = () => {
            updateStatus();
            updateUserDisplay();
            const charKey = document.getElementById('char-selector').value;
            say(charData[charKey]?.welcome || "主様、おかえりなさい！");
        };

        function updateStatus() {
            document.getElementById('love-val').innerText = love;
            const fill = document.getElementById('love-fill');
            fill.style.width = love + "%";
            
            if (love >= 100) {
                fill.classList.add('max');
                document.getElementById('hagumo-sprite').classList.add('rainbow-body');
            } else {
                fill.classList.remove('max');
                document.getElementById('hagumo-sprite').classList.remove('rainbow-body');
            }
            localStorage.setItem('hagumo_love', love);
        }

        function updateUserDisplay() {
            document.getElementById('user-display').innerText = `✨ ${userName} の絆ルーム ✨`;
        }

        function changeChar() {
            const charKey = document.getElementById('char-selector').value;
            const img = document.getElementById('hagumo-sprite');
            img.classList.remove('bounce');
            void img.offsetWidth; 
            img.classList.add('bounce');
            img.src = `./images/${charKey}.PNG`;
            
            const welcomeMsg = charData[charKey]?.welcome || "よろしくね！";
            say(welcomeMsg);
        }

        function say(text) {
            const bubble = document.getElementById('chat-bubble');
            bubble.style.opacity = 0;
            setTimeout(() => {
                bubble.innerHTML = text;
                bubble.style.opacity = 1;
            }, 200);
        }

        function startTalk() {
            if (talkCount <= 0) {
                say("ちょっと疲れちゃった...<br>また後でお話ししよう？");
                return;
            }
            talkCount--;
            document.getElementById('talk-count').innerText = talkCount;
            
            const charKey = document.getElementById('char-selector').value;
            const lines = charData[charKey]?.lines || ["なになにー？"];
            
            let message = lines[Math.floor(Math.random() * lines.length)];
            if (love >= 90) message = `${userName}といると、本当に幸せだよ。`;
            
            love = Math.min(100, love + 2);
            updateStatus();
            say(message);
        }

        function 撫でる(event) {
            if (strokeCount <= 0) {
                say("（満足してすやすや眠っている...）");
                return;
            }
            strokeCount--;
            document.getElementById('stroke-count').innerText = strokeCount;

            love = Math.min(100, love + 5);
            updateStatus();
            
            createHeart(event.clientX, event.clientY);

            const img = document.getElementById('hagumo-sprite');
            img.style.transform = "scale(1.1) rotate(5deg)";
            setTimeout(() => img.style.transform = "", 200);

            if (love >= 100) {
                document.getElementById('max-flash').style.display = "block";
                setTimeout(() => document.getElementById('max-flash').style.display = "none", 800);
                say("！！ ありがとう！！<br>これこそが、本当の『絆』だね！");
            } else {
                say("わぁっ！なでなで、気持ちいい〜♪");
            }
        }

        function createHeart(x, y) {
            const heart = document.createElement('div');
            heart.innerHTML = "❤";
            heart.className = "heart";
            heart.style.left = (x - 10) + "px";
            heart.style.top = (y - 10) + "px";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1500);
        }

        function renameUser() {
            const newName = prompt("私になんて呼んでほしい？", userName);
            if (newName && newName.length < 10) {
                userName = newName;
                localStorage.setItem('hagumo_user', userName);
                updateUserDisplay();
                
                const charKey = document.getElementById('char-selector').value;
                const response = charData[charKey]?.rename ? charData[charKey].rename(userName) : `${userName}、いい名前だね！`;
                say(response);
            }
        }

        function resetGame() {
            if (confirm("絆レベルをリセットして、最初からやり直す？")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
