<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MY HAGUMO | ハグモの部屋</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --main-pink: #ff7eb9; 
            --soft-pink: #fff5f7; 
            --pink1: #ffb3d9; 
            --pink2: #d1478e; 
            --rainbow: linear-gradient(90deg, #ff2400, #e81d1d, #e8b71d, #1de840, #1ddde8, #2b1de8, #dd1de8, #ff2400); 
        }

        body { font-family: 'Zen Maru Gothic', sans-serif; background: var(--soft-pink); margin: 0; padding-top: 100px; color: #555; overflow-x: hidden; }

        /* ナビゲーション */
        .nav { position: fixed; top: 0; left: 0; width: 100%; background: white; z-index: 10000; border-bottom: 2px solid #fff0f6; padding: 8px 0; }
        .nav-content { max-width: 1100px; margin: 0 auto; padding: 0 15px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .nav-logo-img { height: 28px; cursor: pointer; }
        .nav-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px 8px; }
        .nav-link { color: #888; text-decoration: none; font-size: 11px; font-weight: bold; padding: 4px 8px; border-radius: 20px; background: #fdfdfd; border: 1px solid #f0f0f0; }
        .nav-link.active { color: var(--main-pink); background: var(--soft-pink); border-color: var(--main-pink); }

        @media screen and (min-width: 769px) {
            body { padding-top: 110px; }
            .nav-content { flex-direction: row; justify-content: space-between; height: 60px; }
            .nav-link { font-size: 13px; background: none; border: none; }
        }

        .main-wrapper { display: flex; flex-direction: column; align-items: center; max-width: 1000px; margin: 0 auto; padding: 10px 20px 40px; }

        @media screen and (min-width: 769px) {
            .main-wrapper { flex-direction: row; align-items: flex-start; justify-content: center; gap: 40px; padding-top: 40px; }
            .left-panel { width: 400px; position: sticky; top: 120px; }
            .right-panel { width: 450px; }
        }

        .status-container { width: 100%; padding: 25px; background: white; border-radius: 35px; box-shadow: 0 15px 35px rgba(255,126,185,0.15); text-align: center; margin-bottom: 25px; box-sizing: border-box; }
        .user-name-display { font-size: 16px; color: var(--main-pink); font-weight: bold; margin-bottom: 15px; }

        .love-bar-bg { width: 100%; height: 20px; background: #eee; border-radius: 15px; margin: 15px 0; overflow: hidden; position: relative; }
        .love-bar-fill { height: 100%; background: linear-gradient(90deg, var(--pink1), var(--main-pink)); width: 50%; transition: 0.5s; }
        .love-bar-fill.max { background: var(--rainbow); background-size: 200% 100%; animation: moveBg 2s linear infinite; }
        @keyframes moveBg { 0% { background-position: 0% 0%; } 100% { background-position: 200% 0%; } }

        .hagumo-img { width: 250px; height: 250px; object-fit: contain; cursor: pointer; transition: 0.3s; filter: drop-shadow(0 15px 25px rgba(255,126,185,0.3)); }
        .bounce { animation: bounce 4s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .bubble { position: relative; background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 25px; font-weight: bold; line-height: 1.6; min-height: 60px; display: flex; align-items: center; justify-content: center; text-align: center;}
        
        .choices-container { display: none; flex-direction: column; gap: 10px; margin-bottom: 20px; width: 100%; }
        .choice-btn { background: white; border: 2px solid var(--pink1); padding: 12px; border-radius: 15px; cursor: pointer; font-family: inherit; font-weight: bold; transition: 0.2s; color: #666; }
        .choice-btn:hover { background: var(--soft-pink); border-color: var(--main-pink); color: var(--main-pink); }

        .action-menu { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .action-btn { background: white; border: none; padding: 15px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.05); color: #666; transition: 0.3s; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .heart { position: absolute; pointer-events: none; color: #ff7eb9; animation: heartUp 1.5s forwards; font-size: 24px; z-index: 9999; }
        @keyframes heartUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-100px) scale(1.5); opacity: 0; } }

        .max-evolution { animation: rainbow-glow 0.4s infinite linear !important; }
        .pachinko-shake { animation: screen-shake 0.1s infinite; }
        .forever-msg { font-size: 22px; font-weight: 900; color: #ff0000; text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 0 0 15px #ff7eb9; animation: pulse 0.5s infinite alternate; }
        @keyframes rainbow-glow {
            0% { filter: drop-shadow(0 0 20px #ff0000) hue-rotate(0deg); transform: scale(1.1) rotate(0deg); }
            50% { filter: drop-shadow(0 0 35px #00ff00) hue-rotate(180deg); transform: scale(1.15) rotate(0deg); }
            100% { filter: drop-shadow(0 0 20px #ff0000) hue-rotate(360deg); transform: scale(1.1) rotate(0deg); }
        }
        @keyframes screen-shake {
            0% { transform: translate(0, 0); }
            20% { transform: translate(4px, 4px); }
            40% { transform: translate(4px, -4px); }
            100% { transform: translate(0, 0); }
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        body.bg-level-1 { background: #fff5f7; }
        body.bg-level-2 { background: #ffe0f0; background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); }
        body.bg-level-3 { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); }
    </style>
</head>

    let currentChar = "buta";
    let love = 50;
    let lastUpdate = Date.now();
    let talkLog = [];
    let strokeLog = [];
    let userName = localStorage.getItem('hagu_user') || "主様";
    let cooldowns = { talk: null, stroke: null };

    // セリフ内の「主様」または「主」を現在のユーザー名に置換する関数
    function getName(text) {
        // もしユーザー名が「主様」以外なら、「主様」「主」を置換する
        if (userName !== "主様") {
            return text.replace(/主様/g, userName).replace(/主(?!様)/g, userName);
        }
        return text;
    }

    function loadCharStatus(charKey) {
        currentChar = charKey;
        love = parseInt(localStorage.getItem(`hagu_love_${charKey}`)) || 50;
        lastUpdate = parseInt(localStorage.getItem(`hagu_time_${charKey}`)) || Date.now();
        talkLog = JSON.parse(localStorage.getItem(`hagu_talk_log_${charKey}`)) || [];
        strokeLog = JSON.parse(localStorage.getItem(`hagu_stroke_log_${charKey}`)) || [];
        
        resetButtonVisuals();
        checkAndStartTimers();
        updateStatus();
        document.getElementById('chat-bubble').innerText = getName(charData[charKey].welcome);
    }

    function resetButtonVisuals() {
        if(cooldowns.talk) clearInterval(cooldowns.talk);
        if(cooldowns.stroke) clearInterval(cooldowns.stroke);
        document.getElementById('talk-btn').disabled = false;
        document.getElementById('talk-btn').innerText = "💬 おしゃべり";
        document.getElementById('stroke-btn').disabled = false;
        document.getElementById('stroke-btn').innerText = "👋 なでなで";
    }

    function checkAndStartTimers() {
        const now = Date.now();
        talkLog = talkLog.filter(t => now - t < 30 * 60 * 1000);
        if (talkLog.length >= 10) startTimer('talk', talkLog[0] + (30 * 60 * 1000), "💬 おしゃべり");
        strokeLog = strokeLog.filter(t => now - t < 5 * 60 * 1000);
        if (strokeLog.length >= 10) startTimer('stroke', strokeLog[0] + (5 * 60 * 1000), "👋 なでなで");
    }

    function startTimer(type, targetTime, originalText) {
        const btnId = type === 'talk' ? 'talk-btn' : 'stroke-btn';
        const btn = document.getElementById(btnId);
        btn.disabled = true;
        if (cooldowns[type]) clearInterval(cooldowns[type]);
        cooldowns[type] = setInterval(() => {
            const diff = targetTime - Date.now();
            if (diff <= 0) {
                clearInterval(cooldowns[type]);
                btn.innerText = originalText;
                btn.disabled = false;
            } else {
                const min = Math.floor(diff / 60000);
                const sec = Math.floor((diff % 60000) / 1000);
                btn.innerText = `⏳ ${min}:${sec.toString().padStart(2, '0')}`;
            }
        }, 1000);
    }

    function updateStatus() {
        const now = Date.now();
        const diff = now - lastUpdate;
        let loss = 0;
        if (love > 51) loss = Math.floor(diff / (60 * 1000));
        else if (love > 0) loss = Math.floor(diff / (3600 * 1000));

        if (loss > 0) {
            love = Math.max(0, love - loss);
            lastUpdate = now;
            save();
        }

        document.getElementById('love-val').innerText = love;
        document.getElementById('user-display').innerText = userName + "の絆ルーム";
        const fill = document.getElementById('love-fill');
        const sprite = document.getElementById('hagumo-sprite');
        const bubble = document.getElementById('chat-bubble');
        const container = document.body;
        fill.style.width = love + "%";

        container.classList.remove('bg-level-1', 'bg-level-2', 'bg-level-3');
        if (love >= 100) container.classList.add('bg-level-3');
        else if (love > 50) container.classList.add('bg-level-2');
        else container.classList.add('bg-level-1');

        if (love >= 100) {
            fill.classList.add('max'); 
            sprite.classList.add('max-evolution');
            container.classList.add('pachinko-shake');
            const foreverLines = {
                buta: "一生一緒だぶ…！もうどこにも行かせないぶ！",
                imo: "離さないもにょ。土の底まで、一生一緒もにょ…",
                jaku: "永遠の愛を誓いますわ。一生、共に歩んでくださいまし",
                risu: "ねぇ、ずっとボクだけを見てて？一生一緒だよ！",
                tora: "オレ様の情熱は一生お前だけのものだ！ガオーッ！",
                chabo: "…おい、覚悟しろよ。俺はあんたを一生離さねぇ。",
                saru: "ウキッ！主が好きすぎて離れられないよ！一生一緒だ！",
                kame: "ゆっくり、永遠に……。一生、一緒にいてくれますね？",
                nga: "ピピィッ！主様はボクのもの！一生一緒だよぉ！",
                kuma: "暗闇の中でも、君だけを離さない。……一生、一緒だよ。"
            };
            if (document.getElementById('choices').style.display !== "flex") {
                bubble.innerHTML = `<div class="forever-msg">${getName(foreverLines[currentChar])}</div>`;
            }
        } else {
            fill.classList.remove('max');
            sprite.classList.remove('max-evolution');
            container.classList.remove('pachinko-shake');
        }

        if (love <= 0) {
            alert(getName(charData[currentChar].farewell));
            resetChar(currentChar);
        }
    }

    function save() {
        localStorage.setItem(`hagu_love_${currentChar}`, love);
        localStorage.setItem(`hagu_time_${currentChar}`, lastUpdate);
        localStorage.setItem(`hagu_talk_log_${currentChar}`, JSON.stringify(talkLog));
        localStorage.setItem(`hagu_stroke_log_${currentChar}`, JSON.stringify(strokeLog));
        localStorage.setItem('hagu_user', userName);
    }

    function startTalk() {
        if (document.getElementById('talk-btn').disabled) return;
        const data = charData[currentChar];
        const quest = data.questions[Math.floor(Math.random() * data.questions.length)];
        document.getElementById('chat-bubble').innerText = getName(quest.q);
        const container = document.getElementById('choices');
        container.innerHTML = "";
        container.style.display = "flex";

        quest.a.forEach((text, i) => {
            const btn = document.createElement('button');
            btn.className = "choice-btn";
            btn.innerText = text;
            btn.onclick = () => {
                const score = quest.scores[i];
                love = Math.min(100, Math.max(0, love + score));
                talkLog.push(Date.now());
                container.style.display = "none";
                let reaction = score >= 10 ? "嬉しい！ツヤツヤになるよ！" : (score < 0 ? "そんなの悲しいな…" : "ありがとう！");
                document.getElementById('chat-bubble').innerText = reaction;
                updateStatus();
                save();
                checkAndStartTimers();
            };
            container.appendChild(btn);
        });
    }

    function strokeHagumo(e) {
        if (document.getElementById('stroke-btn').disabled) return;
        love = Math.min(100, love + 1);
        strokeLog.push(Date.now());
        createHeart(e.clientX || window.innerWidth / 2, e.clientY || window.innerHeight / 2);
        updateStatus();
        save();
        checkAndStartTimers();
    }

    function createHeart(x, y) {
        const h = document.createElement('div');
        h.className = 'heart'; h.innerHTML = '❤';
        h.style.left = x + 'px'; h.style.top = y + 'px';
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 1500);
    }

    function changeChar() {
        const key = document.getElementById('char-selector').value;
        document.getElementById('hagumo-sprite').src = `./images/${key}.PNG`;
        document.getElementById('choices').style.display = "none";
        loadCharStatus(key);
    }

    function resetChar(charKey) {
        localStorage.removeItem(`hagu_love_${charKey}`);
        location.reload();
    }

    function renameUser() {
        const newName = prompt("新しい名前を入力してね", userName);
        if (newName && newName.trim() !== "") {
            userName = newName;
            save();
            updateStatus();
            document.getElementById('chat-bubble').innerText = getName(charData[currentChar].welcome);
        }
    }

    window.onload = () => {
        loadCharStatus(document.getElementById('char-selector').value);
    };
    </script>
</body>
</html>
