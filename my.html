<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY HAGUMO | マイページ</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700&family=Noto+Sans+JP&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <style>
        .my-card { background: white; border-radius: 30px; padding: 40px; text-align: center; }
        .my-img { width: 220px; margin-bottom: 20px; }
        .status-badge { display: inline-block; padding: 5px 15px; background: #fff4f9; color: #ff7eb9; border-radius: 20px; font-weight: bold; margin-bottom: 10px; }
        .no-data { padding: 60px 20px; color: #999; }
        .reset-btn {
            background: none; border: 1px solid #ddd; color: #999;
            padding: 8px 15px; border-radius: 20px; cursor: pointer;
            font-size: 12px; margin-top: 40px; transition: 0.3s;
        }
        .reset-btn:hover { background: #f0f0f0; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>👤 MY HAGUMO</h1>
        <p>あなたのパートナー情報</p>

        <div id="my-content" class="my-card">
            </div>

        <button class="reset-btn" onclick="resetData()">データをリセットして最初からやり直す</button>
    </div>

    <script>
        function loadMyPage() {
            const container = document.getElementById('my-content');
            const data = localStorage.getItem('myHagumo');

            if (!data) {
                // まだ診断していない場合
                container.innerHTML = `
                    <div class="no-data">
                        <p>まだパートナーが見つかっていません。</p>
                        <a href="diagnosis.html" class="button" style="margin-top:20px;">診断をはじめる</a>
                    </div>
                `;
                return;
            }

            const my = JSON.parse(data);
            container.innerHTML = `
                <div class="status-badge">あなたのパートナー</div>
                <div style="font-size: 14px; color: #ff7eb9; font-weight: bold;">― ${my.catch} ―</div>
                <h2 style="font-size: 28px; margin: 10px 0;">${my.name}</h2>
                <img src="./images/${my.img}" class="my-img" onerror="this.src='./${my.img}'">
                <p style="font-size: 14px; line-height: 1.6; color: #666;">
                    ${my.name}はあなたの最高の相棒です。<br>
                    一緒に家庭菜園を楽しみながら、理想の自分を目指しましょう！
                </p>
                <div style="margin-top: 30px;">
                    <a href="product.html" class="button">この子の種を注文する</a>
                </div>
            `;
        }

        function resetData() {
            if (confirm("診断結果とパートナー情報をリセットしますか？")) {
                localStorage.removeItem('myHagumo');
                location.reload(); // ページを再読み込みして表示を更新
            }
        }

        window.onload = loadMyPage;
    </script>
    <script src="./common.js"></script>
</body>
</html>
