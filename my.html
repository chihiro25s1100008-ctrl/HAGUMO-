<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MY HAGUMO | ハグモの部屋</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --main-pink: #ff7eb9; 
            --soft-pink: #fff5f7; 
            --pink1: #ffb3d9; 
            --pink2: #d1478e; 
            --rainbow: linear-gradient(90deg, #ff2400, #e81d1d, #e8b71d, #1de840, #1ddde8, #2b1de8, #dd1de8, #ff2400); 
        }

        body { font-family: 'Zen Maru Gothic', sans-serif; background: var(--soft-pink); margin: 0; padding-top: 100px; color: #555; overflow-x: hidden; transition: background 0.5s; touch-action: manipulation; }

        .nav { position: fixed; top: 0; left: 0; width: 100%; background: white; z-index: 10000; border-bottom: 2px solid #fff0f6; padding: 8px 0; }
        .nav-content { max-width: 1100px; margin: 0 auto; padding: 0 15px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .nav-logo-img { height: 28px; cursor: pointer; }
        .nav-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px 8px; }
        .nav-link { color: #888; text-decoration: none; font-size: 11px; font-weight: bold; padding: 4px 8px; border-radius: 20px; background: #fdfdfd; border: 1px solid #f0f0f0; }
        .nav-link.active { color: var(--main-pink); background: var(--soft-pink); border-color: var(--main-pink); }

        @media screen and (min-width: 769px) {
            body { padding-top: 110px; }
            .nav-content { flex-direction: row; justify-content: space-between; height: 60px; }
            .nav-link { font-size: 13px; background: none; border: none; }
        }

        .main-wrapper { display: flex; flex-direction: column; align-items: center; max-width: 1000px; margin: 0 auto; padding: 10px 20px 40px; }

        @media screen and (min-width: 769px) {
            .main-wrapper { flex-direction: row; align-items: flex-start; justify-content: center; gap: 40px; padding-top: 40px; }
            .left-panel { width: 350px; position: sticky; top: 120px; }
            .right-panel { width: 450px; }
        }

        .status-container { width: 100%; padding: 25px; background: white; border-radius: 35px; box-shadow: 0 15px 35px rgba(255,126,185,0.15); text-align: center; margin-bottom: 25px; box-sizing: border-box; }
        .user-name-display { font-size: 16px; color: var(--main-pink); font-weight: bold; margin-bottom: 15px; }

        .love-bar-bg { width: 100%; height: 20px; background: #eee; border-radius: 15px; margin: 15px 0; overflow: hidden; position: relative; }
        .love-bar-fill { height: 100%; background: linear-gradient(90deg, var(--pink1), var(--main-pink)); width: 50%; transition: 0.5s; }
        .love-bar-fill.max { background: var(--rainbow); background-size: 200% 100%; animation: moveBg 2s linear infinite; }
        
        @keyframes moveBg { 0% { background-position: 0% 0%; } 100% { background-position: 200% 0%; } }

        .hagumo-img { width: 250px; height: 250px; object-fit: contain; cursor: pointer; transition: 0.3s; filter: drop-shadow(0 15px 25px rgba(255,126,185,0.3)); -webkit-tap-highlight-color: transparent; }
        .bounce { animation: bounce 4s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .bubble { position: relative; background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 25px; font-weight: bold; line-height: 1.6; min-height: 80px; display: flex; align-items: center; justify-content: center; text-align: center; }
        
        .choices-container { display: none; flex-direction: column; gap: 10px; margin-bottom: 20px; width: 100%; }
        .choice-btn { background: white; border: 2px solid var(--pink1); padding: 12px; border-radius: 15px; cursor: pointer; font-family: inherit; font-weight: bold; transition: 0.2s; color: #666; }
        .choice-btn:hover { background: var(--soft-pink); border-color: var(--main-pink); color: var(--main-pink); }

        .action-menu { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; }
        .main-actions { display: flex; justify-content: center; gap: 10px; width: 100%; }
        .action-btn { background: white; border: none; padding: 15px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.05); color: #666; transition: 0.3s; -webkit-tap-highlight-color: transparent; flex: 1; max-width: 180px; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .sub-actions { display: flex; justify-content: center; width: 100%; margin-top: 10px; }
        .reset-area { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; width: 100%; text-align: center; }
        .reset-btn { background: none; border: 1px solid #eee; color: #ccc; padding: 8px 15px; border-radius: 20px; font-size: 11px; cursor: pointer; transition: 0.2s; }
        .reset-btn:hover { border-color: #ffb3d9; color: #ffb3d9; }

        .heart { position: absolute; pointer-events: none; color: #ff7eb9; animation: heartUp 1.5s forwards; font-size: 24px; z-index: 9999; }
        @keyframes heartUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-100px) scale(1.5); opacity: 0; } }

        .max-evolution { animation: rainbow-glow 0.4s infinite linear !important; }
        .pachinko-shake { animation: screen-shake 0.1s infinite; }
        .forever-msg { font-size: 20px; font-weight: 900; color: #ff0000; text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 0 0 15px #ff7eb9; animation: pulse 0.5s infinite alternate; }
        
        @keyframes rainbow-glow {
            0% { filter: drop-shadow(0 0 20px #ff0000) hue-rotate(0deg); transform: scale(1.1) rotate(0deg); }
            50% { filter: drop-shadow(0 0 35px #00ff00) hue-rotate(180deg); transform: scale(1.15) rotate(0deg); }
            100% { filter: drop-shadow(0 0 20px #ff0000) hue-rotate(360deg); transform: scale(1.1) rotate(0deg); }
        }
        @keyframes screen-shake {
            0% { transform: translate(0, 0); }
            20% { transform: translate(4px, 4px); }
            40% { transform: translate(4px, -4px); }
            100% { transform: translate(0, 0); }
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }

        body.bg-level-1 { background: #fff5f7; }
        body.bg-level-2 { background: #ffe0f0; background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); }
        body.bg-level-3 { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); }
        
        .punitto { transform: scale(0.95) translateY(5px) !important; transition: 0.1s; }

 /* 夜モード：落ち着いたパステルパープルとピンクのグラデーション */
body.night-room {
    /* ナイトクラブ感を消すため、彩度を少し抑えた魔法のような夜空色に */
    background: #5a4b81 !important; 
    background-image: 
        radial-gradient(#fff, rgba(255,255,255,.4) 1px, transparent 35px), /* 瞬く白い星 */
        linear-gradient(135deg, #7b68ee 0%, #ffb3d9 100%) !important; /* ラベンダーからピンクへの深いグラデ */
    background-size: 150px 150px, 100% 100% !important;
    color: #fff !important;
}

/* 吹き出し：夜の透明感（すりガラス）を出しつつ、ピンクの縁取りで可愛く */
body.night-room .bubble {
    background: rgba(255, 255, 255, 0.2) !important; 
    color: #fff !important;
    border: 2px solid #ffb3d9 !important; /* ピンクの枠線でキャラ立ちさせる */
    box-shadow: 0 0 15px rgba(255, 179, 217, 0.4) !important; /* ほんのりピンクの後光 */
    backdrop-filter: blur(10px); 
    -webkit-backdrop-filter: blur(10px);
}

/* ステータス枠：夜の静けさに馴染む透明な白 */
body.night-room .status-container {
    background: rgba(255, 255, 255, 0.15) !important;
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2) !important;
    color: #fff !important;
}

/* 夜のお名前：ピンク感を感じる明るい色に */
body.night-room .user-name-display {
    color: #ffdaeb !important;
    text-shadow: 0 0 10px rgba(255, 126, 185, 0.8);
}

/* ボタン：夜でも見やすく、ふんわり光るパステルボタン */
body.night-room .action-btn {
    background: rgba(255, 255, 255, 0.25) !important;
    color: #fff !important;
    border: 1px solid #ffb3d9 !important;
    backdrop-filter: blur(5px);
}

body.night-room .action-btn:hover {
    background: rgba(255, 255, 255, 0.4) !important;
}
    </style>
</head>

            },

    let currentChar = "buta";
    let love = 50;
    let lastUpdate = Date.now();
    let lastMaxTime = 0;
    let talkLog = [];
    let strokeLog = [];
    let userName = localStorage.getItem('hagu_user') || "主様";
    let cooldowns = { talk: null, stroke: null };

    function getName(text) {
        if (!text) return "";
        return text.replace(/主様/g, userName).replace(/主(?![ぁ-ん])/g, userName);
    }

    function getTimeLabel() {
        const hour = new Date().getHours();
        if (hour >= 5 && hour < 10) return "morning";
        if (hour >= 10 && hour < 17) return "lunch";
        if (hour >= 17 && hour < 23) return "night";
        return "midnight";
    }

  function checkTimeAndEffect() {
    const hour = 20; // テスト用
    const container = document.body;
    const sprite = document.getElementById('hagumo-sprite');
    
    if (hour >= 20 || hour < 5) {
        container.classList.add('night-room');
        container.classList.remove('bg-level-1', 'bg-level-2', 'bg-level-3');
        // キャラにほんのり夜の影（青紫）を落とす
        sprite.style.filter = "drop-shadow(0 15px 25px rgba(255,126,185,0.3)) brightness(0.9) sepia(0.2) hue-rotate(240deg)";
    } else {
        container.classList.remove('night-room');
        sprite.style.filter = "drop-shadow(0 15px 25px rgba(255,126,185,0.3))"; // 元に戻す
        if (love >= 100) container.classList.add('bg-level-3');
        else if (love > 50) container.classList.add('bg-level-2');
        else container.classList.add('bg-level-1');
    }
}

    function loadCharStatus(charKey) {
        currentChar = charKey;
        love = parseInt(localStorage.getItem(`hagu_love_${charKey}`)) || 50;
        lastUpdate = parseInt(localStorage.getItem(`hagu_time_${charKey}`)) || Date.now();
        lastMaxTime = parseInt(localStorage.getItem(`hagu_max_time_${charKey}`)) || 0;
        talkLog = JSON.parse(localStorage.getItem(`hagu_talk_log_${charKey}`)) || [];
        strokeLog = JSON.parse(localStorage.getItem(`hagu_stroke_log_${charKey}`)) || [];
        
        resetButtonVisuals();
        checkAndStartTimers();
        updateStatus();
        
        const bubble = document.getElementById('chat-bubble');
        if (love >= 100) {
            bubble.innerHTML = `<div class="forever-msg">${getName(charData[charKey].forever)}</div>`;
        } else {
            bubble.innerText = getName(charData[charKey].welcome);
        }
    }

   function updateStatus() {
        const now = Date.now();
        let diff = now - lastUpdate;
        let isImmune = (love >= 100 && (now - lastMaxTime < 60 * 60 * 1000));

        if (!isImmune && diff > 0) {
            let loss = 0;
            // 絆が51以上の時（1分に1減少）
            if (love > 51) {
                loss = Math.floor(diff / (60 * 1000));
                if (loss > 0) {
                    love = Math.max(51, love - loss);
                    lastUpdate += loss * (60 * 1000);
                }
            } 
            // 絆が2〜51の時（1時間に1減少）
            else if (love > 1) {
                loss = Math.floor(diff / (3600 * 1000));
                if (loss > 0) {
                    love = Math.max(1, love - loss);
                    lastUpdate += loss * (3600 * 1000);
                }
            } 
            // 絆が1の時（24時間耐える）
            else if (love === 1) {
                if (diff >= 24 * 3600 * 1000) {
                    love = 0;
                    lastUpdate = now;
                }
            }
            save();
        }

        // 表示の更新
        document.getElementById('love-val').innerText = love;
        document.getElementById('user-display').innerText = userName + "の絆ルーム";
        
        const fill = document.getElementById('love-fill');
        const sprite = document.getElementById('hagumo-sprite');
        const bubble = document.getElementById('chat-bubble');
        const talkBtn = document.getElementById('talk-btn');
        const container = document.body;
        
        fill.style.width = love + "%";

        if (love >= 100) {
            container.classList.add('bg-level-3', 'pachinko-shake');
            fill.classList.add('max'); 
            sprite.classList.add('max-evolution');
            talkBtn.disabled = true;
            talkBtn.innerText = "❤️ 永遠の絆";
            if (document.getElementById('choices').style.display !== "flex" && !bubble.dataset.isStrokeReaction) {
                bubble.innerHTML = `<div class="forever-msg">${getName(charData[currentChar].forever)}</div>`;
            }
        } else {
            container.classList.remove('bg-level-3', 'pachinko-shake', 'bg-level-1', 'bg-level-2');
            container.classList.add(love > 50 ? 'bg-level-2' : 'bg-level-1');
            fill.classList.remove('max');
            sprite.classList.remove('max-evolution');
            talkBtn.innerText = "💬 おしゃべり";
            if (!cooldowns.talk) talkBtn.disabled = false;
        }

        if (love <= 0) {
            alert(getName(charData[currentChar].farewell));
            resetCharData(currentChar);
        }
        checkTimeAndEffect();
    } // ← ここで updateStatus 関数が正しく終わります

    function strokeHagumo(e) {
        if (document.getElementById('stroke-btn').disabled) return;
        
        const sprite = document.getElementById('hagumo-sprite');
        sprite.classList.add('punitto');
        setTimeout(() => sprite.classList.remove('punitto'), 100);

        const oldLove = love;
        love = Math.min(100, love + 1);
        if (love >= 100 && oldLove < 100) lastMaxTime = Date.now();
        strokeLog.push(Date.now());

        const x = e.clientX || (e.touches && e.touches[0].clientX) || window.innerWidth / 2;
        const y = e.clientY || (e.touches && e.touches[0].clientY) || window.innerHeight / 2;
        createHeart(x, y);

        const bubble = document.getElementById('chat-bubble');
        bubble.dataset.isStrokeReaction = "true";
        if (love >= 100) {
            const maxStrokes = charData[currentChar].maxStrokes;
            const line = getName(maxStrokes[Math.floor(Math.random() * maxStrokes.length)]);
            bubble.innerHTML = `<div class="forever-msg">${line}</div>`;
        } else {
            bubble.innerText = getName(charData[currentChar].strokeRes);
        }

        setTimeout(() => {
            delete bubble.dataset.isStrokeReaction;
            updateStatus();
        }, 3000);

        updateStatus();
        save();
        checkAndStartTimers();
    }

    function save() {
        localStorage.setItem(`hagu_love_${currentChar}`, love);
        localStorage.setItem(`hagu_time_${currentChar}`, lastUpdate);
        localStorage.setItem(`hagu_max_time_${currentChar}`, lastMaxTime);
        localStorage.setItem(`hagu_talk_log_${currentChar}`, JSON.stringify(talkLog));
        localStorage.setItem(`hagu_stroke_log_${currentChar}`, JSON.stringify(strokeLog));
        localStorage.setItem('hagu_user', userName);
    }

    function startTalk() {
        if (document.getElementById('talk-btn').disabled || love >= 100) return;
        const data = charData[currentChar];
        
        let quest;
        const timeLabel = getTimeLabel();
        if (Math.random() < 0.3) {
            quest = data.timeQuests[timeLabel];
        } else {
            quest = data.questions[Math.floor(Math.random() * data.questions.length)];
        }

        document.getElementById('chat-bubble').innerText = getName(quest.q);
        const container = document.getElementById('choices');
        container.innerHTML = "";
        container.style.display = "flex";
        quest.a.forEach((text, i) => {
            const btn = document.createElement('button');
            btn.className = "choice-btn";
            btn.innerText = text;
            btn.onclick = () => {
                const score = quest.scores[i];
                const oldLove = love;
                love = Math.min(100, Math.max(0, love + score));
                if (love >= 100 && oldLove < 100) lastMaxTime = Date.now();
                talkLog.push(Date.now());
                container.style.display = "none";
                
                const bubble = document.getElementById('chat-bubble');
                let resType = "mid";
                if (score >= 10) resType = "high";
                if (score < 0) resType = "low";
                bubble.innerText = getName(data.ansRes[resType]);

                updateStatus();
                save();
                checkAndStartTimers();
            };
            container.appendChild(btn);
        });
    }

    function createHeart(x, y) {
        const h = document.createElement('div');
        h.className = 'heart'; h.innerHTML = '❤';
        h.style.left = (x - 10) + 'px'; h.style.top = (y - 10) + 'px';
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 1500);
    }

    function changeChar() {
        const key = document.getElementById('char-selector').value;
        localStorage.setItem('hagu_current_char', key); 
        document.getElementById('hagumo-sprite').src = `./images/${key}.PNG`;
        document.getElementById('choices').style.display = "none";
        loadCharStatus(key);
    }

    function resetButtonVisuals() {
        if(cooldowns.talk) clearInterval(cooldowns.talk);
        if(cooldowns.stroke) clearInterval(cooldowns.stroke);
        const talkBtn = document.getElementById('talk-btn');
        const strokeBtn = document.getElementById('stroke-btn');
        talkBtn.disabled = false;
        talkBtn.innerText = "💬 おしゃべり";
        strokeBtn.disabled = false;
        strokeBtn.innerText = "👋 なでなで";
    }

    function checkAndStartTimers() {
        const now = Date.now();
        talkLog = talkLog.filter(t => now - t < 30 * 60 * 1000);
        if (talkLog.length >= 10) startTimer('talk', talkLog[0] + (30 * 60 * 1000), "💬 おしゃべり");
        
        strokeLog = strokeLog.filter(t => now - t < 5 * 60 * 1000);
        if (strokeLog.length >= 10) startTimer('stroke', strokeLog[0] + (5 * 60 * 1000), "👋 なでなで");
    }

   function startTimer(type, targetTime, originalText) {
        const btnId = type === 'talk' ? 'talk-btn' : 'stroke-btn';
        const btn = document.getElementById(btnId);
        btn.disabled = true;

        if (cooldowns[type]) clearInterval(cooldowns[type]);

        cooldowns[type] = setInterval(() => {
            const now = Date.now();
            const diff = targetTime - now;

            if (diff <= 0) {
                clearInterval(cooldowns[type]);
                cooldowns[type] = null;
                btn.disabled = (type === 'talk' && love >= 100);
                btn.innerText = originalText;
            } else {
                const sec = Math.ceil(diff / 1000);
                btn.innerText = `待機中 (${sec}s)`;
            }
        }, 1000);
    }

    function renameUser() {
        const newName = prompt("新しいおなまえを教えてね！", userName);
        if (newName && newName.trim()) {
            userName = newName.trim();
            save();
            updateStatus();
        }
    }

    function manualReset() {
        if (confirm("これまでの絆をリセットして、最初からやり直しますか？")) {
            resetCharData(currentChar);
        }
    }

    function resetCharData(charKey) {
        localStorage.removeItem(`hagu_love_${charKey}`);
        localStorage.removeItem(`hagu_time_${charKey}`);
        localStorage.removeItem(`hagu_max_time_${charKey}`);
        localStorage.removeItem(`hagu_talk_log_${charKey}`);
        localStorage.removeItem(`hagu_stroke_log_${charKey}`);
        location.reload();
    }

    // 初回起動時の初期化処理
    window.onload = () => {
        const savedChar = localStorage.getItem('hagu_current_char') || "buta";
        document.getElementById('char-selector').value = savedChar;
        document.getElementById('hagumo-sprite').src = `./images/${savedChar}.PNG`;
        loadCharStatus(savedChar);
        setInterval(updateStatus, 30000); // 30秒ごとにステータス自動更新
    };
