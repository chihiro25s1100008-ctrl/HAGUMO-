        body { margin: 0; padding: 0; background-color: #fff9fb; font-family: 'Zen Maru Gothic', sans-serif; }
        
        /* 共通ナビゲーション（白背景・中央ロゴ） */
        .navbar { position: fixed; top: 0; width: 100%; background: white; padding: 10px 0; z-index: 1000; border-bottom: 1px solid #f0f0f0; }
        .nav-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: center; align-items: center; gap: 30px; }

        .nav-links a { color: #555; text-decoration: none; font-size: 13px; font-weight: bold; }
        .nav-links a.active { color: #ff7eb9; }

        .container { margin-top: 120px; padding: 20px; text-align: center; }
        .stage { background: white; border-radius: 40px; padding: 40px 20px; box-shadow: 0 15px 40px rgba(255, 126, 185, 0.15); margin: 0 auto; max-width: 500px; position: relative; }
        
        .my-img { width: 220px; cursor: pointer; transition: 0.3s; }
        .bounce { animation: bounce 0.8s infinite alternate cubic-bezier(0.45, 0.05, 0.55, 0.95); }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-15px); } }
        .max-aura { filter: drop-shadow(0 0 20px #ff7eb9); animation: rainbow 2s infinite linear; }
        @keyframes rainbow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        .speech-bubble { background: #fff4f9; border: 3px solid #ffdaeb; border-radius: 25px; padding: 20px; margin-bottom: 30px; min-height: 80px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #555; position: relative; font-size: 14px; line-height: 1.6; }
        .speech-bubble::after { content: ""; position: absolute; bottom: -15px; left: 50%; border-width: 15px 15px 0; border-style: solid; border-color: #ffdaeb transparent; width: 0; margin-left: -15px; }

        .gauge-wrap { width: 80%; height: 16px; background: #ffeef2; border-radius: 10px; margin: 20px auto 5px; overflow: hidden; border: 2px solid #ffdaeb; }
        #love-bar { height: 100%; background: linear-gradient(to right, #ffb6c1, #ff7eb9); transition: 1s; width: 0%; }
        
        .kawaii-btn { background: white; border: 3px solid #ffb6c1; color: #ff7eb9; padding: 12px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; margin: 5px; font-size: 14px; outline: none; transition: 0.2s; }

        .choice-container { display: none; flex-direction: column; gap: 10px; margin-top: 20px; }

        document.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('myHagumo');
            if (!saved) { document.getElementById('has-data').innerHTML = "診断をしてください"; return; }
            const data = JSON.parse(saved);
            currentPartner = charaData[data.img] || charaData["risu.PNG"];
            love = data.love || 50;
            document.getElementById('partner-img').src = `./images/${data.img}`;
            document.getElementById('status-label').innerText = `${currentPartner.name}（${currentPartner.key}）`;
            updateGauge();
        });

        function updateGauge() {
            document.getElementById('love-bar').style.width = love + '%';
            document.getElementById('love-num').innerText = Math.floor(love);
            if (love >= 100) document.getElementById('partner-img').classList.add('max-aura');
            const saved = JSON.parse(localStorage.getItem('myHagumo'));
            saved.love = love;
            localStorage.setItem('myHagumo', JSON.stringify(saved));
        }

        function playAction() {
            love = Math.min(100, love + 1);
            document.getElementById('msg-text').innerText = "なでなで、うれしい！";
            updateGauge();
        }

        function startTalk() {
            const talk = currentPartner.talks[Math.floor(Math.random() * currentPartner.talks.length)];
            const msg = document.getElementById('msg-text');
            const choiceBox = document.getElementById('choices');
            msg.innerText = talk.q;
            choiceBox.innerHTML = '';
            choiceBox.style.display = 'flex';
            talk.a.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'kawaii-btn';
                btn.innerText = choice.t;
                btn.onclick = () => {
                    love = Math.max(0, Math.min(100, love + choice.l));
                    msg.innerText = choice.r;
                    choiceBox.style.display = 'none';
                    updateGauge();
                };
                choiceBox.appendChild(btn);
            });
        }
    </script>
</body>
</html>
