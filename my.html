<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY HAGUMO | 絆の部屋</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-pink: #ff7eb9; --soft-pink: #fff5f7; --pink1: #ffb3d9; --pink2: #d1478e; }
        body { font-family: 'Zen Maru Gothic', sans-serif; background: var(--soft-pink); margin: 0; padding-top: 80px; overflow-x: hidden; color: #555; }

        /* --- 共通ナビゲーション --- */
        .nav { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: white; z-index: 5000; border-bottom: 2px solid #fff0f6; display: flex; align-items: center; }
        .nav-content { width: 100%; max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box; }
        .nav-logo-img { height: 35px; cursor: pointer; flex-shrink: 0; }
        .nav-links { display: flex; gap: 15px; }
        .nav-link { color: #888; text-decoration: none; font-size: 13px; font-weight: bold; padding: 5px 2px; position: relative; transition: 0.3s; white-space: nowrap; }
        .nav-link:hover, .nav-link.active { color: var(--main-pink); }
        .nav-link.active::after { content: ""; position: absolute; bottom: -2px; left: 0; width: 100%; height: 2px; background: var(--main-pink); }

        /* ステータス周り */
        .status-container { max-width: 400px; margin: 10px auto; padding: 20px; background: white; border-radius: 35px; box-shadow: 0 10px 25px rgba(255,126,185,0.1); text-align: center; }
        .love-bar-bg { width: 90%; height: 14px; background: #eee; border-radius: 10px; margin: 10px auto; overflow: hidden; position: relative; }
        .love-bar-fill { height: 100%; background: linear-gradient(90deg, var(--pink1), var(--main-pink)); width: 50%; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* キャラ選択 */
        #char-selector { border: 2px solid var(--soft-pink); border-radius: 15px; padding: 5px 15px; font-weight: bold; color: var(--pink2); font-family: inherit; outline: none; background: white; cursor: pointer; margin-bottom: 5px; }

        /* メインエリア */
        .room-main { position: relative; height: 380px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hagumo-img { width: 230px; height: 230px; object-fit: contain; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; filter: drop-shadow(0 15px 20px rgba(0,0,0,0.08)); }
        .bounce { animation: bounce 3s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* 虹色覚醒エフェクト */
        @keyframes rainbow { 0% { filter: hue-rotate(0deg) drop-shadow(0 0 15px var(--pink1)); } 100% { filter: hue-rotate(360deg) drop-shadow(0 0 25px var(--pink1)); } }
        .rainbow-active { animation: rainbow 4s linear infinite !important; transform: scale(1.1); }

        /* 吹き出し */
        .bubble { position: relative; background: white; padding: 20px; border-radius: 30px; width: 85%; max-width: 340px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 30px; text-align: center; font-weight: bold; color: #666; font-size: 15px; min-height: 50px; display: flex; align-items: center; justify-content: center; line-height: 1.5; }
        .bubble::after { content: ""; position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%); border-width: 12px 12px 0; border-style: solid; border-color: white transparent transparent; }

        /* 選択肢 */
        .choice-container { display: none; flex-direction: column; gap: 10px; width: 90%; max-width: 340px; margin: 0 auto 20px; }
        .choice-btn { background: white; border: 2px solid var(--main-pink); padding: 14px; border-radius: 50px; cursor: pointer; font-weight: bold; color: var(--main-pink); font-size: 14px; transition: 0.2s; box-shadow: 0 4px 0 var(--soft-pink); }
        .choice-btn:hover { background: var(--main-pink); color: white; transform: translateY(-2px); box-shadow: 0 6px 0 #e667a3; }

        /* アクションメニュー */
        .action-menu { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; padding: 20px; max-width: 500px; margin: 0 auto; }
        .action-btn { background: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.05); cursor: pointer; font-size: 13px; transition: 0.2s; color: #777; }
        .action-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(255, 126, 185, 0.2); color: var(--main-pink); }
        .action-btn:active { transform: scale(0.95); }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* モーダル・オーバーレイ */
        #name-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,245,247,0.98); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: white; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        
        input#user-name-input { padding: 18px; border-radius: 25px; border: 3px solid var(--pink1); margin-bottom: 25px; text-align: center; font-size: 18px; outline: none; width: 250px; font-family: inherit; }
    </style>
</head>
<body>

    <div id="name-modal">
        <h2 style="color:var(--pink2); margin-bottom: 30px;">お名前を教えてくれる？</h2>
        <input type="text" id="user-name-input" placeholder="ここに入力..." maxlength="10">
        <button class="action-btn" onclick="saveName()" style="background:var(--main-pink); color:white; padding: 18px 60px;">決定 🎀</button>
    </div>

    <nav class="nav">
        <div class="nav-content">
            <img src="./images/rogo.PNG" class="nav-logo-img" onclick="location.href='index.html'">
            <div class="nav-links">
                <a href="index.html" class="nav-link">HOME</a>
                <a href="world.html" class="nav-link">WORLD</a>
                <a href="hagumo.html" class="nav-link">HAGUMO</a>
                <a href="diagnosis.html" class="nav-link">DIAGNOSIS</a>
                <a href="product.html" class="nav-link">PRODUCT</a>
                <a href="my.html" class="nav-link active">MY HAGUMO</a>
            </div>
        </div>
    </nav>

    <div class="status-container">
        <select id="char-selector" onchange="changeChar()">
            <option value="buta">かぶた</option>
            <option value="imo">さつまいもぐら</option>
            <option value="jaku">ばたふらいぴーこっく</option>
            <option value="risu">きゅうりす</option>
            <option value="tora">とまとら</option>
            <option value="chabo">かぼちゃぼ</option>
            <option value="saru">れもんきー</option>
            <option value="kame">ぶるーべりくがめ</option>
            <option value="nga">もももんが</option>
            <option value="kuma">くろいちじくま</option>
        </select>
        <div class="love-bar-bg"><div id="love-fill" class="love-bar-fill"></div></div>
        <div style="font-size: 12px; color: #aaa; font-weight: bold;">絆レベル: <span id="love-val" style="color:var(--main-pink)">50</span> / 100</div>
    </div>

    <div class="room-main">
        <div id="chat-bubble" class="bubble">……（こちらを見ている）</div>
        <img id="hagumo-sprite" src="./images/buta.PNG" class="hagumo-img bounce" onclick="撫でる()">
    </div>

    <div id="choices" class="choice-container">
        <button class="choice-btn" onclick="handleChoice(0)"></button>
        <button class="choice-btn" onclick="handleChoice(1)"></button>
        <button class="choice-btn" onclick="handleChoice(2)"></button>
    </div>

    <div class="action-menu">
        <button id="talk-btn" class="action-btn" onclick="startTalk()">💬 おしゃべり (<span id="talk-count">5</span>)</button>
        <button id="stroke-btn" class="action-btn" onclick="撫でる()">👋 なでなで (<span id="stroke-count">10</span>)</button>
        <button class="action-btn" onclick="sayGoodbye()" style="color:#ff6b6b; font-size: 11px;">お別れ</button>
        <button class="action-btn" onclick="resetGame()" style="color:#bbb; font-size: 11px;">リセット</button>
    </div>

    <div id="farewell-overlay" class="overlay">
        <h1 style="font-size: 40px;">さようなら</h1>
        <p style="font-size: 18px; margin-bottom: 40px;">HAGUMOは土へ帰りました。</p>
        <button class="action-btn" onclick="location.href='diagnosis.html'" style="background:white; color:black;">診断へ戻る 🔍</button>
    </div>

    <script>
        // ロジック部分は千尋さんの元のコードをベースに、演出面を少し強化しました
        let talkQuota = 5, strokeQuota = 10, userName = "あなた", currentChar = "buta", currentScenario = null;
        let loveData = { buta:50, imo:50, jaku:50, risu:50, tora:50, chabo:50, saru:50, kame:50, nga:50, kuma:50 };

        const charData = {
            buta: { stroke: "えへへ、いい気持ち……♪", good: "わあ！すごく嬉しいな！✨", soso: "そうだね。わかるよ。", bad: "……そっか。ごめんね。", max: "${N}、君との絆はもう永遠だね。世界で一番幸せなカブだよ！",
                patterns: [{ q: "ねえ${N}、採れたてのカブだよ！一緒に食べる？", a: ["喜んで食べる！", "あとでね", "カブは苦手…"], scores: [10, 5, -5] }, { q: "お肌が疲れ気味かも。カブパックしてあげようか？", a: ["お願い！", "気持ちだけで十分だよ", "変なもの塗らないで"], scores: [10, 5, -5] }] },
            imo: { stroke: "ホクホクしちゃうなぁ……。", good: "えへへ、君といると心が温まるよ。", soso: "うん、僕もそう思うよ。", bad: "土の中に隠れたくなっちゃうな…。", max: "${N}、君といると心がポカポカするんだ。ずっと一緒にいようね。",
                patterns: [{ q: "土の中って落ち着くんだよ。${N}も入ってみる？", a: ["入ってみたい！", "狭そうだからいいや", "絶対嫌だよ！"], scores: [10, 5, -5] }] },
            jaku: { stroke: "あら、優しいのね。うふふ。", good: "あら、素敵な答え。気に入ったわ。", soso: "ええ、そうね。悪くないわ。", bad: "……少し、香りが乱れてしまったわ。", max: "愛という名の最高の一杯を。${N}、貴方の側が一番美しい場所だわ。",
                patterns: [{ q: "今日のハーブティーは色が綺麗。${N}も飲む？", a: ["いただくわ", "不思議な色だね", "苦そう…"], scores: [10, 5, -5] }] },
            risu: { stroke: "ほっぺが落ちちゃいそう！", good: "最高！君って本当に気が合うね！", soso: "ポリポリ……うん、いいんじゃない？", bad: "うーん、今はきゅうり気分じゃないかも。", max: "カリッ、ポリッ！${N}とおしゃべりするのは最高だよ！大好き！",
                patterns: [{ q: "水分補給、忘れてない？お肌が乾いちゃうよ。", a: ["今すぐ飲む！", "後で飲むよ", "喉乾いてない"], scores: [10, 5, -5] }] },
            tora: { stroke: "ガオーッ！もっとやってくれ！", good: "最高だぜ！お前、わかってるな！", soso: "おう、それもアリだな！", bad: "……なんだよ、つまんねーの。", max: "ガオーッ！${N}の笑顔が俺の元気の源だ！最強のバディだぜ！",
                patterns: [{ q: "リコピンパワー全開！一緒に走りに行くか？", a: ["行こうぜ！", "歩きならいいよ", "家で寝てたい"], scores: [10, 5, -5] }] },
            chabo: { stroke: "よしよし、落ち着くのう……。", good: "おお、お主は話がわかるやつじゃ。", soso: "ふむ、それも一理あるな。", bad: "……少し、カボチャが硬くなった気分じゃ。", max: "${N}、どっしり構えて待っておるぞ。お主の居場所はここじゃ。",
                patterns: [{ q: "ドシッと構えていれば大丈夫。${N}、悩みあるか？", a: ["聞いてくれる？", "今は大丈夫", "秘密だよ"], scores: [10, 5, -5] }] },
            saru: { stroke: "ウッキー！ビタミン感じるー！", good: "最高にフレッシュ！ウッキー！！", soso: "まあまあだね！酸っぱいね！", bad: "ウ……酸っぱすぎて涙が出ちゃうよ。", max: "ウッキー！${N}、酸いも甘いも一緒に乗り越えよう！親友だよ！",
                patterns: [{ q: "ビタミン補給の時間だ！ウッキー！", a: ["テンション高いね", "少し静かにして", "一緒に叫ぶ！"], scores: [5, -5, 10] }] },
            kame: { stroke: "……ゆっくり、幸せ……。", good: "……嬉しい。時間はたっぷりあるからね。", soso: "……うん。いいと思うよ。", bad: "……（そっと甲羅に閉じこもった）", max: "……（ゆっくり擦り寄ってきた） ${N}、君と歩くのが幸せなんだ。",
                patterns: [{ q: "のんびり、のんびり……。${N}、急いでない？", a: ["のんびりいこう", "急いでるんだ", "カメのペースだね"], scores: [10, -5, 5] }] },
            nga: { stroke: "ふわああ、とろけちゃうよお。", good: "わあーい！${N}、大好きー！", soso: "うん、桃色な気分だねっ！", bad: "えーん、桃が傷んじゃうよお。", max: "ふわふわ、とろとろ。${N}、ハートは君でいっぱいだよ！えへへ！",
                patterns: [{ q: "${N}のところまで飛んでいってもいい？", a: ["飛んできて！", "危ないよ", "キャッチする！"], scores: [10, 5, 10] }] },
            kuma: { stroke: "……悪くないな。", good: "……ふっ。君は面白い人だ。", soso: "……ああ。そうかもしれないな。", bad: "……これ以上は、踏み込まないでくれ。", max: "……${N}。言葉はいらないな。君の側にいられれば十分だ。",
                patterns: [{ q: "……（静かにイチジクを差し出してきた）", a: ["ありがとう", "これ何？", "いらない"], scores: [10, 5, -5] }] }
        };

        window.onload = () => {
            const sn = localStorage.getItem('hName');
            const sl = localStorage.getItem('hLoveData');
            if (!sn) document.getElementById('name-modal').style.display = 'flex';
            else { 
                userName = sn; 
                if(sl) loveData = JSON.parse(sl);
                loadGame(); 
            }
        };

        function saveName() {
            const v = document.getElementById('user-name-input').value;
            if (v) { userName = v; localStorage.setItem('hName', v); document.getElementById('name-modal').style.display = 'none'; loadGame(); }
            else { alert("お名前を教えてね！"); }
        }

        function loadGame() {
            currentChar = localStorage.getItem('hChar') || "buta";
            document.getElementById('char-selector').value = currentChar;
            updateCharDisplay(); updateUI();
        }

        function changeChar() {
            currentChar = document.getElementById('char-selector').value;
            localStorage.setItem('hChar', currentChar);
            updateCharDisplay();
            document.getElementById('chat-bubble').innerText = "これからよろしくね！";
            updateUI();
        }

        function updateCharDisplay() { 
            const img = document.getElementById('hagumo-sprite');
            img.src = `./images/${currentChar}.PNG`;
            if(loveData[currentChar] >= 100) img.classList.add('rainbow-active');
            else img.classList.remove('rainbow-active');
        }

        function updateLove(v) {
            loveData[currentChar] = Math.max(0, Math.min(100, loveData[currentChar] + v));
            localStorage.setItem('hLoveData', JSON.stringify(loveData));
            updateUI();
            
            const sprite = document.getElementById('hagumo-sprite');
            const bubble = document.getElementById('chat-bubble');

            if (loveData[currentChar] >= 100) {
                sprite.classList.add('rainbow-active');
                bubble.innerText = charData[currentChar].max.replace("${N}", userName);
            } else {
                sprite.classList.remove('rainbow-active');
            }
        }

        function updateUI() {
            const val = loveData[currentChar];
            document.getElementById('love-val').innerText = val;
            document.getElementById('love-fill').style.width = val + '%';
            document.getElementById('talk-count').innerText = talkQuota;
            document.getElementById('stroke-count').innerText = strokeQuota;
        }

        function 撫でる() {
            if (strokeQuota > 0) {
                strokeQuota--; updateLove(1);
                document.getElementById('chat-bubble').innerText = charData[currentChar].stroke;
                const b = document.getElementById('stroke-btn'); b.disabled = true;
                setTimeout(() => { if(strokeQuota > 0) b.disabled = false; }, 800);
            } else {
                document.getElementById('chat-bubble').innerText = "また明日なでてね。";
            }
        }

        function startTalk() {
            if (talkQuota > 0) {
                talkQuota--;
                const p = charData[currentChar].patterns;
                const r = Math.floor(Math.random() * p.length);
                currentScenario = JSON.parse(JSON.stringify(p[r]));
                currentScenario.q = currentScenario.q.replace("${N}", userName);
                document.getElementById('chat-bubble').innerText = currentScenario.q;
                const bs = document.querySelectorAll('.choice-btn');
                currentScenario.a.forEach((t, i) => { 
                    if(bs[i]) { bs[i].innerText = t; bs[i].style.display = 'block'; }
                });
                document.getElementById('choices').style.display = 'flex';
                document.getElementById('talk-btn').disabled = true;
                document.getElementById('stroke-btn').disabled = true;
            } else {
                document.getElementById('chat-bubble').innerText = "今日はもうおねむみたい。";
            }
        }

        function handleChoice(i) {
            const s = currentScenario.scores[i]; updateLove(s);
            const cfg = charData[currentChar];
            document.getElementById('chat-bubble').innerText = s >= 10 ? cfg.good : s >= 5 ? cfg.soso : cfg.bad;
            document.getElementById('choices').style.display = 'none';
            document.getElementById('talk-btn').disabled = false;
            document.getElementById('stroke-btn').disabled = false;
        }

        function sayGoodbye() { if(confirm("本当にお別れしちゃうの？")) document.getElementById('farewell-overlay').style.display = 'flex'; }
        function resetGame() { if(confirm("全データを消去して最初からにする？")) { localStorage.clear(); location.reload(); } }
    </script>

     <footer>
        <p style="color: var(--pink2); font-weight: bold; font-size: 16px; margin-bottom: 12px; letter-spacing: 1px;">🎀 HAGUMO project 🎀</p>
        <p style="font-size: 11px; color: #aaa; line-height: 1.8; max-width: 400px; margin: 0 auto;">
            ※これは授業課題のプロトタイプです。<br>
            実際の商品の販売・発送は行っておりません。
        </p>
    </footer>
</body>
</html>
