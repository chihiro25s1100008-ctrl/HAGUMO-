<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HAGUMO | MY HAGUMO</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { overflow-x: hidden; touch-action: manipulation; transition: background 0.2s; }

        /* ナビゲーション修正：Aboutページと統一 */
        .nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: white; border-bottom: 2px solid var(--soft-pink);
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-logo-img { height: 40px; cursor: pointer; }
        .nav-links { display: flex; gap: 15px; }
        .nav-link { text-decoration: none; color: #888; font-weight: bold; font-size: 14px; }
        .nav-link.active { color: var(--pink2); }

        .container { padding: 10px; margin-top: 10px; }

        /* 設定ボタンエリア */
        .settings-bar {
            display: flex; justify-content: flex-end; gap: 10px;
            max-width: 450px; margin: 0 auto 10px;
        }
        .mini-btn {
            background: #fff; border: 2px solid var(--sub-pink); color: var(--pink2);
            padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold;
            cursor: pointer; box-shadow: 0 3px 0 var(--soft-pink); transition: 0.1s;
        }
        .mini-btn:active { transform: translateY(3px); box-shadow: 0 0 0 var(--soft-pink); }
        .reset-btn { border-color: #ffb6c1; color: #ff7eb9; }

        /* メインステージ */
        .stage { 
            background: white; border-radius: 40px; padding: 25px 15px; 
            box-shadow: 0 15px 40px rgba(255, 126, 185, 0.2); 
            margin: 0 auto; max-width: 450px; position: relative; 
            border: 4px solid var(--sub-pink); z-index: 5; text-align: center;
        }

        .speech-bubble { 
            background: #fffafa; border: 3px solid var(--sub-pink); border-radius: 20px; 
            padding: 15px; margin-bottom: 20px; min-height: 50px; display: flex; 
            align-items: center; justify-content: center; font-weight: bold; color: #555; 
            font-size: 14px; position: relative; box-shadow: 0 5px 0 var(--soft-pink);
        }

        .my-img { width: 180px; height: 180px; object-fit: contain; transition: 0.3s; }

        /* ゲージ */
        .gauge-wrap { width: 90%; height: 20px; background: #eee; border-radius: 10px; margin: 15px auto 5px; overflow: hidden; border: 2px solid #fff; }
        #love-bar { height: 100%; background: linear-gradient(90deg, #ffb6c1, #ff00de); transition: 0.3s; width: 0%; }

        /* アクションボタン */
        .main-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 450px; margin: 25px auto; padding: 0 10px; }
        .puffy-btn { 
            background: white; border: none; color: var(--pink2); 
            padding: 15px 10px; border-radius: 30px; font-weight: bold; cursor: pointer; 
            font-size: 15px; box-shadow: 0 6px 0 var(--pink1); transition: 0.1s; position: relative;
        }
        .puffy-btn:active { transform: translateY(6px); box-shadow: 0 0 0 var(--pink1); }
        .puffy-btn.talk { background: var(--pink2); color: white; box-shadow: 0 6px 0 #d1478e; }

        #choices { display: none; flex-direction: column; gap: 8px; margin-top: 15px; }

        /* レインボー演出用 */
        .rainbow-bar { background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet) !important; background-size: 200% !important; animation: moveBg 1s linear infinite; }
        @keyframes moveBg { from { background-position: 0%; } to { background-position: 200%; } }
    </style>
</head>
<body>

    <nav class="nav">
        <img src="./images/rogo.PNG" class="nav-logo-img" onclick="location.href='index.html'">
        <div class="nav-links">
            <a href="index.html" class="nav-link">HOME</a>
            <a href="about.html" class="nav-link">ABOUT</a>
            <a href="diagnosis.html" class="nav-link">DIAGNOSIS</a>
            <a href="my.html" class="nav-link active">MY HAGUMO</a>
        </div>
    </nav>

    <div class="container">
        <div id="has-data">
            <div class="settings-bar">
                <button class="mini-btn" onclick="changeName()">✏️ なまえ設定</button>
                <button class="mini-btn reset-btn" onclick="resetGame()">♻️ リセット</button>
            </div>

            <div class="stage">
                <div id="status-label" style="font-size: 11px; color: var(--pink2); margin-bottom: 5px; font-weight: bold;">---</div>
                <div class="speech-bubble" id="msg-text">...</div>
                <img id="partner-img" class="my-img" src="">
                <div class="gauge-wrap"><div id="love-bar"></div></div>
                <div style="font-size: 13px; color: var(--pink2); font-weight: bold;">LOVE: <span id="love-num">0</span>%</div>
                <div id="choices"></div>
            </div>

            <div id="main-actions" class="main-actions">
                <button class="puffy-btn" onclick="playAction()">👋 なでなでする</button>
                <button class="puffy-btn talk" onclick="startTalk()">💬 おしゃべり</button>
            </div>
        </div>

        <div id="no-data" style="display:none; text-align:center; padding-top:100px;">
            <p style="color:#888;">まだパートナーがいないみたい...</p>

<script>
    let love = 50;
    let partnerImg = "";
    let userName = localStorage.getItem('hagumoUserName') || "あなた";

    // 10キャラのデータ設定
    const charaData = {
        "risu.PNG": { name: "きゅうりす", key: "バランス・調和", talks: [{q:"調子はどう？", a:[{t:"いい感じ！", l:10, r:"それは良かった！リズムが整ってるね。"}, {t:"お疲れかも", l:5, r:"無理しないで。僕と一緒に深呼吸しよ。"}]}]},
        "tora.PNG": { name: "とまとら", key: "情熱・リーダー", talks: [{q:"何か熱いことしたいぜ！", a:[{t:"冒険に行こう！", l:15, r:"最高だ！{name}、俺についてこい！"}]}]},
        "saru.PNG": { name: "れもんきー", key: "ひらめき・自由", talks: [{q:"新しい遊び、見つけちゃった！", a:[{t:"教えて！", l:10, r:"ヒミツだよ〜！うそ、あとで教えてあげる！"}]}]},
        "kame.PNG": { name: "ぶるーべりくがめ", key: "知性・分析", talks: [{q:"読書の時間にしましょうか。", a:[{t:"おすすめは？", l:10, r:"ハグモの歴史書なんてどうですか、{name}。"}]}]},
        "buta.PNG": { name: "かぶた", key: "優しさ・包容", talks: [{q:"おなかすきましたぁ〜", a:[{t:"おやつ食べる？", l:15, r:"いいんですかぁ？{name}、大好きですぅ。"}]}]},
        "jaku.PNG": { name: "ばたふらいぴーこっく", key: "機転・賢さ", talks: [{q:"私の美しさ、見惚れちゃう？", a:[{t:"きれい！", l:10, r:"ふふっ、{name}もなかなか見る目があるわね。"}]}]},
        "imo.PNG": { name: "さつまいもぐら", key: "努力・継続", talks: [{q:"今日もコツコツ頑張ろう！", a:[{t:"おー！", l:10, r:"その意気だよ！{name}なら絶対できる！"}]}]},
        "nga.PNG": { name: "もももんが", key: "愛嬌・甘え上手", talks: [{q:"ねぇねぇ、抱っこして〜！", a:[{t:"いいよ！", l:15, r:"わーい！{name}の腕、あったか〜い！"}]}]},
        "kuma.PNG": { name: "くろいちじくま", key: "静か・ミステリアス", talks: [{q:"……。静かだな。", a:[{t:"落ち着くね", l:10, r:"……ああ。{name}といると、心が安らぐ。"}]}]},
        "chabo.PNG": { name: "かぼちゃぼ", key: "明るい・ポジティブ", talks: [{q:"笑えばハッピーだよ！！", a:[{t:"ワハハ！", l:15, r:"最高！その笑顔が一番のパワーだね！"}]}]}
    };

    function formatMsg(text) { return text.replace(/{name}/g, userName); }

    window.onload = () => {
        const saved = localStorage.getItem('myHagumo');
        if (!saved) {
            document.getElementById('has-data').style.display = 'none';
            document.getElementById('no-data').style.display = 'block';
            return;
        }
        const data = JSON.parse(saved);
        partnerImg = data.img;
        love = data.love || 50;
        const info = charaData[partnerImg] || charaData["risu.PNG"];

        document.getElementById('partner-img').src = `./images/${partnerImg}`;
        document.getElementById('status-label').innerText = `${info.name} | ${info.key}`;
        document.getElementById('msg-text').innerText = formatMsg(`{name}、会いたかったよ！`);
        updateGauge();
    };

    function updateGauge() {
        love = Math.max(0, Math.min(100, love));
        const bar = document.getElementById('love-bar');
        document.getElementById('love-num').innerText = Math.floor(love);
        bar.style.width = love + '%';
        if(love >= 100) bar.classList.add('rainbow-bar');
        else bar.classList.remove('rainbow-bar');
        
        localStorage.setItem('myHagumo', JSON.stringify({ img: partnerImg, love: love }));
    }

    function playAction() {
        love = Math.min(100, love + 3);
        document.getElementById('msg-text').innerText = formatMsg(`えへへ、{name}になでなでされた！`);
        updateGauge();
    }

    function startTalk() {
        const info = charaData[partnerImg] || charaData["risu.PNG"];
        const talk = info.talks[0];
        const choiceBox = document.getElementById('choices');
        document.getElementById('msg-text').innerText = formatMsg(talk.q);
        choiceBox.innerHTML = '';
        choiceBox.style.display = 'flex';
        talk.a.forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'puffy-btn';
            btn.innerText = c.t;
            btn.onclick = () => {
                love = Math.min(100, love + c.l);
                document.getElementById('msg-text').innerText = formatMsg(c.r);
                choiceBox.style.display = 'none';
                updateGauge();
            };
            choiceBox.appendChild(btn);
        });
    }

    function changeName() {
        const n = prompt("なんて呼ばれたい？", userName);
        if (n) {
            userName = n;
            localStorage.setItem('hagumoUserName', n);
            document.getElementById('msg-text').innerText = formatMsg(`これからは「{name}」って呼ぶね！`);
        }
    }

    function resetGame() {
        if (confirm("パートナーとの思い出をリセットして、診断からやり直しますか？")) {
            localStorage.removeItem('myHagumo');
            location.href = 'diagnosis.html';
        }
    }

            userName = n.trim();
            localStorage.setItem('hagumoUserName', userName);
            document.getElementById('msg-text').innerText = formatMsg(`これからは「{name}」って呼ぶね！`);
        }
    }

    function resetGame() {
        if (confirm("パートナーとの思い出をリセットして、診断からやり直しますか？")) {
            localStorage.removeItem('myHagumo');
            location.href = 'diagnosis.html';
        }
    }
</script>
</body>
</html>
