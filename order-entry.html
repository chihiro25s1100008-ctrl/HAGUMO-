<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ENTRY KIT | HAGUMO</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --main-pink: #ff7eb9; 
            --easy-green: #e0f9e0; 
            --soft-pink: #fff5f7;
            --pink1: #ffb3d9;
            --pink2: #d1478e;
            --white-glass: rgba(255, 255, 255, 0.95);
        }
        
        body { 
            font-family: 'Zen Maru Gothic', sans-serif; 
            background: #fffafb; 
            margin: 0; 
            padding-top: 80px; /* HOMEのナビ高さに合わせる */
            color: #444;
            overflow-x: hidden;
            background-image: radial-gradient(var(--soft-pink) 2px, transparent 2px);
            background-size: 40px 40px;
        }

        /* --- ナビゲーション（HOMEと完全に共通） --- */
        .nav { 
            position: fixed; top: 0; left: 0; width: 100%; 
            background: var(--white-glass); 
            backdrop-filter: blur(10px); 
            z-index: 10000; 
            border-bottom: 2px solid rgba(255, 179, 217, 0.3); 
            padding: 12px 0; 
        }
        .nav-content { 
            max-width: 1100px; margin: 0 auto; padding: 0 20px; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .nav-logo-img { height: 35px; cursor: pointer; transition: 0.3s; }
        .nav-logo-img:hover { transform: scale(1.1) rotate(-3deg); }
        .nav-links { display: flex; gap: 12px; }
        .nav-link { 
            color: #888; text-decoration: none; font-size: 12px; font-weight: bold; 
            padding: 6px 12px; border-radius: 50px; transition: 0.3s; 
            font-family: 'Quicksand', sans-serif; white-space: nowrap;
        }
        .nav-link:hover, .nav-link.active { 
            color: var(--pink2); background: white; 
            border: 1px solid var(--pink1);
            box-shadow: 0 4px 10px rgba(255, 126, 185, 0.2); 
        }

        /* --- ヒーローセクション --- */
        .order-hero { 
            background: linear-gradient(135deg, #fff 0%, var(--easy-green) 100%); 
            padding: 50px 20px; 
            text-align: center; 
            border-radius: 0 0 60px 60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }
        .rank-badge {
            font-family: 'Quicksand', sans-serif;
            font-weight: 700; color: #4CAF50; font-size: 11px; letter-spacing: 2px;
            background: white; padding: 5px 15px; border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* --- メインコンテナ --- */
        .container { 
            max-width: 1000px; margin: -30px auto 80px; padding: 25px; 
            display: grid; grid-template-columns: 1fr; gap: 30px; 
            background: white; border-radius: 40px;
            box-shadow: 0 20px 60px rgba(255,126,185,0.08);
        }

        @media screen and (min-width: 900px) { 
            .container { grid-template-columns: 1.1fr 1fr; padding: 50px; margin-top: -40px; } 
        }

        /* --- 画像・情報セクションのデザイン --- */
        .main-img-box { 
            background: radial-gradient(circle, #fff 0%, #fcfcfc 100%); 
            border-radius: 30px; padding: 30px; 
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
            border: 1px solid #f0f0f0;
        }
        .main-img { 
            width: 100%; height: auto; max-height: 350px; object-fit: contain; 
            position: relative; z-index: 1; transition: 0.4s;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.08)); 
        }
        
        .thumb-list { margin-top: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .thumb-item { cursor: pointer; text-align: center; }
        .thumb-img { 
            width: 100%; height: auto; aspect-ratio: 1/1; object-fit: contain; 
            border: 2px solid #f5f5f5; border-radius: 15px; padding: 8px; background: #fff; 
            transition: 0.3s; opacity: 0.6; box-sizing: border-box;
        }
        .thumb-item.active .thumb-img { border-color: var(--main-pink); opacity: 1; background: var(--soft-pink); transform: translateY(-3px); }

        .char-tag { 
            display: inline-block; width: fit-content; padding: 5px 12px; border-radius: 50px; 
            font-size: 11px; background: var(--soft-pink); margin-bottom: 12px; 
            color: var(--pink2); font-weight: bold; border: 1px solid var(--pink1); 
        }
        
        .product-title { margin: 0; font-size: 24px; color: #333; line-height: 1.3; font-weight: 700; }
        .price { font-size: 34px; font-weight: 700; color: #333; margin: 10px 0; font-family: 'Quicksand', sans-serif; }

        .btn-order { 
            background: linear-gradient(135deg, #ff7eb9, #ff5e95); color: white; border: none; 
            padding: 18px; width: 100%; border-radius: 100px; font-size: 16px; font-weight: bold; 
            cursor: pointer; box-shadow: 0 8px 0 #d1478e; transition: 0.2s; 
            border: 2px solid white; outline: none;
        }
        .btn-order:hover { transform: translateY(-2px); box-shadow: 0 10px 0 #d1478e; }
        .btn-order:active { transform: translateY(6px); box-shadow: 0 2px 0 #d1478e; }

        footer { 
            background: linear-gradient(to bottom, #fff, var(--soft-pink));
            padding: 60px 20px; text-align: center; border-top: 2px solid var(--soft-pink); 
        }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="nav-content">
            <img src="./images/rogo.PNG" class="nav-logo-img" alt="HAGUMO Logo" onclick="location.href='index.html'">
            <div class="nav-links">
                <a href="index.html" class="nav-link">HOME</a>
                <a href="world.html" class="nav-link">WORLD</a>
                <a href="product.html" class="nav-link">PRODUCT</a>
                <a href="hagumo.html" class="nav-link">HAGUMO</a>
                <a href="diagnosis.html" class="nav-link">DIAGNOSIS</a>
                <a href="my.html" class="nav-link">MY HAGUMO</a>
            </div>
        </div>
    </nav>

    <div class="order-hero">
        <span class="rank-badge">RANK C : ENTRY KIT</span>
        <h1 style="color:var(--pink2); margin:12px 0; font-size: clamp(22px, 5vw, 28px);">はじめてのHAGUMOセット</h1>
        <p style="font-size: 13px; color: #999; font-weight: bold; margin: 0; letter-spacing: 0.5px;">優しく見守り、一緒に育つ。初めての美容体験。</p>
    </div>

    <div class="container">
        <div class="image-section">
            <div class="main-img-box">
                <img id="main-img" src="./images/buta.PNG" class="main-img">
            </div>
            <div class="thumb-list">
                <div class="thumb-item active" onclick="changeImage(this, 'かぶた', 'カブ')">
                    <img src="./images/buta.PNG" class="thumb-img">
                </div>
                <div class="thumb-item" onclick="changeImage(this, 'さつまいもぐら', 'サツマイモ')">
                    <img src="./images/imo.PNG" class="thumb-img">
                </div>
                <div class="thumb-item" onclick="changeImage(this, 'ばたふらいぴー', 'バタフライピー')">
                    <img src="./images/jaku.PNG" class="thumb-img">
                </div>
            </div>
        </div>

        <div class="info-section">
            <div id="char-name-tag" class="char-tag">Partner: かぶた</div>
            <h2 class="product-title">HAGUMO育成スターターキット<br><small style="font-size: 0.6em; color: #bbb;">（エントリープラン）</small></h2>
            <div class="price">1,980<span>円（税込）</span></div>
            
            <div class="selection-summary" style="background: #fafafa; padding: 18px; border-radius: 20px; border-left: 5px solid var(--main-pink); margin: 20px 0;">
                <span style="font-size: 10px; color: #ccc; font-weight: bold;">CURRENT SELECTION</span><br>
                <b id="selected-display" style="color:var(--pink2)">かぶた（カブ）</b>
            </div>

            <button class="btn-order" onclick="orderEffect()">この子をお迎えする 🌱</button>
            <a href="product.html" style="display:block; text-align:center; margin-top:20px; color:#bbb; text-decoration:none; font-size:12px; font-family:'Quicksand'">← BACK TO PRODUCT</a>
        </div>
    </div>

    <footer>
        <img src="./images/rogo.PNG" style="height: 30px; opacity: 0.6; margin-bottom:20px;">
        <p style="color: var(--pink2); font-weight: bold; font-size: 16px; margin-bottom: 10px;">🎀 HAGUMO project 🎀</p>
        <p style="font-size: 10px; color: #bbb;">※これは授業課題のプロトタイプです。</p>
    </footer>

    <script>
        // 画像切り替え
        function changeImage(element, name, type) {
            const newSrc = element.querySelector('.thumb-img').src;
            const mainImg = document.getElementById('main-img');
            mainImg.src = newSrc;
            document.getElementById('char-name-tag').innerText = "Partner: " + name;
            document.getElementById('selected-display').innerText = name + "（" + type + "）";
            document.querySelectorAll('.thumb-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }

        // 購入ボタンエフェクト
        function orderEffect() {
            alert("お申し込みありがとうございます！\n※デモ画面のため実際には発送されません。");
        }

        // 【重要】HOMEと同じナビゲーションのActive管理スクリプト
        function handleNavigation() {
            let currentPath = window.location.pathname.split("/").pop() || 'index.html';
            const navLinks = document.querySelectorAll('.nav-link');
            navLinks.forEach(link => {
                if (link.getAttribute('href') === currentPath) {
                    link.classList.add('active');
                }
            });
        }
        window.addEventListener("load", handleNavigation);
    </script>
</body>
</html>
