<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAGUMO GROW KIT</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700&family=Noto+Sans+JP&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            margin: 0;
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(180deg, #fffdf8, #fff6fb);
            text-align: center;
            color: #444;
            overflow-x: hidden;
        }

        /* ヒーローセクション */
        .hero {
            padding: 120px 20px 60px; /* ナビが固定なので上の余白を少し増やしました */
            position: relative;
        }

        .hero h1 {
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 34px;
            margin-bottom: 10px;
            animation: fadeUp 1s ease forwards;
        }

        .hero p {
            opacity: 0;
            animation: fadeUp 1.2s ease forwards;
            animation-delay: .3s;
        }

        .price {
            font-size: 24px;
            color: #ff6fa5;
            font-weight: bold;
            margin: 25px 0;
            opacity: 0;
            animation: fadeUp 1.4s ease forwards;
            animation-delay: .6s;
        }

        .buy-button {
            display: inline-block;
            padding: 16px 45px;
            border-radius: 999px;
            background: linear-gradient(90deg, #ff9ecb, #ff7eb9);
            color: white;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            transition: .3s;
            box-shadow: 0 10px 30px rgba(255, 120, 170, .4);
            animation: pulse 2s infinite;
        }

        .buy-button:hover {
            transform: scale(1.07);
        }
